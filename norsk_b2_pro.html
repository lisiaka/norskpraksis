<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>B2 Norsk Trening</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh;color:#1a1a1a;font-size:15px;line-height:1.5;}
button{cursor:pointer;font-family:inherit;transition:all .15s;}
button:hover{opacity:.88;}
button:active{transform:scale(.98);}
input,select,textarea{font-family:inherit;outline:none;}
input:focus,select:focus,textarea:focus{border-color:#2d9e6b!important;box-shadow:0 0 0 3px rgba(45,158,107,.15);}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#c8d4f8;border-radius:3px;}
#app{max-width:none;margin:0;padding:0 32px 40px 252px;min-height:100vh;}
.header{background:transparent;border:none;border-radius:0;padding:16px 0;margin-bottom:20px;color:#1a1a1a;}
.header h1,.header p{display:none;}
.header-top{display:flex;justify-content:flex-end;align-items:center;gap:12px;}
.user-badge{display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #e0e4ec;border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;color:#444;white-space:nowrap;cursor:pointer;transition:all .2s;flex-shrink:0;}
.user-badge:hover{border-color:#1a6b4a;color:#1a6b4a;background:#f0fdf8;}
.user-badge .ub-icon{font-size:15px;}
/* ── Login screen ── */
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#e8f5ff 0%,#f0e8ff 100%);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.login-card{background:#fff;border-radius:32px;padding:48px 40px;max-width:400px;width:100%;box-shadow:0 12px 48px rgba(79,110,247,.14);text-align:center;}
.login-card .login-flag{font-size:56px;margin-bottom:16px;}
.login-card h2{font-size:24px;font-weight:800;color:#1a1a2e;margin-bottom:6px;letter-spacing:-.3px;}
.login-card p{font-size:14px;color:#888;margin-bottom:28px;line-height:1.6;}
.login-input{width:100%;padding:14px 18px;border-radius:50px;border:2px solid #e0e4ff;font-size:16px;text-align:center;font-family:inherit;margin-bottom:12px;transition:border-color .2s;background:#f8f9ff;}
.login-input:focus{border-color:#2d9e6b!important;outline:none;box-shadow:0 0 0 3px rgba(45,158,107,.15);}
.login-btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a6b4a,#2d9e6b);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:800;cursor:pointer;transition:opacity .15s;}
.login-btn:hover{opacity:.88;}
.login-btn:disabled{opacity:.4;cursor:default;}
.login-hint{font-size:12px;color:#bbb;margin-top:10px;}
/* ── Sidebar navigation ── */
.tabs{position:fixed;top:0;left:0;bottom:0;width:236px;background:#fff;border-right:1px solid #e0e4ec;display:flex;flex-direction:column;padding:0;overflow-y:auto;z-index:100;border-radius:0;box-shadow:none;margin:0;gap:0;}
.sidebar-brand{padding:24px 20px 16px;font-size:17px;font-weight:800;color:#1a1a1a;border-bottom:1px solid #f0f0f0;margin-bottom:8px;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.nav-section-label{padding:12px 20px 4px;font-size:10px;font-weight:800;color:#aaa;text-transform:uppercase;letter-spacing:.8px;}
.tab-btn{display:flex;align-items:center;width:calc(100% - 16px);padding:10px 14px;border-radius:10px;margin:0 8px 2px;border:none;background:none;color:#555;font-weight:600;font-size:14px;text-align:left;justify-content:flex-start;transition:all .15s;white-space:nowrap;box-shadow:none;}
.tab-btn:hover{background:#f0f6ff;color:#1a6b4a;opacity:1;}
.tab-btn.active{background:#edfaf3;color:#1a6b4a;font-weight:700;box-shadow:none;}
.card{background:#fff;border-radius:14px;padding:22px 24px;box-shadow:0 2px 10px rgba(0,0,0,.05);border:1px solid #e8ecf0;margin-bottom:14px;}
.card h2{font-size:15px;color:#1a6b4a;font-weight:800;margin-bottom:14px;letter-spacing:-.1px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.form-row2{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.form-row3{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:flex-end;margin-bottom:10px;}
.field-label{font-size:11px;color:#777;display:block;margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.text-input{width:100%;padding:10px 13px;border-radius:9px;border:1.5px solid #e0e4ec;font-size:14px;background:#fff;}
.sel{padding:10px 13px;border-radius:9px;border:1.5px solid #e0e4ec;font-size:14px;background:#fff;width:100%;}
.btn-add{padding:10px 22px;background:#1a6b4a;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:700;white-space:nowrap;}
.hint{font-size:12px;color:#bbb;margin-top:6px;}
.io-bar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
.btn-io{padding:8px 16px;background:#fff;border:1.5px solid #e0e4ec;border-radius:9px;font-size:13px;color:#555;font-weight:600;}
.btn-io:hover{border-color:#2d9e6b;color:#1a6b4a;}
.io-hint{font-size:12px;color:#bbb;margin-left:4px;}
.search-box{width:100%;padding:10px 14px;border-radius:9px;border:1.5px solid #e0e4ec;font-size:14px;background:#fff;margin-bottom:14px;}
.topic-filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;padding:12px;background:#fff;border-radius:12px;border:1px solid #e8ecf0;align-items:center;}
.topic-chip{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600;background:#f5f7fa;border:1.5px solid #e0e4ec;color:#555;cursor:pointer;transition:all .2s;}
.topic-chip:hover{border-color:#2d9e6b;background:#e8f5ee;}
.topic-chip.active{background:#1a6b4a;color:#fff;border-color:#1a6b4a;}
.word-topic-tag{display:inline-block;margin-left:6px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;background:#f0e68c;color:#776;}
.cat-section{background:#fff;border-radius:12px;padding:18px;margin-bottom:12px;border:1px solid #e8ecf0;}
.cat-title{font-size:12px;color:#888;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;display:flex;align-items:center;gap:7px;}
.cat-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;}
.word-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.word-chip{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;background:#f8fdf9;border-radius:9px;border-left:3px solid #ddd;}
.word-chip .wn{font-weight:600;color:#222;font-size:14px;word-break:break-word;}
.word-chip .wm{color:#999;font-size:12px;margin-top:2px;word-break:break-word;}
.btn-del{background:none;border:none;color:#ccc;font-size:18px;padding:0 3px;line-height:1;flex-shrink:0;margin-left:6px;}
.btn-del:hover{color:#e05c5c;opacity:1;}
.empty-state{text-align:center;padding:56px 20px;background:#fff;border-radius:14px;color:#bbb;}
.empty-state .big{font-size:48px;margin-bottom:12px;}
.topic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.topic-card{background:#fff;border-radius:12px;padding:22px 20px;border:1px solid #e8ecf0;cursor:pointer;transition:border-color .15s;text-align:left;}
.topic-card:hover{border-color:#2d9e6b;}
.topic-emoji{font-size:36px;margin-bottom:10px;}
.topic-name{font-weight:700;font-size:16px;color:#222;margin-bottom:4px;}
.topic-count{font-size:13px;color:#999;margin-bottom:14px;}
.topic-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:13px;font-weight:600;}
.prompt-panel{margin-top:20px;background:#fff;border-radius:16px;border:2px solid #e8e8e8;overflow:hidden;}
.prompt-panel-header{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid #f0f0f0;font-weight:700;font-size:15px;}
.prompt-list-item{display:flex;align-items:flex-start;gap:12px;padding:13px 18px;cursor:pointer;border-bottom:1px solid #f5f5f5;transition:background .15s;}
.prompt-list-item:last-child{border-bottom:none;}
.prompt-list-item:hover{background:#f8f8ff;}
.prompt-list-item-title{font-weight:700;font-size:14px;margin-bottom:3px;}
.prompt-list-item-text{font-size:13px;color:#555;line-height:1.5;}
.prompt-list-arrow{flex-shrink:0;font-size:18px;margin-top:2px;color:#bbb;}
.custom-oppgave-box{padding:16px 18px;background:#f9f9ff;border-top:2px dashed #dde;}
.custom-oppgave-box textarea{width:100%;box-sizing:border-box;padding:10px 12px;border-radius:10px;border:1.5px solid #ccd;font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;min-height:80px;}
.write-layout{display:grid;grid-template-columns:1fr 290px;gap:16px;align-items:start;}
@media(max-width:720px){.write-layout{grid-template-columns:1fr;}}
.prompt-box{border-radius:14px;padding:20px;margin-bottom:14px;}
.prompt-box .prompt-tag{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.prompt-box .prompt-text{font-size:15px;line-height:1.7;color:#2a2a2a;}
.prompt-box .hint-bar{margin-top:12px;padding:8px 12px;background:#fff;border-radius:8px;font-size:13px;color:#444;}
.progress-wrap{margin-bottom:10px;}
.progress-meta{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;color:#666;}
.progress-track{background:#e8eef0;border-radius:6px;height:7px;overflow:hidden;}
.progress-fill{height:100%;border-radius:6px;transition:width .4s;}
.success-msg{text-align:center;color:#2d9e6b;font-size:13px;margin-top:6px;font-weight:600;}
.essay-area{width:100%;min-height:340px;padding:18px;border-radius:13px;border:1.5px solid #dde;font-size:15px;line-height:1.8;resize:vertical;background:#fff;}
.essay-meta{display:flex;justify-content:space-between;margin-top:8px;font-size:13px;color:#999;}
.action-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
.btn-sec{padding:9px 18px;background:#f5f7fa;border:1.5px solid #e0e4ec;border-radius:9px;font-size:13px;color:#555;font-weight:500;}
.sidebar{position:sticky;top:16px;}
.sidebar .card{margin-bottom:12px;}
.sidebar .card h3{font-size:14px;color:#1a6b4a;font-weight:700;margin-bottom:12px;}
.sidebar-chips{max-height:440px;overflow-y:auto;padding-right:2px;display:grid;gap:5px;}
.wb-chip{padding:7px 10px;border-radius:8px;border-left:3px solid #ddd;background:#f9f9f9;}
.wb-chip.used{background:#edfaf3;border-left-color:#2d9e6b;}
.wb-chip.used .wn{color:#1a6b4a;font-weight:700;}
.wb-chip .wn{font-size:13px;font-weight:600;color:#444;}
.wb-chip .wm{font-size:11px;color:#bbb;margin-top:1px;}
.essay-word-list{max-height:300px;overflow-y:auto;padding-right:2px;display:grid;gap:4px;font-size:12px;}
.essay-word-item{padding:6px 8px;border-radius:7px;background:#f8fdf9;border-left:3px solid #2d9e6b;}
.essay-word-item .wn{font-weight:600;color:#1a6b4a;margin-bottom:2px;}
.essay-word-item .wm{color:#999;font-size:11px;}
.essay-word-item .sent{color:#555;font-size:11px;margin-top:3px;font-style:italic;max-height:40px;overflow-y:auto;}
.tips-box{background:#fffdf0;border-radius:12px;padding:14px;border:1px solid #f0e68c;}
.tips-title{font-size:12px;font-weight:700;color:#b8860b;margin-bottom:8px;}
.tip-item{font-size:12px;color:#776;margin-bottom:4px;display:flex;gap:6px;}
.tip-dot{color:#f0c040;flex-shrink:0;}
/* Settings card */
.settings-card{background:#fff;border-radius:12px;padding:14px 18px;margin-bottom:14px;border:1.5px dashed #e0e4ec;}
.settings-card h3{font-size:13px;color:#888;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.key-row{display:flex;gap:8px;align-items:center;}
.key-input{flex:1;padding:8px 12px;border-radius:8px;border:1.5px solid #dde;font-size:13px;font-family:monospace;background:#fafafa;letter-spacing:.5px;}
.key-input:focus{border-color:#2d9e6b!important;box-shadow:0 0 0 3px rgba(45,158,107,.1);}
.btn-save-key{padding:8px 16px;background:#1a6b4a;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.key-status{font-size:12px;margin-top:6px;min-height:16px;}
/* Grammar / Claude result */
.grammar-result{margin-top:14px;}
.grammar-ok{padding:10px 14px;background:#edfaf3;border-left:4px solid #2d9e6b;color:#1a6b4a;border-radius:8px;font-weight:600;font-size:13px;}
.grammar-error{background:#fff5f5;border-left:3px solid #e05c5c;padding:8px 10px;margin-bottom:6px;border-radius:6px;font-size:12px;color:#555;}
.grammar-error .em{color:#e05c5c;font-weight:700;}
.claude-result{border-radius:12px;overflow:hidden;border:1px solid #e0e8e0;}
.claude-header{padding:12px 16px;display:flex;align-items:center;gap:10px;font-weight:700;font-size:14px;}
.claude-header.ok{background:#edfaf3;color:#1a6b4a;}
.claude-header.err{background:#fff5f5;color:#c0392b;}
.claude-header.warn{background:#fffdf0;color:#b8860b;}
.claude-body{padding:14px 16px;background:#fff;}
.claude-overall{font-size:13px;color:#444;margin-bottom:10px;line-height:1.55;}
.claude-error-card{background:#fff5f5;border-left:3px solid #e05c5c;border-radius:6px;padding:8px 12px;margin-bottom:7px;}
.claude-error-text{font-weight:700;color:#e05c5c;font-size:12px;margin-bottom:2px;}
.claude-error-issue{font-size:12px;color:#666;margin-bottom:3px;}
.claude-error-fix{font-size:12px;color:#2d9e6b;font-weight:600;}
.claude-improved{background:#f0f8f4;border-left:3px solid #2d9e6b;border-radius:6px;padding:10px 12px;margin-top:8px;}
.claude-improved-label{font-size:10px;color:#2d9e6b;font-weight:700;text-transform:uppercase;letter-spacing:.6px;margin-bottom:3px;}
.claude-improved-text{font-size:14px;color:#222;font-style:italic;line-height:1.5;}
.claude-tip{background:#fffdf0;border-left:3px solid #f0c040;border-radius:6px;padding:8px 12px;margin-top:8px;font-size:12px;color:#776;line-height:1.5;}
.grammar-error .sug{color:#2d9e6b;margin-left:4px;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:11px 24px;border-radius:12px;font-size:14px;font-weight:500;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.25);opacity:0;transition:opacity .25s;}
.toast.show{opacity:1;}
.word-input-row{display:flex;gap:6px;}
.btn-lookup{padding:10px 13px;background:#f0f4f8;border:1.5px solid #dde;border-radius:9px;font-size:16px;flex-shrink:0;color:#555;line-height:1;}
.btn-lookup:hover{background:#e8f5ee;border-color:#2d9e6b;}
.btn-lookup:disabled{opacity:.45;cursor:default;}
@keyframes spin{to{transform:rotate(360deg)}}
.spinning{display:inline-block;animation:spin .8s linear infinite;}
/* ── Essay bank ── */
.essay-bank-panel{background:#f8fdf9;border-radius:14px;border:1.5px solid #d4edda;padding:16px;margin-top:14px;}
.essay-bank-panel h3{font-size:13px;color:#1a6b4a;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.essay-bank-empty{font-size:13px;color:#bbb;text-align:center;padding:18px 0;}
.saved-essay-row{background:#fff;border-radius:10px;border:1.5px solid #e8f0e8;padding:12px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;transition:border-color .2s;}
.saved-essay-row:hover{border-color:#2d9e6b;}
.saved-essay-info{flex:1;min-width:0;}
.saved-essay-title{font-weight:700;font-size:14px;color:#222;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.saved-essay-meta{font-size:12px;color:#999;line-height:1.5;}
.saved-essay-level{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700;margin-left:6px;}
.saved-essay-actions{display:flex;gap:6px;flex-shrink:0;}
.btn-load-essay{padding:5px 12px;background:#edfaf3;border:1.5px solid #2d9e6b;border-radius:7px;font-size:12px;color:#1a6b4a;font-weight:700;}
.btn-del-essay{padding:5px 10px;background:#fff5f5;border:1.5px solid #e05c5c;border-radius:7px;font-size:12px;color:#e05c5c;font-weight:700;}
/* ── Lesing reader layout ── */
.lesing-reader-layout{display:grid;grid-template-columns:1fr 260px;gap:16px;align-items:start;}
@media(max-width:780px){.lesing-reader-layout{grid-template-columns:1fr;}}
.lesing-lookup-panel{position:sticky;top:16px;}
.lesing-lookup-panel .card{margin-bottom:10px;}
.lesing-lookup-panel .card h3{font-size:13px;color:#1a6b4a;font-weight:700;margin-bottom:10px;}
.lookup-word-input{width:100%;padding:9px 12px;border-radius:9px;border:1.5px solid #dde;font-size:14px;font-family:inherit;margin-bottom:8px;}
.lookup-word-input:focus{border-color:#2d9e6b!important;outline:none;box-shadow:0 0 0 3px rgba(45,158,107,.13);}
.lookup-result-box{background:#f8fdf9;border-radius:9px;padding:10px 12px;margin-bottom:8px;font-size:13px;line-height:1.6;min-height:36px;}
.lookup-in-bank{background:#edfaf3;border-left:3px solid #2d9e6b;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:8px;}
.lookup-in-bank .wn{font-weight:700;color:#1a6b4a;}
.lookup-in-bank .wm{color:#777;font-size:12px;}
/* ── Word Sort (Setningsbygging) game ── */
.ws-pool-area{display:flex;flex-wrap:wrap;gap:8px;min-height:52px;padding:12px;background:#f8fdf9;border-radius:10px;border:1.5px dashed #c8e6c9;margin-bottom:12px;align-content:flex-start;}
.ws-answer-area{display:flex;flex-wrap:wrap;gap:8px;min-height:56px;padding:12px;background:#fff;border-radius:10px;border:2px solid #2d9e6b;margin-bottom:14px;align-items:flex-start;align-content:flex-start;}
.ws-answer-area.empty{border-color:#dde;background:#fafafa;}
.ws-token{padding:8px 14px;border-radius:20px;background:#e8f5ee;border:1.5px solid #2d9e6b;color:#1a6b4a;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s;user-select:none;line-height:1.3;}
.ws-token:hover{background:#d4edda;transform:translateY(-1px);box-shadow:0 2px 6px rgba(45,158,107,.2);}
.ws-token.in-pool{background:#f0f4f8;border-color:#ccd;color:#555;}
.ws-token.in-pool:hover{background:#e4eaf2;border-color:#2d9e6b;color:#1a6b4a;}
.ws-token.selected{background:#1a6b4a;color:#fff;border-color:#1a6b4a;box-shadow:0 2px 8px rgba(26,107,74,.3);}
.ws-token.selected:hover{background:#1a6b4a;transform:none;}
.ws-correct-box{background:#edfaf3;border-left:4px solid #2d9e6b;border-radius:8px;padding:12px 16px;font-size:15px;color:#1a6b4a;font-weight:700;margin-top:14px;line-height:1.6;}
.ws-wrong-box{background:#fff5f5;border-left:4px solid #e05c5c;border-radius:8px;padding:12px 16px;font-size:14px;color:#555;margin-top:14px;line-height:1.6;}
.ws-wrong-original{color:#1a6b4a;font-style:italic;margin-top:6px;font-size:13px;}
.ws-done{background:#fff;border-radius:14px;padding:50px 30px;text-align:center;border:1px solid #e8ecf0;}
.ws-done-emoji{font-size:60px;margin-bottom:14px;}
.ws-done-score{font-size:28px;font-weight:800;color:#1a6b4a;margin-bottom:6px;}
.ws-done-pct{font-size:17px;color:#888;margin-bottom:28px;}
/* ── Read indicator on text cards ── */
.lesing-read-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;background:#edfaf3;color:#2d9e6b;border:1px solid #b6e8ce;margin-bottom:8px;}
.lesing-unread-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:10px;font-size:11px;font-weight:700;background:#f5f5f5;color:#bbb;border:1px solid #e0e0e0;margin-bottom:8px;}
/* ── Statistics tab ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.stat-box{background:#fff;border-radius:12px;padding:20px 18px;border:1px solid #e8ecf0;text-align:center;}

<script>

  arbeid:[
    {title:"Arbeidsmarkedet i endring",text:"Automatisering og kunstig intelligens endrer arbeidsmarkedet i stor fart. Skriv en tekst der du diskuterer hvilke yrker som er truet, og hva som kan gjøres for å forberede arbeidstakere på fremtidens arbeidsmarked."},
    {title:"Deltidsarbeid",text:"Norge har en høy andel deltidsansatte, særlig blant kvinner. Diskuter fordeler og ulemper ved deltidsarbeid – for den ansatte, for arbeidsgiveren og for samfunnet som helhet."},
    {title:"Fagforeninger og arbeidsliv",text:"Fagforeninger spiller en sentral rolle i det norske arbeidslivet. Skriv en tekst om fagforeningenes betydning for arbeidstakernes rettigheter og for den norske arbeidslivsmodellen."},
    {title:"Jobbsøking og karriere",text:"Det kan være utfordrende å finne jobb i et nytt land. Skriv en tekst om hva som er viktig når man søker jobb i Norge, og hva som kan gjøres for å støtte innvandrere som ønsker å komme inn i arbeidslivet."},

  demokrati:[
    {title:"Demokrati under press",text:"Demokratiet er under press i mange land. Skriv en tekst om hva som truer demokratiet, og hva som kan gjøres for å beskytte demokratiske verdier og institusjoner."},
    {title:"Valgdeltakelse",text:"Valgdeltakelsen synker i mange demokratier. Diskuter årsaker til lav valgdeltakelse og hva som kan gjøres for å engasjere flere innbyggere i politiske prosesser."},
    {title:"Ytringsfrihet og grenser",text:"Ytringsfrihet er en grunnleggende demokratisk verdi, men har den noen grenser? Skriv en tekst om balansen mellom ytringsfrihet og beskyttelse mot hatefulle ytringer og desinformasjon."},
    {title:"Politisk polarisering",text:"Samfunnet blir stadig mer polarisert politisk. Diskuter hva som driver politisk polarisering, og hva som kan gjøres for å skape en mer konstruktiv politisk debatt."},

    {title:"Familiestrukturer i endring",text:"Familiestrukturer har endret seg mye de siste tiårene. Skriv en tekst om ulike familieformer i det moderne Norge, og diskuter hva disse endringene betyr for samfunnet."},
    {title:"Foreldrepermisjon",text:"Norge har en generøs foreldrepermisjon, men det er fortsatt ulikheter mellom mødre og fedre i uttak av permisjon. Diskuter hva en god foreldrepermisjonspolitikk bør inneholde."},
    {title:"Generasjonskonflikter",text:"Eldre og yngre generasjoner har ofte ulike verdier og prioriteringer. Skriv en tekst om typiske generasjonskonflikter i dag, og hva som kan bidra til bedre forståelse mellom generasjonene."},
    {title:"Barneoppdragelse",text:"Hva er god barneoppdragelse? Verdier og metoder for barneoppdragelse varierer mellom kulturer og generasjoner. Skriv en tekst om hva du mener er viktigst å lære barn, og begrunne dette."},
  ],
  helse:[
    {title:"Psykisk helse",text:"Psykiske lidelser er blitt en av de største helseutfordringene i Norge. Skriv en tekst der du diskuterer årsaker og mulige tiltak – både på individnivå og samfunnsnivå."},
    {title:"Livsstil og helse",text:"Livsstilssykdommer er en voksende utfordring i mange land. Skriv en tekst om sammenhengen mellom livsstil og helse, og hva samfunnet kan gjøre for å bedre folkehelsen."},
    {title:"Velferdsstaten og helse",text:"Norge har et av verdens beste helsevesen. Diskuter fordeler og utfordringer ved den norske velferdsstaten, og hva som trengs for å bevare den i fremtiden."},
    {title:"Rus og avhengighet",text:"Rus og avhengighet er et sammensatt samfunnsproblem. Skriv en tekst om hvordan samfunnet bør håndtere utfordringer knyttet til rusmiddelbruk."},

let statsCache = null;

async function loadStats(){
  try{
    const r = await api("/api/stats");
    if(!r.ok) return {events:[]};
    const raw = await r.json();
    // Normalize to flat event shape: {type, ts, ...payload}
    const events = (raw.events||[]).map(e=>({
      type: e.event_type,
      ts: e.created_at,
      ...(e.payload||{}),
    }));
    statsCache = {events};
    return statsCache;
  }catch(e){ return {events:[]}; }
}

function trackEvent(type, data){
  statsCache = null; // invalidate so next stats view re-fetches
  api("/api/stats", {
    method:"POST",
    body:JSON.stringify({event_type:type, payload:data||{}}),
  }).catch(()=>{}); // silent — tracking must never break the app
}

async function syncEssaysFromServer(){
  try{
    const r = await api("/api/essays");
    if(!r.ok) return;
    const serverEssays = await r.json();
    if(!Array.isArray(serverEssays)) return;
    // Merge with any locally-only entries (those without a server-style UUID id)
    const serverIds = new Set(serverEssays.map(e=>e.id));
    const localOnly = loadEssayBank().filter(e=>!serverIds.has(e.id));
    const merged = [...serverEssays.map(e=>({
      id: e.id, title: e.title, text: e.text, topic: e.topic,
      promptId: e.prompt_id, claudeLevel: e.claude_level,
      savedAt: new Date(e.created_at).getTime(),
    })), ...localOnly];
    saveEssayBank(merged);
  }catch(e){}
}

async function saveCurrentEssay(){
  const ta=$("essay-ta");
  const essayText=(ta?ta.value:state.essay).trim();
  if(!essayText){toast("Ingen tekst å lagre – skriv noe først!");return;}
  const bank=loadEssayBank();
  const promptId=state.currentPrompt?.id||"";
  const snippet=essayText.substring(0,80);
  const existIdx=bank.findIndex(e=>e.promptId===promptId&&e.text.substring(0,80)===snippet);
  const entry={
    id: existIdx>=0?bank[existIdx].id:"essay_"+Date.now(),
    title: state.currentPrompt?.title||"Uten tittel",
    topic: state.currentTopic||"",
    topicName: state.currentTopic?(TOPICS[state.currentTopic]?.name||state.currentTopic):"",
    promptId,
    promptText: state.currentPrompt?.text||"",
    text: essayText,
    wordCount: wcCount(essayText),
    savedAt: new Date().toISOString(),
    claudeLevel: null,
  };
  if(existIdx>=0){ bank[existIdx]=entry; }else{ bank.unshift(entry); }
  saveEssayBank(bank);
  // Sync to server (fire-and-forget; on success update local id with server id)
  try{
    const r = await api("/api/essays",{method:"POST",body:JSON.stringify({
      title:entry.title, text:entry.text,
      topic:entry.topic||"annet",
      prompt_id:entry.promptId||null,
      claude_level:entry.claudeLevel||null,
    })});
    if(r.ok){
      const sv=await r.json();
      const b=loadEssayBank();
      const i=b.findIndex(e=>e.id===entry.id);
      if(i>=0){b[i].id=sv.id; saveEssayBank(b);}
    }
  }catch{}
  trackEvent("essay_saved",{title:entry.title,topic:entry.topic,topicName:entry.topicName,wordCount:entry.wordCount,promptId:entry.promptId});
  toast("✅ Essayet er lagret!");
  refreshEssayBank();
}

function deleteEssay(id){
  const bank=loadEssayBank().filter(e=>e.id!==id);
  saveEssayBank(bank);
  refreshEssayBank();
  api(`/api/essays/${encodeURIComponent(id)}`,{method:"DELETE"}).catch(()=>{});
}

function loadEssayIntoEditor(entry){
  state.essay=entry.text;
  const ta=$("essay-ta"); if(ta) ta.value=entry.text;
  // Restore topic/prompt if different
  if(entry.topic && TOPICS[entry.topic]){
    state.currentTopic=entry.topic;
    // Try to find the matching prompt
    const prompts=TOPICS[entry.topic]?.prompts||[];
    const found=prompts.find(p=>p.id===entry.promptId||p.text===entry.promptText);
    if(found) state.currentPrompt=found; else if(prompts.length) state.currentPrompt=prompts[0];
  }
  updateWritePanel();
  const egr=$("essay-grammar-result"); if(egr){egr.innerHTML="";egr.style.display="none";}
  renderTabs(); renderContent();
  toast("📂 Essay lastet inn!");
}

function el(tag, props, ...kids){
  const e = document.createElement(tag);
  for(const [k,v] of Object.entries(props||{})){
    if(k==="class") e.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(typeof v==="function") e.addEventListener(k,v);
    else if(v!==null&&v!==undefined&&v!==false) e.setAttribute(k,v);
  }
  kids.flat(3).forEach(c=>{ if(c!=null) e.appendChild(typeof c==="string"?document.createTextNode(c):c); });
  return e;
}

// Returns words matching current topic + time + search filters
function getFilteredWords(){
  let filtered=state.words;
  if(state.topicFilter) filtered=filtered.filter(w=>w.topic===state.topicFilter);
  if(state.timeFilter){
    const cutoff=Date.now()-state.timeFilter*24*60*60*1000;
    filtered=filtered.filter(w=>(w.createdAt||0)>=cutoff);
  }
  if(state.search) filtered=filtered.filter(w=>
    w.word.toLowerCase().includes(state.search.toLowerCase())||
    w.meaning.toLowerCase().includes(state.search.toLowerCase()));
  return filtered;
}

// Renders only the word-list section — never touches the form inputs
function renderWordList(){
  const container=$("word-list"); if(!container)return;
  container.innerHTML="";
  const filtered=getFilteredWords();

  if(state.words.length===0){
    container.appendChild(el("div",{class:"empty-state"},
      el("div",{class:"big"},"📖"),
      el("p",{style:{fontSize:"16px",marginBottom:"6px"}},"Ingen ord ennå!"),
      el("p",{style:{fontSize:"14px"}},"Legg til ord fra boken din ovenfor, eller importer en fil.")));
    return;
  }
  let anyShown=false;
  CATS.forEach(cat=>{
    const cw=filtered.filter(w=>(w.category===cat.key || (w.category==="temaord" && cat.key==="enkeltord")));
    if(!cw.length)return;
    anyShown=true;
    const sec=el("div",{class:"cat-section"});
    const title=el("div",{class:"cat-title"});
    title.appendChild(el("span",{class:"cat-dot",style:{background:cat.color}}));
    title.appendChild(document.createTextNode(`${cat.label} (${cw.length})`));
    sec.appendChild(title);
    const grid=el("div",{class:"word-grid"});
    cw.forEach(w=>{
      const chip=el("div",{class:"word-chip",style:{borderLeftColor:cat.color}});
      const info=el("div",{style:{flex:"1",minWidth:"0"}});
      const wn=el("div",{class:"wn"},w.word);
      if(w.topic) wn.appendChild(el("span",{class:"word-topic-tag"},w.topic));
      info.appendChild(wn);
      if(w.meaning)info.appendChild(el("div",{class:"wm"},w.meaning));
      chip.appendChild(info);
      chip.appendChild(el("button",{class:"btn-del",title:"Fjern",
        click(){const wid=w.id;state.words=state.words.filter(x=>x.id!==wid);saveStorage();renderWordList();renderTabs();api(`/api/words/${encodeURIComponent(wid)}`,{method:"DELETE"}).catch(()=>{});}
      },"×"));
      grid.appendChild(chip);
    });
    sec.appendChild(grid); container.appendChild(sec);
  });
  if(!anyShown) container.appendChild(el("div",{class:"empty-state"},el("p",{},state.search?`Ingen ord matcher søket "${state.search}"`:state.topicFilter?`Ingen ord i tema "${state.topicFilter}"`:"Ingen ord i denne kategorien")));
}

// ── DICTIONARY LOOKUP ────────────────────────────────────────────────
async function lookupWord(){
  const word=($("fi-word")?.value||form.word).trim();
  if(!word){$("fi-word")?.focus();return;}

  const btn=$("btn-lookup"), status=$("lookup-status");
  if(!status)return;
  btn.disabled=true;
  btn.innerHTML='<span class="spinning">⏳</span>';
  status.innerHTML='<span style="color:#999">Henter oversettelse…</span>';

  try{
    const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=no|en`;
    const res=await fetch(url);
    if(!res.ok)throw new Error("HTTP "+res.status);
    const data=await res.json();

    if(data.responseStatus===200&&data.responseData?.translatedText){
      const tr=data.responseData.translatedText;
      const mi=$("fi-meaning");
      if(mi){mi.value=tr;form.meaning=tr;}
      const orbUrl=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
      status.innerHTML=`<span style="color:#2d9e6b">✓ <strong>${tr}</strong></span>&ensp;·&ensp;<a href="${orbUrl}" target="_blank">Se i Bokmålsordboka →</a>`;
    } else {
      const orbUrl=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
      status.innerHTML=`<span style="color:#e8901a">Ingen automatisk oversettelse.</span>&ensp;<a href="${orbUrl}" target="_blank">Slå opp i Bokmålsordboka →</a>`;
    }
  }catch{
    const orbUrl=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
    status.innerHTML=`<span style="color:#e8901a">Trenger internett-tilkobling.</span>&ensp;<a href="${orbUrl}" target="_blank">Slå opp i Bokmålsordboka →</a>`;
  }
  btn.disabled=false; btn.textContent="🔍";
}

async function addWord(){
  const word=form.word.trim(); if(!word){$("fi-word")?.focus();return;}
  const tempId="tmp_"+Date.now();
  const entry={id:tempId,word,meaning:form.meaning.trim(),category:form.category,topic:form.topic.trim(),createdAt:Date.now(),forms:[],flashcard_options:[]};
  state.words.push(entry);
  form.word=""; form.meaning=""; form.topic="";
  saveStorage();
  const wi=$("fi-word"),mi=$("fi-meaning"),ti=$("fi-topic");
  if(wi){wi.value="";wi.focus();} if(mi)mi.value=""; if(ti)ti.value="";
  renderWordList(); renderTabs();
  // Persist to server and swap temp ID with server UUID
  try{
    const r=await api("/api/words",{method:"POST",body:JSON.stringify({
      word:entry.word, meaning:entry.meaning, category:entry.category,
      topic:entry.topic||"annet", forms:[], flashcard_options:[],
    })});
    if(r.ok){
      const sv=await r.json();
      const idx=state.words.findIndex(w=>w.id===tempId);
      if(idx>=0){state.words[idx]={...state.words[idx],...sv,createdAt:new Date(sv.created_at).getTime()};}
      saveStorage(); renderWordList();
    }
  }catch{}
}

function exportWords(){
  if(!state.words.length){toast("Ingen ord å eksportere.");return;}
  const data=JSON.stringify(state.words.map(({word,meaning,category,topic,createdAt})=>({word,meaning,category,topic:topic||"",createdAt:createdAt||Date.now()})),null,2);
  const a=el("a",{href:URL.createObjectURL(new Blob([data],{type:"application/json"})),download:"ordbank.json"});
  a.click(); URL.revokeObjectURL(a.href);
  toast(`✓ ${state.words.length} ord eksportert som ordbank.json`);
}

function importWords(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const text=e.target.result; let imported=[];
    try{
      if(file.name.endsWith(".json")){
        const p=JSON.parse(text);
        if(Array.isArray(p)) imported=p.filter(w=>w.word).map(w=>({
          word:String(w.word).trim(),
          meaning:String(w.meaning||"").trim(),
          category:CAT_MAP[w.category]?w.category:"enkeltord",
          topic:String(w.topic||"").trim(),
          createdAt:w.createdAt||Date.now(),
        }));
      } else {
        text.split(/\r?\n/).filter(l=>l.trim()&&!l.startsWith("#")).forEach(line=>{
          const parts=line.split(/[,;\t]/).map(s=>s.trim());
          if(parts[0]){
            let word=parts[0], meaning=parts[1]||"", category=parts[2]||"enkeltord", topic=parts[3]||"";
            if(parts.length===1){
              const m=line.match(/^(.+?)\s*[-:]\s*(.+)$/);
              if(m){word=m[1].trim();meaning=m[2].trim();}
            }
            if(!CAT_MAP[category])category="enkeltord";
            imported.push({word,meaning,category,topic,createdAt:Date.now()});
          }
        });
      }
    }catch{toast("Kunne ikke lese filen. Sjekk formatet.");return;}
    if(!imported.length){toast("Ingen ord funnet i filen.");return;}
    const existing=new Set(state.words.map(w=>w.word.toLowerCase()));
    let added=0;
    imported.forEach(w=>{
      if(!existing.has(w.word.toLowerCase())){
        state.words.push({id:Date.now()+Math.random()*9999,...w});
        existing.add(w.word.toLowerCase()); added++;
      }
    });
    saveStorage(); renderWordList(); renderTabs();
    toast(`✓ ${added} nye ord importert! (${imported.length-added} duplikater hoppet over)`);
  };
  reader.readAsText(file,"UTF-8");
}

// ── SETNINGER TAB ────────────────────────────────────────────────────
function buildSetninger(){
  const frag=document.createDocumentFragment();

  if(state.words.length===0){
    frag.appendChild(el("div",{class:"empty-state",style:{padding:"60px 20px"}},
      el("div",{class:"big"},"💬"),

      el("button",{style:{padding:"10px 24px",background:"#1a6b4a",color:"#fff",border:"none",borderRadius:"9px",fontSize:"14px",fontWeight:"700"},
        click(){setTab("ordbank");}
      },"+ Legg til ord")));
    return frag;
  }

  // ── Topic filter bar ──
  const topics=getTopics();
  if(topics.length>0){
    const filterBar=el("div",{class:"topic-filter-bar",style:{marginBottom:"14px"}});
    filterBar.appendChild(el("span",{style:{fontSize:"11px",color:"#aaa",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginRight:"6px",alignSelf:"center"}},"TEMA:"));
    const allCount=state.words.length;
    filterBar.appendChild(el("button",{class:"topic-chip"+(state.sentTopicFilter===""?" active":""),
      click(){state.sentTopicFilter="";state.wordIdx=0;renderContent();}},`Alle (${allCount})`));
    topics.forEach(topic=>{
      const count=state.words.filter(w=>w.topic===topic).length;
      filterBar.appendChild(el("button",{class:"topic-chip"+(state.sentTopicFilter===topic?" active":""),
        click(){state.sentTopicFilter=topic;state.wordIdx=0;renderContent();}},`${topic} (${count})`));
    });
    frag.appendChild(filterBar);
  }

  const sentWords=getSentWords();
  if(sentWords.length===0){
    frag.appendChild(el("div",{class:"empty-state"},
      el("p",{style:{fontSize:"15px"}},`Ingen ord med tema "${state.sentTopicFilter}".`)));
    return frag;
  }

  // Clamp index
  if(state.wordIdx>=sentWords.length) state.wordIdx=0;
  const word=sentWords[state.wordIdx];
  const actualCat=word.category==="temaord"?"enkeltord":word.category;
  const cat=CAT_MAP[actualCat]||CATS[0];
  const total=sentWords.length;
  const doneCount=sentWords.filter(w=>state.sentences[w.id]?.trim()).length;
  const currentSentence=state.sentences[word.id]||"";

  // ── Navigation bar ──
  const nav=el("div",{class:"sent-nav"});
  nav.appendChild(el("button",{class:"btn-nav",disabled:state.wordIdx===0?"":null,
    click(){state.wordIdx--;renderContent();}
  },"← Forrige"));
  nav.appendChild(el("div",{class:"sent-progress"},
    el("strong",{},`${state.wordIdx+1} / ${total}`),` ord  ·  ${doneCount} setninger skrevet`));
  nav.appendChild(el("button",{class:"btn-nav",disabled:state.wordIdx===total-1?"":null,
    click(){state.wordIdx++;renderContent();}
  },"Neste →"));
  frag.appendChild(nav);

  // ── Word card ──
  const card=el("div",{class:"sent-card"});
  card.appendChild(el("div",{class:"sent-word"},word.word));
  const meta=el("div",{class:"sent-meta"});
  meta.appendChild(el("span",{class:"sent-cat",style:{background:cat.color+"18",color:cat.color}},cat.label));
  if(word.topic) meta.appendChild(el("span",{class:"sent-topic-badge"},word.topic));
  if(word.meaning) meta.appendChild(el("span",{class:"sent-meaning"},word.meaning));
  card.appendChild(meta);

  const hints={
    enkeltord:`Bruk ordet "${word.word}" i en fullstendig setning. Tenk på riktig bøyning!`,
    uttrykk:`Bruk uttrykket "${word.word}" naturlig i en setning. Jobb med kontekst og flyt.`,
    koblingsord:`Koble to tanker med "${word.word}". Koblingsord skaper logisk sammenheng mellom setningsdeler.`,
  };
  card.appendChild(el("p",{class:"sent-prompt"},hints[actualCat]||`Lag en setning med "${word.word}".`));

  const ta=el("textarea",{id:"sent-ta",class:"sent-area",
    placeholder:`Skriv én setning med "${word.word}" her…`,
    input:onSentenceInput});
  ta.value=currentSentence;
  card.appendChild(ta);

  const fb=el("div",{id:"sent-feedback",class:"sent-feedback"});
  fillSentenceFeedback(fb,currentSentence,word);
  card.appendChild(fb);

  const grammarDiv=el("div",{id:"grammar-result",class:"grammar-result",style:{display:"none"}});
  card.appendChild(grammarDiv);

  // Action buttons
  const actions=el("div",{class:"sent-actions"});
  actions.appendChild(el("button",{class:"btn-next-sent",
    click(){
      const t=$("sent-ta"); if(t) state.sentences[word.id]=t.value;
      saveSentences();
      if(state.wordIdx<total-1){state.wordIdx++;renderContent();}
      else{renderContent();}
    }
  },state.wordIdx<total-1?"Lagre og neste ord →":"Lagre"));

  actions.appendChild(el("button",{class:"btn-sec",title:"Grammatikksjekk via Claude AI",
    click:()=>checkGrammar(word.word, $("sent-ta")?.value||currentSentence)},"🤖 Sjekk med Claude"));

  if(currentSentence.trim()){
    actions.appendChild(el("button",{class:"btn-skip",
      click(){
        const t=$("sent-ta"); if(t){t.value="";state.sentences[word.id]="";}
        saveSentences(); updateSentencePanel();
      }
    },"Slett setning"));
  }
  actions.appendChild(el("button",{class:"btn-skip",
    click(){
      const unwritten=sentWords.map((w,i)=>({w,i})).filter(({w})=>!state.sentences[w.id]?.trim());
      if(unwritten.length){state.wordIdx=unwritten[Math.floor(Math.random()*unwritten.length)].i;renderContent();}
      else toast("Alle ord har setninger!");
    }
  },"Tilfeldig ord"));
  card.appendChild(actions);
  frag.appendChild(card);

  // ── Previously written sentences ──
  const written=sentWords.filter(w=>state.sentences[w.id]?.trim()&&w.id!==word.id);
  if(written.length){
    const prev=el("div",{class:"prev-sentences"});
    prev.appendChild(el("h3",{},"Setninger du har skrevet"));
    written.slice().reverse().forEach(w=>{
      const item=el("div",{class:"prev-sent-item",
        click(){state.wordIdx=sentWords.indexOf(w);renderContent();}});
      item.style.cursor="pointer";
      item.appendChild(el("div",{class:"prev-sent-word"},w.word));
      item.appendChild(el("div",{class:"prev-sent-text"},state.sentences[w.id]));
      prev.appendChild(item);
    });
    frag.appendChild(prev);
  }

  const exportBtn=el("button",{class:"btn-io",style:{marginTop:"14px",marginBottom:"14px"},
    click:exportSentencesByTopic},"⬇️ Eksporter setninger");
  frag.appendChild(exportBtn);
  return frag;
}

  const grammarDiv=$("grammar-result");
  if(!grammarDiv)return;
  grammarDiv.innerHTML='';
  grammarDiv.style.display="block";

  // Loading indicator
  const loading=el("div",{style:{color:"#888",fontSize:"13px",padding:"8px 0"}},"🤖 Spør Claude…");
  grammarDiv.appendChild(loading);

  await checkWithClaude(word, sentence, grammarDiv);
}

    box.appendChild(el("ol",{style:{marginTop:"8px",marginLeft:"18px",lineHeight:"2"}},
      el("li",{},"Åpne en terminal i samme mappe som HTML-filen"),
      el("li",{},el("span",{},"Kjør: "),el("code",{style:{background:"#f0f0f0",padding:"2px 8px",borderRadius:"4px",fontWeight:"700"}},"python3 start_server.py")),

    ));
    container.appendChild(box);
    return;
  }
  const systemPrompt=`You are a Norwegian language teacher evaluating a sentence written by a B2-level learner. Respond ONLY with valid JSON — no prose, no markdown — in exactly this structure:
{
  "correct": boolean,
  "natural": boolean,
  "overall": "1–2 sentence assessment in English",
  "errors": [{"text":"problematic word or phrase","issue":"brief explanation","fix":"corrected form"}],
  "improved": "full improved sentence, or null if already correct and natural",
  "tip": "one short pedagogical tip, or null"
}`;

  const userMsg=`I'm a Norwegian learner (B2 level) practicing the word/expression: "${word}"\n\nPlease evaluate this sentence:\n"${sentence}"`;

  try{
    const res=await fetch("/api/proxy/claude",{
      method:"POST",
      headers:{"Content-Type":"application/json","X-Auth-Token":state.sessionToken},
      body:JSON.stringify({
        model:"claude-haiku-4-5-20251001",
        max_tokens:600,
        system:systemPrompt,
        messages:[{role:"user",content:userMsg}],
      }),
    });

    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error?.message||`HTTP ${res.status}`);
    }

    const data=await res.json();
    const rawText=data.content?.[0]?.text||"{}";
    // Strip any accidental markdown fences
    const jsonText=rawText.replace(/```json?\n?/gi,"").replace(/```/g,"").trim();
    const result=JSON.parse(jsonText);
    renderClaudeResult(result, container);

  }catch(err){
    container.innerHTML="";
    const isKeyError=err.message?.includes("401")||err.message?.includes("403")||err.message?.includes("invalid");
    container.appendChild(el("div",{style:{background:"#fff5f5",borderLeft:"3px solid #e05c5c",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#555"}},
      isKeyError
        ? "❌ Ugyldig API-nøkkel. Sjekk nøkkelen i Innstillinger."
        : `❌ Feil: ${err.message}. Prøv igjen, eller bruk LanguageTool (fjern nøkkelen).`
    ));
  }
}

function renderClaudeResult(r, container){
  container.innerHTML="";
  const isOk=r.correct&&r.natural;
  const isPartial=r.correct&&!r.natural;

  // Header
  const hdr=el("div",{class:`claude-header ${isOk?"ok":isPartial?"warn":"err"}`});
  hdr.appendChild(document.createTextNode(
    isOk?"✓ Korrekt og naturlig!":isPartial?"~ Grammatisk riktig, men litt unaturlig":"✗ Feil funnet"
  ));
  const resultBox=el("div",{class:"claude-result"});
  resultBox.appendChild(hdr);

  const body=el("div",{class:"claude-body"});
  if(r.overall) body.appendChild(el("div",{class:"claude-overall"},r.overall));

  // Errors
  if(r.errors&&r.errors.length){
    r.errors.forEach(e=>{
      const card=el("div",{class:"claude-error-card"});
      if(e.text)  card.appendChild(el("div",{class:"claude-error-text"},`"${e.text}"`));
      if(e.issue) card.appendChild(el("div",{class:"claude-error-issue"},e.issue));
      if(e.fix)   card.appendChild(el("div",{class:"claude-error-fix"},`→ ${e.fix}`));
      body.appendChild(card);
    });
  }

  // Improved sentence
  if(r.improved){
    const imp=el("div",{class:"claude-improved"});
    imp.appendChild(el("div",{class:"claude-improved-label"},"Forbedret setning"));
    imp.appendChild(el("div",{class:"claude-improved-text"},r.improved));
    body.appendChild(imp);
  }

  // Tip
  if(r.tip) body.appendChild(el("div",{class:"claude-tip"},`💡 ${r.tip}`));

  resultBox.appendChild(body);
  container.appendChild(resultBox);
}

// ── LanguageTool fallback ─────────────────────────────────────────────
async function checkWithLanguageTool(sentence, container){
  try{
    const res=await fetch("https://api.languagetool.org/v2/check",{
      method:"POST",
      headers:{"Content-Type":"application/x-www-form-urlencoded"},
      body:`text=${encodeURIComponent(sentence)}&language=nb`,
    });
    const data=await res.json();
    container.innerHTML="";
    if(!data.matches||data.matches.length===0){
      container.appendChild(el("div",{class:"grammar-ok"},"✓ Ingen grammatikkfeil funnet (LanguageTool)"));
    } else {
      data.matches.forEach(m=>{
        const card=el("div",{class:"grammar-error"});
        card.appendChild(el("div",{},el("span",{class:"em"},m.message)));
        if(m.replacements?.length)
          card.appendChild(el("div",{style:{fontSize:"12px",color:"#2d9e6b",marginTop:"3px"}},
            `Forslag: ${m.replacements.slice(0,3).map(r=>r.value).join(", ")}`));
        container.appendChild(card);
      });
    }
  }catch{
    container.innerHTML='<span style="color:#e8901a;font-size:13px">Ingen internettforbindelse. Legg til Claude API-nøkkel for offline-bruk.</span>';
  }
}

function exportSentencesByTopic(){
  const byTopic = {};
  const noTopic = [];

  state.words.forEach(w=>{
    const sent = state.sentences[w.id];
    if(sent && sent.trim()){
      if(w.topic && w.topic.trim()){
        if(!byTopic[w.topic]) byTopic[w.topic] = [];
        byTopic[w.topic].push({word: w.word, sent});
      } else {
        noTopic.push({word: w.word, sent});
      }
    }
  });

  let content = "";
  Object.keys(byTopic).sort().forEach(topic=>{
    content += `=== TEMA: ${topic.charAt(0).toUpperCase() + topic.slice(1)} ===\n\n`;
    byTopic[topic].forEach(({word, sent})=>{
      content += `${word}\n→ ${sent}\n\n`;
    });
  });

  if(noTopic.length>0){
    content += `=== UTEN TEMA ===\n\n`;
    noTopic.forEach(({word, sent})=>{
      content += `${word}\n→ ${sent}\n\n`;
    });
  }

  const a=el("a",{href:URL.createObjectURL(new Blob([content],{type:"text/plain"})),download:"setninger.txt"});
  a.click(); URL.revokeObjectURL(a.href);
  toast("✓ Setninger eksportert som setninger.txt");
}

function pickPrompt(topicKey){
  state.currentPrompt=pickRandom(PROMPTS[topicKey]);
  state.currentTopic=topicKey; state.essay=""; state.tab="skriv";
  renderTabs(); renderContent();
}
function shufflePrompt(){
  const others=PROMPTS[state.currentTopic].filter(p=>p.text!==state.currentPrompt.text);
  state.currentPrompt=pickRandom(others.length?others:PROMPTS[state.currentTopic]);
  state.essay=""; renderContent();
}
function pickRandom(arr){return arr[Math.floor(Math.random()*arr.length)];}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

}
Keep grammarErrors to the most important 3-5 errors. Keep strengths and improvements to 2-4 items each.`;

    container.appendChild(el("div",{style:{background:"#fff5f5",borderLeft:"3px solid #e05c5c",borderRadius:"8px",padding:"10px 14px",fontSize:"13px",color:"#555"}},
      isKeyError
        ? "❌ Ugyldig API-nøkkel. Sjekk nøkkelen i Innstillinger."
        : `❌ Feil: ${err.message}. Prøv igjen.`
    ));
  }
}

function updateWritePanel(){
  const used=detectUsed(state.essay,state.words);
  const wc=wcCount(state.essay);
  const goal=Math.min(5,state.words.length);
  const relTopics=getEssayRelevantTopics();
  const stats=$("write-stats"); if(stats)fillWriteStats(stats,used,wc,goal);
  const meta=$("essay-meta");  if(meta)fillEssayMeta(meta,wc);
  const chips=$("sb-chips");   if(chips)fillSidebarChips(chips,used,relTopics);
  const title=$("sb-title");   if(title)title.textContent=`📚 Ordbank (${used.size}/${state.words.length} brukt)`;
}

function fillWriteStats(el2,used,wc,goal){

  s1.innerHTML=`Ordbank-ord brukt: <strong style="color:${used.size>=goal?"#1a6b4a":"#e8901a"}">${used.size}</strong> / ${state.words.length}`;

  pm.appendChild(s1); pm.appendChild(s2); el2.appendChild(pm);

function fillSidebarChips(container, used, relevantTopics){
  container.innerHTML="";
  const relTopics = relevantTopics && relevantTopics.length ? relevantTopics : null;

  function makeUsedChip(w){
    const c=el("div",{class:"wb-chip used"});
    c.appendChild(el("div",{class:"wn"},`✓ ${w.word}`));
    if(w.meaning)c.appendChild(el("div",{class:"wm"},w.meaning));
    container.appendChild(c);
  }
  function makeUnusedChip(w, highlight){
    const actualCat=w.category==="temaord"?"enkeltord":w.category;
    const col=(CAT_MAP[actualCat]||CATS[0]).color;
    const style=highlight
      ?{background:"#f0faf5",borderLeftColor:"#2d9e6b"}
      :{borderLeftColor:col};
    const c=el("div",{class:"wb-chip",style});
    const wn=el("div",{class:"wn",style:highlight?{color:"#1a6b4a"}:{}},w.word);
    c.appendChild(wn);
    if(w.meaning)c.appendChild(el("div",{class:"wm"},w.meaning));
    if(highlight&&w.topic)c.appendChild(el("div",{style:{fontSize:"10px",color:"#2d9e6b",fontWeight:"600",marginTop:"2px"}},w.topic));
    container.appendChild(c);
  }
  function sectionLabel(text, color){
    container.appendChild(el("div",{style:{fontSize:"10px",fontWeight:"700",textTransform:"uppercase",
      letterSpacing:".5px",color:color||"#bbb",margin:"8px 0 4px",
      paddingBottom:"3px",borderBottom:"1px solid "+(color?"#2d9e6b22":"#eee")}},text));
  }

  if(relTopics){
    const relUsed    = state.words.filter(w=>used.has(w.id)   &&  relTopics.includes(w.topic));
    const relUnused  = state.words.filter(w=>!used.has(w.id)  &&  relTopics.includes(w.topic));
    const otherUsed  = state.words.filter(w=>used.has(w.id)   && !relTopics.includes(w.topic));
    const otherUnused= state.words.filter(w=>!used.has(w.id)  && !relTopics.includes(w.topic));

    if(relUsed.length||relUnused.length){
      sectionLabel("✨ Anbefalt for dette temaet","#2d9e6b");
      relUsed.forEach(makeUsedChip);
      relUnused.forEach(w=>makeUnusedChip(w,true));
    }
    if(otherUsed.length||otherUnused.length){
      if(relUsed.length||relUnused.length) sectionLabel("Andre ord i ordbanken",null);
      otherUsed.forEach(makeUsedChip);
      otherUnused.forEach(w=>makeUnusedChip(w,false));
    }
  } else {
    state.words.filter(w=>used.has(w.id)).forEach(makeUsedChip);
    state.words.filter(w=>!used.has(w.id)).forEach(w=>makeUnusedChip(w,false));
  }
}

// ── UTILS ─────────────────────────────────────────────────────────────
function detectUsed(essay,words){
  const used=new Set(); if(!essay.trim())return used;
  const low=essay.toLowerCase();
  words.forEach(w=>{ if(w.word.length>=2&&low.includes(w.word.toLowerCase()))used.add(w.id); });
  return used;
}
function wcCount(t){return t.trim()?t.trim().split(/\s+/).length:0;}

// ── FLASHCARDS TAB ───────────────────────────────────────────────────
function buildFlashcards(){
  const frag=document.createDocumentFragment();
  if(!fc.started) return buildFcSetup(frag);
  if(fc.idx>=fc.queue.length) return buildFcDone(frag);
  return buildFcCard(frag);
}

function buildFcCard(frag){
  const item=fc.queue[fc.idx];
  buildFcHeader(frag);
  if(item._type==="write") buildFcWriteCard(frag,item);
  else                      buildFcChoiceCard(frag,item);

}

// ── Choice card: show Norwegian word → pick English meaning ──
function buildFcChoiceCard(frag,word){
  const opts=word._options;

  const card=el("div",{class:"fc-card"});
  const typeBadge=el("div",{style:{fontSize:"11px",color:"#aaa",fontWeight:"700",textTransform:"uppercase",letterSpacing:".6px",marginBottom:"12px"}},"📖 Velg oversettelse");
  card.appendChild(typeBadge);
  card.appendChild(el("div",{class:"fc-word"},word.word));
  if(word.topic) card.appendChild(el("div",{class:"fc-sub"},el("span",{class:"sent-topic-badge"},word.topic)));
  card.appendChild(el("div",{class:"fc-question"},"— Hva betyr dette ordet? —"));
  frag.appendChild(card);

  const grid=el("div",{class:"fc-options"});
  opts.forEach((opt,i)=>{
    let cls="fc-opt";
    if(fc.answered){
      if(opt.correct) cls+=" correct";
      else if(i===fc.chosenIdx) cls+=" wrong";
      else cls+=" reveal";
    }
    grid.appendChild(el("button",{class:cls,disabled:fc.answered?"":null,
      click(){
        if(fc.answered)return;
        fc.answered=true; fc.chosenIdx=i;
        const w=fc.queue[fc.idx];
        if(opt.correct){fc.correct++;fc.log.push({word:w.word,meaning:w.meaning,correct:true,mode:"choice"});}
        else{fc.wrong++;fc.log.push({word:w.word,meaning:w.meaning,correct:false,mode:"choice",chosen:opt.text});}
        renderContent();
      }
    },opt.text));
  });
  frag.appendChild(grid);

  if(fc.answered){
    const wasOk=opts[fc.chosenIdx]?.correct;
    const fb=el("div",{class:"fc-feedback"});
    fb.appendChild(el("div",{class:wasOk?"fc-feedback-ok":"fc-feedback-err"},wasOk?"✓ Riktig!":"✗ Feil"));
    if(!wasOk){
      const right=opts.find(o=>o.correct);
      fb.appendChild(el("div",{class:"fc-correct-hint"},`Riktig svar: ${right?.text||""}`));
    }
    frag.appendChild(fb);
    frag.appendChild(el("div",{class:"fc-nav"},
      el("button",{class:"btn-fc-next",click(){
        fc.idx++; fc.answered=false; fc.chosenIdx=null; renderContent();
      }},fc.idx<fc.queue.length-1?"Neste →":"Se resultat →")));
  }
}

// ── Write card: show English meaning → type Norwegian word ──
function buildFcWriteCard(frag,word){
  const meaning=word.meaning||"(ingen oversettelse)";
  const actualCat=word.category==="temaord"?"enkeltord":word.category;
  const cat=CAT_MAP[actualCat]||CATS[0];

  const card=el("div",{class:"fc-card"});
  card.appendChild(el("div",{style:{fontSize:"11px",color:"#aaa",fontWeight:"700",textTransform:"uppercase",letterSpacing:".6px",marginBottom:"12px"}},"✍️ Skriv det norske ordet"));
  card.appendChild(el("div",{class:"fc-word",style:{fontSize:"28px",color:"#333",fontWeight:"700"}},meaning));
  card.appendChild(el("div",{class:"fc-sub"},el("span",{class:"sent-cat",style:{background:cat.color+"18",color:cat.color}},cat.label)));
  card.appendChild(el("div",{class:"fc-question"},"— Hva er det norske ordet? —"));
  frag.appendChild(card);

  if(!fc.writeChecked){
    // Input row
    const row=el("div",{style:{display:"flex",gap:"10px",maxWidth:"520px",margin:"0 auto 16px"}});
    const inp=el("input",{
      id:"fc-write-inp",class:"text-input",type:"text",
      placeholder:"Skriv norsk ord her…",
      style:{fontSize:"16px",padding:"12px 16px",flex:"1"},
      keydown(e){if(e.key==="Enter")fcCheckWrite(inp.value,word);}
    });
    inp.value=fc.writeInput;
    row.appendChild(inp);
    row.appendChild(el("button",{class:"btn-add",style:{whiteSpace:"nowrap",padding:"12px 20px",flexShrink:"0"},

    frag.appendChild(row);
    requestAnimationFrame(()=>{const i=$("fc-write-inp");if(i){i.focus();i.setSelectionRange(i.value.length,i.value.length);}});
  } else {
    // Result
    const wasOk=fc.writeResult;
    const fb=el("div",{class:"fc-feedback"});
    fb.appendChild(el("div",{style:{fontSize:"13px",color:"#bbb",marginBottom:"6px"}},`Du svarte: "${fc.writeInput}"`));
    fb.appendChild(el("div",{class:wasOk?"fc-feedback-ok":"fc-feedback-err"},wasOk?"✓ Riktig!":"✗ Feil"));
    if(!wasOk) fb.appendChild(el("div",{class:"fc-correct-hint"},`Riktig svar: ${word.word}`));
    frag.appendChild(fb);
    frag.appendChild(el("div",{class:"fc-nav"},
      el("button",{class:"btn-fc-next",click(){
        fc.idx++; fc.answered=false; fc.chosenIdx=null;
        fc.writeInput=""; fc.writeChecked=false; fc.writeResult=false;
        renderContent();
      }},fc.idx<fc.queue.length-1?"Neste →":"Se resultat →")));
  }
}

function fcCheckWrite(input,word){
  fc.writeInput=input.trim();
  const normalize=s=>s.toLowerCase().trim().replace(/^å\s+/,"").replace(/\s+/g," ");
  fc.writeResult=normalize(fc.writeInput)===normalize(word.word);
  fc.writeChecked=true;
  if(fc.writeResult){fc.correct++;fc.log.push({word:word.word,meaning:word.meaning,correct:true,mode:"write"});}
  else{fc.wrong++;fc.log.push({word:word.word,meaning:word.meaning,correct:false,mode:"write",written:fc.writeInput});}
  renderContent();
}

function buildFcDone(frag){
  const total=fc.correct+fc.wrong;
  const pct=total?Math.round(fc.correct/total*100):0;
  if(!fc.tracked){ fc.tracked=true; trackEvent("flashcard_session",{correct:fc.correct,wrong:fc.wrong,total,pct,topicFilter:fc.topicFilter||null,words:fc.log}); }
  const emoji=pct>=80?"🎉":pct>=60?"👍":"💪";
  const msg=pct>=80?"Utmerket!":pct>=60?"Bra jobbet!":"Øv mer – du klarer det!";

  const done=el("div",{class:"fc-done"});
  done.appendChild(el("div",{class:"fc-done-emoji"},emoji));
  done.appendChild(el("div",{class:"fc-done-score"},`${fc.correct} / ${total} riktig`));
  done.appendChild(el("div",{class:"fc-done-pct"},`${pct}% — ${msg}`));
  const nav=el("div",{class:"fc-nav"});
  nav.appendChild(el("button",{class:"btn-fc-next",click:startFlashcards},"🔄 Spill igjen"));
  nav.appendChild(el("button",{class:"btn-sec",style:{padding:"12px 28px",fontSize:"14px"},
    click(){fc.started=false;renderContent();}},"⚙️ Endre innstillinger"));
  done.appendChild(nav);
  frag.appendChild(done);
  return frag;
}

function getNetMissedWords(){
  // Returns [{word,meaning,id,...bankWord, netErrors}] from all flashcard sessions
  const wrong={}, correct={}, meanings={};
  (statsCache?.events||[]).filter(e=>e.type==="flashcard_session").forEach(session=>{
    (session.words||[]).forEach(w=>{
      if(!w.correct) wrong[w.word]=(wrong[w.word]||0)+1;
      else           correct[w.word]=(correct[w.word]||0)+1;
      if(w.meaning)  meanings[w.word]=w.meaning;
    });
  });
  return Object.entries(wrong)
    .filter(([word,cnt])=>cnt>(correct[word]||0))
    .sort((a,b)=>(b[1]-(correct[b[0]]||0))-(a[1]-(correct[a[0]]||0)))
    .map(([word,cnt])=>{
      const bankWord=state.words.find(w=>w.word.toLowerCase()===word.toLowerCase());
      return bankWord
        ? {...bankWord, netErrors:cnt-(correct[word]||0), wrong:cnt, rightCount:correct[word]||0}
        : {id:"err_"+word, word, meaning:meanings[word]||"", category:"enkeltord", topic:"", netErrors:cnt-(correct[word]||0), wrong:cnt, rightCount:correct[word]||0};
    });
}

function getFcWords(){
  let w=state.words.slice();
  if(fc.topicFilter) w=w.filter(x=>x.topic===fc.topicFilter);
  if(fc.timeFilter){const cut=Date.now()-fc.timeFilter*24*60*60*1000;w=w.filter(x=>(x.createdAt||0)>=cut);}
  if(fc.errorOnly){
    const missed=new Set(getNetMissedWords().map(x=>x.word.toLowerCase()));
    w=w.filter(x=>missed.has(x.word.toLowerCase()));
  }
  if(fc.maxWords>0) w=shuffle(w).slice(0,fc.maxWords);
  return w;
}

function startFlashcards(){
  const words=getFcWords();
  if(words.length<2){toast("Trenger minst 2 ord med gjeldende filter.");return;}
  // Randomly assign card type and pre-generate options so they never reshuffle on re-render
  fc.queue=shuffle(words).map(w=>{
    const type=Math.random()<0.5?"write":"choice";
    return {...w,_type:type,_options:type==="choice"?fcGetOptions(w):null};
  });
  fc.idx=0; fc.correct=0; fc.wrong=0; fc.log=[]; fc.tracked=false;
  fc.answered=false; fc.chosenIdx=null;
  fc.writeInput=""; fc.writeChecked=false; fc.writeResult=false;
  fc.started=true;
  renderContent();
}

function fcGetOptions(word){
  const correct=word.meaning||word.word;
  const pool=shuffle(state.words.filter(w=>w.id!==word.id&&w.meaning&&w.meaning.trim())).slice(0,3).map(w=>w.meaning);
  while(pool.length<3) pool.push("—");
  return shuffle([{text:correct,correct:true},...pool.map(t=>({text:t,correct:false}))]);
}

const lesingState = { texts:null, topicFilter:"", grammarFilter:"", search:"", currentText:null };

async function loadLesingTexts(){
  if(lesingState.texts) return lesingState.texts;
  try{
    const r = await fetch("lesing-tekster.json");
    lesingState.texts = await r.json();
  } catch(e){ lesingState.texts=[]; }
  return lesingState.texts;
}

  const frag=document.createDocumentFragment();

function refreshLesingList(){
  const listDiv=$("lesing-list");
  if(!listDiv) return;
  listDiv.innerHTML="";
  if(!lesingState.texts || lesingState.texts.length===0){
    listDiv.appendChild(el("div",{class:"empty-state"},[el("div",{class:"big"},"📭"),el("p",{},"Ingen tekster lastet")]));
    return;
  }
  let filtered=lesingState.texts.filter(t=>{
    if(lesingState.topicFilter && t.topic!==lesingState.topicFilter) return false;
    if(lesingState.grammarFilter && !t.grammarFocus.some(g=>g.includes(lesingState.grammarFilter.split("-")[0]))) return false;
    if(lesingState.search){
      const q=lesingState.search.toLowerCase();
      return t.title.toLowerCase().includes(q)||t.text.toLowerCase().includes(q)||(t.keyWords||[]).some(w=>w.toLowerCase().includes(q));
    }
    return true;
  });

  if(filtered.length===0){
    listDiv.appendChild(el("div",{class:"empty-state"},[el("div",{class:"big"},"🔍"),el("p",{},"Ingen tekster passer søket")]));
    return;
  }

  const TOPIC_META={
    "språk":{emoji:"🗣️",color:"#4a90d9"},"integrering":{emoji:"🤝",color:"#e8832a"},"utdanning":{emoji:"🎓",color:"#9b59b6"},
    "familie":{emoji:"👨‍👩‍👧",color:"#e74c3c"},"natur":{emoji:"🌿",color:"#27ae60"},"politikk":{emoji:"🏛️",color:"#2980b9"},
    "arbeid":{emoji:"💼",color:"#7f8c8d"},"helse":{emoji:"🏥",color:"#e91e63"},"teknologi":{emoji:"💻",color:"#1abc9c"},
    "miljø":{emoji:"♻️",color:"#16a085"},"demokrati":{emoji:"⚖️",color:"#8e44ad"},"internasjonalt":{emoji:"🌍",color:"#d35400"}
  };

  const readIds = new Set((statsCache?.events||[]).filter(e=>e.type==="text_read").map(e=>e.textId));
  const readCounts = {};
  (statsCache?.events||[]).filter(e=>e.type==="text_read").forEach(e=>{ readCounts[e.textId]=(readCounts[e.textId]||0)+1; });

  // Texts unlocked by the user's plan (empty Set = no plan = all locked)
  const hasPlan = planState.weeks && planState.weeks.length > 0;
  const unlockedIds = hasPlan ? getUnlockedTextIds() : new Set();

  // If no plan, show a prompt above the grid
  const grid=el("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:"12px"}});

  if(!hasPlan){
    const noPlanBox = el("div",{style:{gridColumn:"1/-1",background:"#fffdf0",border:"1.5px solid #f0e68c",borderRadius:"12px",padding:"18px 22px",marginBottom:"4px",display:"flex",alignItems:"center",gap:"16px"}});
    noPlanBox.appendChild(el("div",{style:{fontSize:"28px"}},"📅"));
    const txt = el("div",{});
    txt.appendChild(el("div",{style:{fontWeight:"700",fontSize:"14px",color:"#b8860b",marginBottom:"4px"}},"Ingen studieplan aktivert"));
    txt.appendChild(el("div",{style:{fontSize:"13px",color:"#776",lineHeight:"1.5"}},"Lag en studieplan i Plan-fanen for å låse opp tekster. Alle tekster er synlige, men kun de som er inkludert i planen din kan åpnes."));
    noPlanBox.appendChild(txt);
    noPlanBox.appendChild(el("button",{style:{marginLeft:"auto",padding:"8px 16px",background:"#1a6b4a",color:"#fff",border:"none",borderRadius:"9px",fontSize:"13px",fontWeight:"700",cursor:"pointer",flexShrink:"0"},
      click(){setTab("plan");}
    },"Lag plan →"));
    grid.appendChild(noPlanBox);
  }

  filtered.forEach(text=>{
    const meta=TOPIC_META[text.topic]||{emoji:"📄",color:"#888"};
    const hasRead = readIds.has(text.id);
    const isLocked = !unlockedIds.has(text.id);

    const cardBg = isLocked ? "#f7f7f7" : (hasRead ? "#f8fdf9" : "#fff");
    const borderColor = isLocked ? "#ddd" : meta.color;
    const card = el("div",{style:{
      background:cardBg,
      borderRadius:"14px",padding:"18px",
      boxShadow: isLocked ? "none" : "0 1px 8px rgba(0,0,0,.07)",
      borderLeft:`4px solid ${borderColor}`,
      cursor: isLocked ? "default" : "pointer",
      transition:"box-shadow .2s",
      position:"relative",
    }});
    if(!isLocked){
      card.addEventListener("click",()=>{
        lesingState.currentText=text;
        trackEvent("text_read",{textId:text.id,title:text.title,topic:text.topic,level:text.level||"B2"});
        renderContent();
      });
      card.addEventListener("mouseenter",()=>{card.style.boxShadow="0 4px 20px rgba(0,0,0,.13)";});
      card.addEventListener("mouseleave",()=>{card.style.boxShadow="0 1px 8px rgba(0,0,0,.07)";});
    }

    // Topic label
    card.appendChild(el("div",{style:{fontSize:"11px",color:isLocked?"#bbb":meta.color,fontWeight:"700",textTransform:"uppercase",letterSpacing:".6px",marginBottom:"6px"}},`${meta.emoji} ${text.topic}`));

    // Status badge
    if(isLocked){
      card.appendChild(el("div",{class:"lesing-unread-badge",style:{background:"#f0f0f0",color:"#aaa"}},"🔒 Ikke i planen din"));
    } else if(hasRead){
      const times = readCounts[text.id];
      card.appendChild(el("div",{class:"lesing-read-badge"},`✓ Lest${times>1?` ${times}×`:""}`));
    } else {
      card.appendChild(el("div",{class:"lesing-unread-badge"},"Ikke lest"));
    }

    card.appendChild(el("div",{style:{fontWeight:"700",fontSize:"15px",color:isLocked?"#bbb":"#222",marginBottom:"8px",lineHeight:"1.3"}},text.title));
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#bbb",marginBottom:"10px"}},text.text.substring(0,120)+"…"));
    if(!isLocked){
      const tagRow=el("div",{style:{display:"flex",gap:"5px",flexWrap:"wrap"}});
      (text.grammarFocus||[]).slice(0,3).forEach(g=>{
        const short=g.replace("subjunksjon-","subj: ").replace("konjunksjon-","konj: ");
        tagRow.appendChild(el("span",{style:{padding:"2px 8px",borderRadius:"10px",fontSize:"11px",background:"#f0f4f8",color:"#666",fontWeight:"600"}},short));
      });
      card.appendChild(tagRow);
    }
    grid.appendChild(card);
  });
  listDiv.appendChild(el("div",{style:{fontSize:"12px",color:"#999",marginBottom:"12px"}},`${filtered.length} tekst${filtered.length!==1?"er":""} funnet`));
  listDiv.appendChild(grid);
}

function buildLesingReader(text){
  const TOPIC_META={
    "språk":{emoji:"🗣️",color:"#4a90d9"},"integrering":{emoji:"🤝",color:"#e8832a"},"utdanning":{emoji:"🎓",color:"#9b59b6"},
    "familie":{emoji:"👨‍👩‍👧",color:"#e74c3c"},"natur":{emoji:"🌿",color:"#27ae60"},"politikk":{emoji:"🏛️",color:"#2980b9"},
    "arbeid":{emoji:"💼",color:"#7f8c8d"},"helse":{emoji:"🏥",color:"#e91e63"},"teknologi":{emoji:"💻",color:"#1abc9c"},
    "miljø":{emoji:"♻️",color:"#16a085"},"demokrati":{emoji:"⚖️",color:"#8e44ad"},"internasjonalt":{emoji:"🌍",color:"#d35400"}
  };
  const meta=TOPIC_META[text.topic]||{emoji:"📄",color:"#888"};
  const frag=document.createDocumentFragment();

  // Back button
  const backBtn=el("button",{class:"btn-io",style:{marginBottom:"14px",display:"flex",alignItems:"center",gap:"6px"},
    click(){lesingState.currentText=null; renderContent();}});
  backBtn.innerHTML="← Tilbake til tekstlisten";
  frag.appendChild(backBtn);

  // Two-column layout: reader + lookup panel
  const layout=el("div",{class:"lesing-reader-layout"});

  // Reader card
  const card=el("div",{class:"card"});
  card.appendChild(el("div",{style:{fontSize:"12px",color:meta.color,fontWeight:"700",textTransform:"uppercase",letterSpacing:".6px",marginBottom:"8px"}},`${meta.emoji} ${text.topic} · B2`));
  card.appendChild(el("h2",{style:{fontSize:"22px",fontWeight:"800",color:"#1a1a1a",marginBottom:"16px",lineHeight:"1.3"}},text.title));

  // Grammar tags
  const tagRow=el("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap",marginBottom:"18px"}});
  (text.grammarFocus||[]).forEach(g=>{
    tagRow.appendChild(el("span",{style:{padding:"4px 12px",borderRadius:"12px",fontSize:"12px",background:"#e8f5ee",color:"#1a6b4a",fontWeight:"700"}},g));
  });
  card.appendChild(tagRow);

  // Main text
  const textDiv=el("div",{style:{fontSize:"16px",lineHeight:"1.85",color:"#333",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",letterSpacing:".01em"}});
  textDiv.textContent=text.text;
  card.appendChild(textDiv);

  // Divider
  card.appendChild(el("hr",{style:{border:"none",borderTop:"1px solid #eee",margin:"20px 0"}}));

  // Key words
  if(text.keyWords && text.keyWords.length>0){
    card.appendChild(el("div",{style:{fontWeight:"700",fontSize:"13px",color:"#555",marginBottom:"8px"}},"🔑 Nøkkelord i teksten:"));
    const kwRow=el("div",{style:{display:"flex",gap:"7px",flexWrap:"wrap",marginBottom:"14px"}});
    text.keyWords.forEach(w=>{
      kwRow.appendChild(el("span",{style:{padding:"4px 12px",borderRadius:"12px",fontSize:"13px",background:"#fff8dc",color:"#776",border:"1px solid #e8d87a",fontWeight:"600"}},w));
    });
    card.appendChild(kwRow);
  }

  // Source
  if(text.source){
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#bbb"}},`Kilde: ${text.source}`));
  }

  layout.appendChild(card);

  // ── Lookup side panel ──
  const panel=el("div",{class:"lesing-lookup-panel"});
  const panelCard=el("div",{class:"card"});
  panelCard.appendChild(el("h3",{},"🔍 Slå opp ord"));

  const lookupInput=el("input",{class:"lookup-word-input",type:"text",placeholder:"Lim inn eller skriv et ord…"});
  panelCard.appendChild(lookupInput);

  const resultBox=el("div",{class:"lookup-result-box",style:{color:"#aaa"}},"Skriv et ord og trykk Slå opp");
  const addBtn=el("button",{class:"btn-add",style:{width:"100%",marginBottom:"8px",display:"none"}});
  const orbLink=el("a",{target:"_blank",style:{fontSize:"12px",color:"#1a6b4a",display:"none",marginBottom:"8px",display:"none"}},"Se i Bokmålsordboka →");

  async function doLookup(){
    const raw=lookupInput.value.trim();
    if(!raw) return;
    // Strip punctuation for lookup
    const word=raw.replace(/[.,;:!?()«»"']/g,"").trim();
    if(!word) return;

    // Check ordbank first
    const inBank=state.words.find(w=>w.word.toLowerCase()===word.toLowerCase());
    if(inBank){
      resultBox.className="lookup-in-bank";
      resultBox.innerHTML=`<div class="wn">✓ ${inBank.word}</div><div class="wm">${inBank.meaning||"(ingen betydning)"}</div><div style="font-size:11px;color:#2d9e6b;margin-top:4px">Allerede i ordbanken</div>`;
      addBtn.style.display="none";
      orbLink.style.display="block";
      orbLink.href=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
      return;
    }

    // Not in bank — look up translation
    resultBox.className="lookup-result-box";
    resultBox.innerHTML='<span style="color:#999">Henter oversettelse…</span>';
    addBtn.style.display="none";

    let meaning="";
    try{
      const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=no|en`;
      const res=await fetch(url);
      const data=await res.json();
      if(data.responseStatus===200&&data.responseData?.translatedText){
        meaning=data.responseData.translatedText;
      }
    }catch(e){}

    orbLink.href=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
    orbLink.style.display="block";

    if(meaning){
      resultBox.innerHTML=`<strong>${word}</strong> — ${meaning}`;
      addBtn.textContent=`+ Legg til i ordbanken`;
      addBtn.style.display="block";
      addBtn.onclick=async()=>{

      }
      frag.appendChild(navRow);

  }
  return frag;
}

// ── ORDSTILLING (Sentence building) TAB ─────────────────────────────
function extractSentences(text){
  // Split on sentence-ending punctuation followed by whitespace or end
  const matches = text.match(/[^.!?]+[.!?]+/g) || [];
  return matches.map(s=>s.trim()).filter(s=>{
    const words = s.split(/\s+/);
    return words.length >= 8 && words.length <= 14;
  });
}

async function startWordSort(){
  await loadLesingTexts();
  let pool = lesingState.texts || [];
  if(ws.topicFilter) pool = pool.filter(t=>t.topic===ws.topicFilter);
  if(!pool.length && lesingState.texts && lesingState.texts.length) pool = lesingState.texts;
  if(!pool.length){ toast("Ingen tekster funnet."); return; }

  const allSents = [];
  pool.forEach(t => extractSentences(t.text).forEach(s => allSents.push(s)));
  const picked = shuffle(allSents).slice(0, 10);
  if(!picked.length){ toast("Ingen passende setninger funnet."); return; }

  ws.sentences = picked.map(orig => {
    const tokens = orig.split(/\s+/);
    return { original:orig, tokens, pool:shuffle([...tokens]), answer:[], checked:false, correct:null };
  });
  ws.idx = 0; ws.score = 0; ws.started = true;
  renderContent();
}

function wsMoveToAnswer(sent, tokenIdx){
  sent.answer.push(sent.pool[tokenIdx]);
  sent.pool.splice(tokenIdx, 1);
  refreshWsRound();
}

function wsMoveToPool(sent, answerIdx){
  sent.pool.push(sent.answer[answerIdx]);
  sent.answer.splice(answerIdx, 1);
  refreshWsRound();
}

function wsCheck(sent){
  const userAnswer = sent.answer.join(" ");
  sent.correct = userAnswer === sent.original;
  sent.checked = true;
  if(sent.correct) ws.score++;
  refreshWsRound();
}

function refreshWsRound(){
  const old = $("ws-round-container");
  if(old) old.replaceWith(buildWsRound(ws.sentences[ws.idx]));
}

function wsAnswerClick(sent, i){
  if(ws.selectedAnswerIdx === null){
    ws.selectedAnswerIdx = i; // select
  } else if(ws.selectedAnswerIdx === i){
    ws.selectedAnswerIdx = null; // deselect
  } else {
    // Insert selected word before clicked position
    const sel = ws.selectedAnswerIdx;
    const [token] = sent.answer.splice(sel, 1);
    const insertAt = i > sel ? i - 1 : i;
    sent.answer.splice(insertAt, 0, token);
    ws.selectedAnswerIdx = null;
  }
  refreshWsRound();
}

function wsPoolClick(sent, i){
  ws.selectedAnswerIdx = null;
  wsMoveToAnswer(sent, i);
}

function buildWsRound(sent){
  const div = el("div", {id:"ws-round-container"});
  const sel = ws.selectedAnswerIdx;

  // Answer area label
  const answerLabel = sel !== null
    ? "Klikk et annet ord for å flytte det dit, eller klikk det samme for å avvelge:"
    : "Din setning:";
  div.appendChild(el("div",{style:{fontSize:"12px",color:sel!==null?"#1a6b4a":"#888",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"6px"}},answerLabel));

  const answerArea = el("div", {class:"ws-answer-area"+(sent.answer.length===0?" empty":"")});
  if(sent.answer.length === 0){
    answerArea.appendChild(el("span",{style:{color:"#ccc",fontSize:"13px",alignSelf:"center"}},"Klikk på ord nedenfor for å bygge setningen..."));
  }
  sent.answer.forEach((tok, i) => {
    const isSelected = sel === i;
    const btn = el("button",{class:"ws-token"+(isSelected?" selected":"")},tok);
    if(!sent.checked) btn.addEventListener("click", ()=>wsAnswerClick(sent, i));
    else btn.disabled = true;
    answerArea.appendChild(btn);
  });
  div.appendChild(answerArea);

  // Pool area
  div.appendChild(el("div",{style:{fontSize:"12px",color:"#888",fontWeight:"700",textTransform:"uppercase",letterSpacing:".5px",marginBottom:"6px"}},"Tilgjengelige ord:"));
  const poolArea = el("div", {class:"ws-pool-area"});
  if(sent.pool.length === 0 && !sent.checked){
    poolArea.appendChild(el("span",{style:{color:"#aaa",fontSize:"13px",alignSelf:"center"}},"Alle ord er plassert — sjekk svaret ditt!"));
  }
  sent.pool.forEach((tok, i) => {
    const btn = el("button",{class:"ws-token in-pool"},tok);
    if(!sent.checked) btn.addEventListener("click", ()=>wsPoolClick(sent, i));
    else btn.disabled = true;
    poolArea.appendChild(btn);
  });
  div.appendChild(poolArea);

  // Actions
  const actRow = el("div",{class:"action-row"});
  if(!sent.checked){
    const canCheck = sent.pool.length === 0 && sent.answer.length > 0;
    const checkBtn = el("button",{
      class:"btn-add",
      style:{opacity:canCheck?"1":".4"},
      click(){if(canCheck){ws.selectedAnswerIdx=null;wsCheck(sent);}}
    },"✓ Sjekk svar");
    actRow.appendChild(checkBtn);
    actRow.appendChild(el("button",{class:"btn-sec",click(){
      ws.selectedAnswerIdx = null;
      sent.pool = shuffle([...sent.tokens]);
      sent.answer = [];
      refreshWsRound();
    }},"↺ Nullstill"));
  } else {
    const isLast = ws.idx + 1 >= ws.sentences.length;
    actRow.appendChild(el("button",{class:"btn-add",click(){
      ws.idx++;
      renderContent();
    }}, isLast ? "Se resultat →" : "Neste →"));
  }
  div.appendChild(actRow);

  // Feedback
  if(sent.checked){
    if(sent.correct){
      div.appendChild(el("div",{class:"ws-correct-box"},"✅ Riktig!"));
    } else {
      const wrongBox = el("div",{class:"ws-wrong-box"});
      wrongBox.appendChild(el("div",{},"❌ Ikke helt riktig."));
      wrongBox.appendChild(el("div",{class:"ws-wrong-original"},`Riktig: ${sent.original}`));
      div.appendChild(wrongBox);
    }
  }

  return div;
}

// All 12 topics in a sensible progression order (broader social first, then specialised)
const PLAN_TOPICS = [
  "integrering","språk","arbeid","utdanning","helse","familie",
  "teknologi","miljø","politikk","demokrati","natur","internasjonalt"
];

  api("/api/plan",{method:"POST",body:JSON.stringify({data:payload})}).catch(()=>{});
}
async function loadPlanFromServer(){
  try{
    const r = await api("/api/plan");
    if(r.ok){

      const data = resp.data;
      if(data && data.setup){ planState.weeks=data.weeks||[]; planState.setup=data.setup; return true; }
    }

  // fall back to localStorage

    if(raw && raw.setup){ planState.weeks=raw.weeks||[]; planState.setup=raw.setup; return true; }

  return false;
