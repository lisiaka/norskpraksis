  }

  // Source
  if(text.source){
    card.appendChild(el("div",{style:{fontSize:"12px",color:"#bbb"}},`Kilde: ${text.source}`));
  }

  // ── Comprehension questions (T004–T008) ──
  if(text.questions && text.questions.length>0){
    const qSection=el("div",{style:{marginTop:"24px"}});
    qSection.appendChild(el("div",{style:{fontWeight:"700",fontSize:"13px",color:"#555",marginBottom:"14px",paddingTop:"16px",borderTop:"1px solid #eee"}},"Forståelsesspørsmål"));
    const textAnswers=lesingState.answers[text.id]||{};
    text.questions.forEach((q,qi)=>{
      const qBlock=el("div",{style:{marginBottom:"18px"}});

        q.options.forEach((opt,oi)=>{

          const isCorrect=oi===correct;

          if(answered){
            if(isCorrect){bg="#edfaf3";color="#1a6b4a";border="1px solid #b6e8ce";fw="700";}

    card.appendChild(qSection);

  // ── Gjenfortell area (T009–T012, T013–T017) ──
  const gjArea=el("div",{style:{marginTop:"20px"}});

  if(lesingState.summaryVisible){
    const ta=el("textarea",{style:{width:"100%",minHeight:"140px",padding:"10px 12px",borderRadius:"8px",border:"1px solid #d0d0d0",fontSize:"15px",lineHeight:"1.7",fontFamily:"Georgia,serif",resize:"vertical",boxSizing:"border-box",marginBottom:"8px",display:"block"}});
    ta.placeholder="Skriv et sammendrag av teksten her…";
    ta.value=lesingState.summaryText;

    const wcLabel=el("div",{style:{fontSize:"12px",marginBottom:"10px",color:"#999"}});
    function updateWc(){
      const words=lesingState.summaryText.trim()?lesingState.summaryText.trim().split(/\s+/).filter(Boolean).length:0;
      let color="#999",hint="";
      if(words>=100&&words<=150){color="#1a6b4a";}
      else if(words>150){color="#e07b39";hint=" — Over maksimumsgrensen (150 ord)";}
      else if(words>0){hint=" — Målet er 100–150 ord";}
      wcLabel.textContent=words+" ord"+hint;
      wcLabel.style.color=color;
    }
    updateWc();
    ta.addEventListener("input",e=>{lesingState.summaryText=e.target.value;updateWc();});
    ta.addEventListener("blur",()=>{
      if(!lesingState.summaryText.trim()) return;
      const textId=lesingState.currentText?.id; if(!textId) return;
      api(`/api/reading-summaries/${encodeURIComponent(textId)}`,{
        method:"PUT",
        body:JSON.stringify({summary_text:lesingState.summaryText}),
      }).then(async r=>{
        if(r?.ok){const saved=await r.json();lesingState.savedSummaries[textId]=saved;}
      }).catch(()=>{});
    });

    const feedbackContainer=el("div",{});

    // Restore previous AI feedback if available
    const prevSaved=lesingState.savedSummaries[text.id];
    if(prevSaved?.claude_feedback){
      try{renderGjenfortellResult(JSON.parse(prevSaved.claude_feedback),feedbackContainer);}catch{}
    }

    const saveBtn=el("button",{class:"btn-io",style:{marginBottom:"8px",marginRight:"8px",background:"#f0faf5",color:"#1a6b4a",border:"1px solid #b6e8ce"}});
    saveBtn.textContent="Lagre sammendrag";
    saveBtn.addEventListener("click",async()=>{
      if(!lesingState.summaryText.trim()){toast("Skriv et sammendrag først");return;}
      const textId=lesingState.currentText?.id; if(!textId) return;
      saveBtn.disabled=true; saveBtn.textContent="Lagrer…";
      try{
        const r=await api(`/api/reading-summaries/${encodeURIComponent(textId)}`,{
          method:"PUT",
          body:JSON.stringify({summary_text:lesingState.summaryText}),
        });
        if(r?.ok){const saved=await r.json();lesingState.savedSummaries[textId]=saved;toast("Sammendrag lagret");}
        else{toast("Kunne ikke lagre");}
      }catch{toast("Kunne ikke lagre");}
      saveBtn.disabled=false; saveBtn.textContent="Lagre sammendrag";
    });

    const checkBtn=el("button",{class:"btn-io",style:{marginBottom:"12px"}});
    checkBtn.textContent="Sjekk med AI";
    checkBtn.addEventListener("click",async()=>{
      if(!lesingState.summaryText.trim()){toast("Skriv et sammendrag først");return;}
      await checkGjenfortellWithClaude(text,lesingState.summaryText,feedbackContainer);
    });

    gjArea.appendChild(ta);
    gjArea.appendChild(wcLabel);
    gjArea.appendChild(saveBtn);
    gjArea.appendChild(checkBtn);
    gjArea.appendChild(feedbackContainer);
  }
  card.appendChild(gjArea);

  layout.appendChild(card);

  // ── Lookup side panel ──
  const panel=el("div",{class:"lesing-lookup-panel"});
  const panelCard=el("div",{class:"card"});
  panelCard.appendChild(el("h3",{},"🔍 Slå opp ord"));

  const lookupInput=el("input",{class:"lookup-word-input",type:"text",placeholder:"Lim inn eller skriv et ord…"});
  panelCard.appendChild(lookupInput);

  const resultBox=el("div",{class:"lookup-result-box",style:{color:"#aaa"}},"Skriv et ord og trykk Slå opp");
  const addBtn=el("button",{class:"btn-add",style:{width:"100%",marginBottom:"8px",display:"none"}});
  const orbLink=el("a",{target:"_blank",style:{fontSize:"12px",color:"#1a6b4a",display:"none",marginBottom:"8px",display:"none"}},"Se i Bokmålsordboka →");

  async function doLookup(){
    const raw=lookupInput.value.trim();
    if(!raw) return;
    // Strip punctuation for lookup
    const word=raw.replace(/[.,;:!?()«»"']/g,"").trim();
    if(!word) return;

    // Check ordbank first
    const inBank=state.words.find(w=>w.word.toLowerCase()===word.toLowerCase());
    if(inBank){
      resultBox.className="lookup-in-bank";
      resultBox.innerHTML=`<div class="wn">✓ ${inBank.word}</div><div class="wm">${inBank.meaning||"(ingen betydning)"}</div><div style="font-size:11px;color:#2d9e6b;margin-top:4px">Allerede i ordbanken</div>`;
      addBtn.style.display="none";
      orbLink.style.display="block";
      orbLink.href=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
      return;
    }

    // Not in bank — look up translation
    resultBox.className="lookup-result-box";
    resultBox.innerHTML='<span style="color:#999">Henter oversettelse…</span>';
    addBtn.style.display="none";

    let meaning="";
    try{
      const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(word)}&langpair=no|en`;
      const res=await fetch(url);
      const data=await res.json();
      if(data.responseStatus===200&&data.responseData?.translatedText){
        meaning=data.responseData.translatedText;
      }
    }catch(e){}

    orbLink.href=`https://ordbokene.no/bm,nn/search?q=${encodeURIComponent(word)}`;
    orbLink.style.display="block";

    if(meaning){
      resultBox.innerHTML=`<strong>${word}</strong> — ${meaning}`;
      addBtn.textContent=`+ Legg til i ordbanken`;
      addBtn.style.display="block";
      addBtn.onclick=async()=>{
        const tempId="tmp_"+Date.now();
        const topicVal=text.topic||"annet";
        state.words.push({id:tempId,word,meaning,category:"enkeltord",topic:topicVal,createdAt:Date.now(),forms:[],flashcard_options:[]});
        saveStorage(); renderTabs();
        resultBox.className="lookup-in-bank";
        resultBox.innerHTML=`<div class="wn">✓ ${word}</div><div class="wm">${meaning}</div><div style="font-size:11px;color:#2d9e6b;margin-top:4px">Lagt til i ordbanken!</div>`;
        addBtn.style.display="none";
        toast(`✓ «${word}» lagt til i ordbanken`);
        try{
          const r=await api("/api/words",{method:"POST",body:JSON.stringify({word,meaning,category:"enkeltord",topic:topicVal,forms:[],flashcard_options:[]})});
          if(r.ok){const sv=await r.json();const idx=state.words.findIndex(w=>w.id===tempId);if(idx>=0){state.words[idx]={...state.words[idx],...sv,createdAt:new Date(sv.created_at).getTime()};saveStorage();}}
        }catch{}
      };
    } else {
      resultBox.innerHTML=`<span style="color:#888">Ingen automatisk oversettelse. Prøv Bokmålsordboka.</span>`;
      addBtn.style.display="none";
    }
  }

  lookupInput.addEventListener("keydown",e=>{ if(e.key==="Enter") doLookup(); });
  const lookupBtn=el("button",{class:"btn-sec",style:{width:"100%",marginBottom:"8px"},click:doLookup},"Slå opp");
  panelCard.appendChild(lookupBtn);
  panelCard.appendChild(resultBox);
  panelCard.appendChild(addBtn);
  orbLink.textContent="Se i Bokmålsordboka →";
  panelCard.appendChild(orbLink);
  panel.appendChild(panelCard);

  // Key words as quick-lookup chips
  if(text.keyWords&&text.keyWords.length){
    const kwCard=el("div",{class:"card"});
    kwCard.appendChild(el("h3",{},"🔑 Nøkkelord"));

    text.keyWords.forEach(kw=>{
      const inBank=state.words.find(w=>w.word.toLowerCase()===kw.toLowerCase());
      kwWrap.appendChild(el("button",{
        style:{padding:"4px 10px",borderRadius:"12px",fontSize:"12px",fontWeight:"600",
          background:inBank?"#edfaf3":"#fff8dc",
          color:inBank?"#1a6b4a":"#776",
          border:`1px solid ${inBank?"#b6e8ce":"#e8d87a"}`,
          cursor:"pointer"},
        click(){lookupInput.value=kw; doLookup();}
      },inBank?"✓ "+kw:kw));
    });
    kwCard.appendChild(kwWrap);
    panel.appendChild(kwCard);
  }

  layout.appendChild(panel);
  frag.appendChild(layout);

  // Navigation (prev/next in filtered list)
  if(lesingState.texts){
    let filtered=lesingState.texts.filter(t=>{
      if(lesingState.topicFilter && t.topic!==lesingState.topicFilter) return false;
      if(lesingState.grammarFilter && !t.grammarFocus.some(g=>g.includes(lesingState.grammarFilter.split("-")[0]))) return false;
      return true;
    });
    const idx=filtered.findIndex(t=>t.id===text.id);
    if(filtered.length>1){
      const navRow=el("div",{style:{display:"flex",justifyContent:"space-between",maxWidth:"720px",margin:"14px auto 0"}});
      if(idx>0){
        const prevBtn=el("button",{class:"btn-io",click(){setLesingText(filtered[idx-1]);trackEvent("text_read",{textId:filtered[idx-1].id,title:filtered[idx-1].title,topic:filtered[idx-1].topic,level:filtered[idx-1].level||"B2"});renderContent();window.scrollTo(0,0);}},"← "+filtered[idx-1].title.substring(0,30));
        navRow.appendChild(prevBtn);
      } else { navRow.appendChild(el("span",{})); }
      if(idx<filtered.length-1){
        const nextBtn=el("button",{class:"btn-io",click(){setLesingText(filtered[idx+1]);trackEvent("text_read",{textId:filtered[idx+1].id,title:filtered[idx+1].title,topic:filtered[idx+1].topic,level:filtered[idx+1].level||"B2"});renderContent();window.scrollTo(0,0);}},(filtered[idx+1].title.substring(0,30))+" →");
        navRow.appendChild(nextBtn);
      }
      frag.appendChild(navRow);
    }
  }
  return frag;
}

// ── ORDSTILLING (Sentence building) TAB ─────────────────────────────
function extractSentences(text){
  // Split on sentence-ending punctuation followed by whitespace or end
  const matches = text.match(/[^.!?]+[.!?]+/g) || [];
  return matches.map(s=>s.trim()).filter(s=>{
    const words = s.split(/\s+/);
    return words.length >= 8 && words.length <= 14;
  });
}

async function startWordSort(){
  await loadLesingTexts();
  let pool = lesingState.texts || [];
  if(ws.topicFilter) pool = pool.filter(t=>t.topic===ws.topicFilter);
  if(!pool.length && lesingState.texts && lesingState.texts.length) pool = lesingState.texts;
  if(!pool.length){ toast("Ingen tekster funnet."); return; }

  const allSents = [];
  pool.forEach(t => extractSentences(t.text).forEach(s => allSents.push(s)));
  const picked = shuffle(allSents).slice(0, 10);
  if(!picked.length){ toast("Ingen passende setninger funnet."); return; }

  ws.sentences = picked.map(orig => {
    const tokens = orig.split(/\s+/);
    return { original:orig, tokens, pool:shuffle([...tokens]), answer:[], checked:false, correct:null };
  });
  ws.idx = 0; ws.score = 0; ws.started = true;
  renderContent();
}

function wsMoveToAnswer(sent, tokenIdx){
  sent.answer.push(sent.pool[tokenIdx]);
  sent.pool.splice(tokenIdx, 1);
  refreshWsRound();
}

function wsMoveToPool(sent, answerIdx){
  sent.pool.push(sent.answer[answerIdx]);
  sent.answer.splice(answerIdx, 1);
  refreshWsRound();
}

function wsCheck(sent){
  const userAnswer = sent.answer.join(" ");
  sent.correct = userAnswer === sent.original;
  sent.checked = true;
  if(sent.correct) ws.score++;
  refreshWsRound();
}

function refreshWsRound(){
  const old = $("ws-round-container");
  if(old) old.replaceWith(buildWsRound(ws.sentences[ws.idx]));
}

function wsAnswerClick(sent, i){
  if(ws.selectedAnswerIdx === null){
    ws.selectedAnswerIdx = i; // select
  } else if(ws.selectedAnswerIdx === i){
    ws.selectedAnswerIdx = null; // deselect
  } else {
    // Insert selected word before clicked position
    const sel = ws.selectedAnswerIdx;
    const [token] = sent.answer.splice(sel, 1);
    const insertAt = i > sel ? i - 1 : i;
    sent.answer.splice(insertAt, 0, token);
    ws.selectedAnswerIdx = null;
  }
  refreshWsRound();
}

function wsPoolClick(sent, i){
  ws.selectedAnswerIdx = null;
  wsMoveToAnswer(sent, i);
}

function buildWsRound(sent){
  const div = el("div", {id:"ws-round-container"});
  const sel = ws.selectedAnswerIdx;

  // Answer area label
  const answerLabel = sel !== null
    ? "Klikk et annet ord for å flytte det dit, eller klikk det samme for å avvelge:"
    : "Din setning:";

    const isLast = ws.idx + 1 >= ws.sentences.length;

  return div;
}

// All 12 topics in a sensible progression order (broader social first, then specialised)
const PLAN_TOPICS = [
  "integrering","språk","arbeid","utdanning","helse","familie",
  "teknologi","miljø","politikk","demokrati","natur","internasjonalt"
];

  api("/api/plan",{method:"POST",body:JSON.stringify({data:payload})}).catch(()=>{});
}
async function loadPlanFromServer(){
  try{
    const r = await api("/api/plan");
    if(r.ok){
      const resp = await r.json();
      const data = resp.data;
      if(data && data.setup){ planState.weeks=data.weeks||[]; planState.setup=data.setup; return true; }
    }

function loadPlan(){

// Build a schedule: assign topics to weeks, sessions per week, texts + essay per session
function generatePlan(months, daysPerWeek, startDate){
  const totalWeeks = months * 4;
  const topicKeys = PLAN_TOPICS.slice(); // 12 topics
  const weeks = [];

  // Texts: 2 texts per day of practice
  const textsPerWeek = daysPerWeek * 2;

  // Words: 5 new words per day of practice
  const wordTarget = daysPerWeek * 5;

  // Essays: 1 for ≤2 days, 2 for 3-4 days, 3 for 5+ days
  const essaysPerWeek = daysPerWeek <= 2 ? 1 : daysPerWeek <= 4 ? 2 : 3;

  for(let w=0; w<totalWeeks; w++){
    const topicKey = topicKeys[w % topicKeys.length];
    const topicMeta = TOPICS[topicKey] || {name: topicKey, emoji:"📚", color:"#4f6ef7"};

    // Spread across all 10 texts per topic across plan cycles
    const round = Math.floor(w / topicKeys.length); // 0, 1, 2 …
    const baseSlot = round * textsPerWeek;
    const texts = [];
    for(let i=0; i<textsPerWeek; i++){
      texts.push({topicKey, textSlot: (baseSlot + i) % 10});
    }

    // Multiple essay prompts per week, cycling through topic prompts
    const prompts = PROMPTS[topicKey] || [];
    const essayPrompts = [];
    for(let i=0; i<essaysPerWeek; i++){
      const p = prompts[(w * essaysPerWeek + i) % prompts.length];
      if(p) essayPrompts.push(p);
    }

    // Calculate week start date
    const weekStart = new Date(startDate);
    weekStart.setDate(weekStart.getDate() + w*7);
    const weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 6);
    const fmt = d => d.toLocaleDateString("nb-NO",{day:"numeric",month:"short"});

    weeks.push({
      weekNum: w+1,
      topicKey,
      topicName: topicMeta.name,
      topicEmoji: topicMeta.emoji,
      topicColor: topicMeta.color,
      daysPerWeek,
      texts,          // [{topicKey, textSlot}]
      essayPrompts,   // [{title, text}]
      wordTarget,
      dateRange: `${fmt(weekStart)} – ${fmt(weekEnd)}`,
      weekStartISO: weekStart.toISOString().slice(0,10),
    });
  }
  return weeks;
}

// Given a topic key and slot index, find the actual text object
function getPlanText(topicKey, slotIdx){
  if(!lesingState.texts) return null;
  const pool = lesingState.texts.filter(t => t.topic === topicKey);
  return pool[slotIdx % pool.length] || null;
}

// Open a lesing text from the plan
function openPlanText(text){
  setLesingText(text);
  trackEvent("text_read",{textId:text.id,title:text.title,topic:text.topic,level:text.level||"B2"});
  setTab("lesing");
}

// Open an essay prompt from the plan
function openPlanEssay(topicKey, prompt){
  state.currentTopic = topicKey;
  state.currentPrompt = prompt;
  state.essay = "";
  setTab("skriv");
}

function findLastIdx(arr, fn){
  for(let i=arr.length-1;i>=0;i--){ if(fn(arr[i],i)) return i; }
  return -1;
}

// Convert plan's {topicKey, textSlot} → lesing text id
// Text IDs use ASCII keys: lesing_sprak_01 (slot 0 → "01")
const TOPIC_TO_ID_PREFIX = {
  "språk":"sprak", "miljø":"miljo"
};
function topicSlotToId(topicKey, slot){
  const prefix = TOPIC_TO_ID_PREFIX[topicKey] || topicKey;
  return `lesing_${prefix}_${String(slot+1).padStart(2,"0")}`;
}

// Set of text IDs unlocked by the user's current plan
function getUnlockedTextIds(){
  const ids = new Set();
  (planState.weeks||[]).forEach(week=>{
    (week.texts||[]).forEach(t=>ids.add(topicSlotToId(t.topicKey, t.textSlot)));
  });
  return ids;
}

// Compute word mastery for a set of words:
// A word is fully mastered when it is (1) in ordbank AND (2) correct in FC AND (3) used in a sentence.
// Returns {inBank, fcCorrect, inSentence, mastered} counts out of wordTarget.
function getWordMastery(topicKey, wordTarget, fcAll){
  const topicWords = state.words.filter(w => w.topic === topicKey);
  const inBank = topicWords.length;

  // FC correct for these words
  const fcCorrectSet = new Set();
  fcAll.forEach(s => (s.words||[]).forEach(w => { if(w.correct) fcCorrectSet.add(w.word.toLowerCase()); }));
  const fcCorrect = topicWords.filter(w => fcCorrectSet.has(w.word.toLowerCase())).length;

  // Used in sentence
  const inSentence = topicWords.filter(w => state.sentences[w.id]?.trim()).length;

  // Mastered = satisfies all three
  const mastered = topicWords.filter(w =>
    fcCorrectSet.has(w.word.toLowerCase()) && state.sentences[w.id]?.trim()
  ).length;

  return {inBank, fcCorrect, inSentence, mastered, topicWords, wordTarget};
}

    });
    link.appendChild(el("span",{style:{fontSize:"16px"}},done?"✅":"📄"));
    link.appendChild(el("div",{class:"plan-text-link-title"},text.title));
    link.appendChild(el("span",{style:{fontSize:"11px",color:"#aaa",flexShrink:"0"}},"→ Lesing"));
    readSess.appendChild(link);
  });
  body.appendChild(readSess);

  // Session 2: Essays (one or more per week depending on days/week)
  const essayPrompts = week.essayPrompts || (week.essayPrompt ? [week.essayPrompt] : []);
  if(essayPrompts.length){
    const essaySess = el("div",{class:"plan-session"});
    const doneCount = essayPrompts.filter(p=>essaysWritten.has(p.title)).length;
    const eTitle = el("div",{class:"plan-session-title"});
    eTitle.appendChild(document.createTextNode(`✍️ Skriveoppgaver denne uken (${essayPrompts.length})`));
    if(doneCount===essayPrompts.length) eTitle.appendChild(el("span",{class:"plan-done-badge"},"✓ Alle skrevet"));
    else if(doneCount>0) eTitle.appendChild(el("span",{class:"plan-done-badge",style:{background:"#fff3cd",color:"#856404"}},`${doneCount}/${essayPrompts.length} skrevet`));
    essaySess.appendChild(eTitle);
    essayPrompts.forEach(prompt=>{
      const isDone = essaysWritten.has(prompt.title);
      const box = el("div",{style:{background:isDone?"#f0fdf4":"#f9f9f9",borderRadius:"10px",padding:"12px 14px",marginBottom:"8px",borderLeft:`3px solid ${isDone?"#2d9e6b":"#dde"}`}});
      box.appendChild(el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"5px"}},
        el("div",{style:{fontWeight:"700",fontSize:"14px",color:"#333",flex:"1"}},prompt.title),
        isDone ? el("span",{style:{fontSize:"11px",color:"#1a6b4a",fontWeight:"700"}},"✓ Skrevet") : null
      ));
      box.appendChild(el("div",{style:{fontSize:"13px",color:"#555",lineHeight:"1.6",marginBottom:"8px"}},prompt.text));
      box.appendChild(el("button",{class:"plan-go-btn"+(isDone?" sec":""),
        click(){ openPlanEssay(week.topicKey, prompt); }
      },isDone?"📝 Skriv igjen":"✍️ Start skriveoppgave"));
      essaySess.appendChild(box);
    });
    body.appendChild(essaySess);
  }

  // Session 3: Words mastery target
  const mastery = getWordMastery(week.topicKey, week.wordTarget, fcAll);
  const wordSess = el("div",{class:"plan-session"});

  const wTitle = el("div",{class:"plan-session-title"});
  wTitle.appendChild(document.createTextNode(`📚 Ordmål: ${week.wordTarget} ord mestret`));
  if(mastery.mastered >= week.wordTarget)
    wTitle.appendChild(el("span",{class:"plan-done-badge"},"✓ Mestret!"));
  wordSess.appendChild(wTitle);

  // Three sub-steps with individual progress bars
  const steps = [
    {label:"Lagt til i ordbank", val:mastery.inBank,    color:"#4f6ef7"},
    {label:"Riktig i flashcards",val:mastery.fcCorrect, color:"#e8901a"},
    {label:"Brukt i setning",    val:mastery.inSentence,color:"#2d9e6b"},
  ];
  const stepsWrap = el("div",{style:{display:"grid",gap:"8px",marginBottom:"12px"}});
  steps.forEach(s=>{
    const pct = Math.min(100, week.wordTarget ? Math.round(s.val/week.wordTarget*100) : 0);
    const done = s.val >= week.wordTarget;
    const row = el("div",{});
    row.appendChild(el("div",{style:{display:"flex",justifyContent:"space-between",fontSize:"12px",color:done?"#1a6b4a":"#666",fontWeight:done?"700":"400",marginBottom:"3px"}},
      el("span",{},(done?"✓ ":"")+s.label),
      el("span",{},`${s.val}/${week.wordTarget}`)
    ));
    const bar = el("div",{class:"plan-prog-wrap"});
    bar.appendChild(el("div",{class:"plan-prog-fill",style:{width:pct+"%",background:s.color}}));
    row.appendChild(bar);
    stepsWrap.appendChild(row);
  });
  wordSess.appendChild(stepsWrap);

  // Overall mastery bar
  const mastPct = week.wordTarget ? Math.min(100,Math.round(mastery.mastered/week.wordTarget*100)) : 0;
  wordSess.appendChild(el("div",{style:{fontSize:"12px",color:"#888",marginBottom:"3px"}},
    `Totalt mestret (alle tre steg): ${mastery.mastered}/${week.wordTarget} (${mastPct}%)`));
  const mpw = el("div",{class:"plan-prog-wrap",style:{height:"10px"}});
  mpw.appendChild(el("div",{class:"plan-prog-fill",style:{width:mastPct+"%",height:"10px"}}));
  wordSess.appendChild(mpw);

  wordSess.appendChild(el("div",{style:{marginTop:"12px",display:"flex",gap:"8px",flexWrap:"wrap"}}));
  const btnRow = wordSess.lastChild;
  btnRow.appendChild(el("button",{class:"plan-go-btn sec",
    click(){state.sentTopicFilter=week.topicKey; setTab("setninger");}
  },"💬 Øv setninger"));
  btnRow.appendChild(el("button",{class:"plan-go-btn sec",
    click(){fc.topicFilter=week.topicKey; fc.learningFilter=""; setTab("flashcards");}
  },"🎮 Flashcards"));
  btnRow.appendChild(el("button",{class:"plan-go-btn sec",
    click(){state.topicFilter=week.topicKey; setTab("ordbank");}
  },"📚 Legg til ord"));
  body.appendChild(wordSess);

  weekCard.appendChild(body);
  frag.appendChild(weekCard);

  // ── Mini week overview (all weeks as dots)
  const overviewCard = el("div",{class:"card",style:{marginTop:"14px"}});
  overviewCard.appendChild(el("div",{style:{fontWeight:"700",fontSize:"14px",color:"#333",marginBottom:"10px"}},"Alle uker"));
  weeks.forEach((w,i)=>{
    const dots = w.texts.map(t=>{
      const tx=getPlanText(t.topicKey,t.textSlot);
      return tx&&readIds.has(tx.id);
    });
    const row = el("div",{class:"plan-week-mini"+(i===planState.viewWeek?" cur":""),
      click(){planState.viewWeek=i;renderContent();}
    });
    row.appendChild(el("div",{class:"plan-week-mini-num"},"U"+w.weekNum));
    row.appendChild(el("div",{class:"plan-week-mini-topic"},w.topicEmoji+" "+w.topicName));
    const dotWrap=el("div",{class:"plan-week-mini-dots"});
    dots.forEach(d=>dotWrap.appendChild(el("div",{class:"plan-week-mini-dot"+(d?" done":"")})));
    row.appendChild(dotWrap);
    overviewCard.appendChild(row);
  });
  frag.appendChild(overviewCard);

  return frag;
}

// ── STATISTIKK TAB ───────────────────────────────────────────────────
function buildStatistik(){
  const frag = document.createDocumentFragment();
  const hdr = el("div",{class:"card"});
  hdr.appendChild(el("h2",{},"📊 Statistikk — "+(state.userName||state.userEmail)));
  hdr.appendChild(el("p",{style:{color:"#aaa",fontSize:"13px"}},"Laster data…"));
  frag.appendChild(hdr);

  loadStats().then(db=>{
    const events = db.events || [];
    const todayStr = new Date().toISOString().slice(0,10);

    const isToday = e => e.ts && e.ts.slice(0,10) === todayStr;

    // ── counts
    const textsAll   = events.filter(e=>e.type==="text_read");
    const textsToday = textsAll.filter(isToday);
    const readIds    = new Set(textsAll.map(e=>e.textId));

    const fcAll   = events.filter(e=>e.type==="flashcard_session");
    const fcToday = fcAll.filter(isToday);
    const fcCorrectAll   = fcAll.reduce((s,e)=>s+(e.correct||0),0);
    const fcTotalAll     = fcAll.reduce((s,e)=>s+(e.total||0),0);

    const wsAll   = events.filter(e=>e.type==="wordsort_session");
    const wsToday = wsAll.filter(isToday);
    const wsCorrectAll   = wsAll.reduce((s,e)=>s+(e.correct||0),0);
    const wsTotalAll     = wsAll.reduce((s,e)=>s+(e.total||0),0);

    const essaysAll   = events.filter(e=>e.type==="essay_saved");
    const essaysToday = essaysAll.filter(isToday);

    // rebuild the card
    hdr.innerHTML="";
    hdr.appendChild(el("h2",{},"📊 Statistikk — "+(state.userName||state.userEmail)));

    // ── Summary numbers
    hdr.appendChild(el("div",{class:"stat-section"},"Oversikt"));
    const grid = el("div",{class:"stat-grid"});
    const box = (val,lbl,sub)=>{
      const b=el("div",{class:"stat-box"});
      b.appendChild(el("div",{class:"stat-val"},String(val)));
      b.appendChild(el("div",{class:"stat-lbl"},lbl));
      if(sub) b.appendChild(el("div",{class:"stat-sub"},sub));
      return b;
    };
    grid.appendChild(box(textsToday.length, "tekster i dag", `${readIds.size} totalt`));
    grid.appendChild(box(fcToday.length+wsToday.length, "spill i dag", `${fcAll.length+wsAll.length} totalt`));
    grid.appendChild(box(essaysToday.length, "essays i dag", `${essaysAll.length} totalt`));
    const totalCorrect = fcCorrectAll+wsCorrectAll;
    const totalAnswered = fcTotalAll+wsTotalAll;
    const pct = totalAnswered ? Math.round(totalCorrect/totalAnswered*100) : "–";
    grid.appendChild(box(pct+(totalAnswered?"%":""), "riktige svar", `${totalCorrect} av ${totalAnswered}`));
    hdr.appendChild(grid);

    // ── Topics read
    if(textsAll.length){
      hdr.appendChild(el("div",{class:"stat-section"},"Leste tekster etter tema"));
      // Count unique texts read per topic (deduplicated by textId)
      const topicReadIds={};
      textsAll.forEach(e=>{
        if(!topicReadIds[e.topic]) topicReadIds[e.topic]={};
        if(e.textId) topicReadIds[e.topic][e.textId]=true;
      });
      const TEXTS_PER_TOPIC=10; // 10 texts per topic in lesing-tekster.json
      // Show all topics that appear in lesing (all 12), sorted by read count desc
      const allLesingTopics=["arbeid","demokrati","familie","helse","integrering","internasjonalt","miljø","natur","politikk","språk","teknologi","utdanning"];
      const topicsToShow=allLesingTopics.filter(t=>topicReadIds[t]);
      topicsToShow.sort((a,b)=>Object.keys(topicReadIds[b]||{}).length-Object.keys(topicReadIds[a]||{}).length);
      topicsToShow.forEach(topic=>{
        const cnt=Object.keys(topicReadIds[topic]||{}).length;
        const remaining=Math.max(0,TEXTS_PER_TOPIC-cnt);
        const row=el("div",{class:"stat-bar-row"});
        row.appendChild(el("div",{class:"stat-bar-label"},topic));
        const track=el("div",{class:"stat-bar-track"});
        track.appendChild(el("div",{class:"stat-bar-fill",style:{width:`${Math.round(cnt/TEXTS_PER_TOPIC*100)}%`}}));
        row.appendChild(track);
        row.appendChild(el("div",{class:"stat-bar-count"},`${cnt}/10`+(remaining>0?` (${remaining} igjen)`:"")));
        hdr.appendChild(row);
      });
    }

    // ── Essay topics
    if(essaysAll.length){
      hdr.appendChild(el("div",{class:"stat-section"},"Essays etter tema"));
      const etCount={};
      essaysAll.forEach(e=>{ const t=e.topicName||e.topic||"Ukjent"; etCount[t]=(etCount[t]||0)+1; });
      const maxE=Math.max(...Object.values(etCount));
      Object.entries(etCount).sort((a,b)=>b[1]-a[1]).forEach(([topic,cnt])=>{
        const row=el("div",{class:"stat-bar-row"});
        row.appendChild(el("div",{class:"stat-bar-label"},topic));
        const track=el("div",{class:"stat-bar-track"});
        track.appendChild(el("div",{class:"stat-bar-fill",style:{width:`${Math.round(cnt/maxE*100)}%`,background:"#4f6ef7"}}));
        row.appendChild(track);
        row.appendChild(el("div",{class:"stat-bar-count"},String(cnt)));
        hdr.appendChild(row);
      });
    }

    // ── Word bank learning progress (donut chart)
    if(state.words.length>0){
      hdr.appendChild(el("div",{class:"stat-section"},"Ordbank — læringsframgang"));

      // Words correctly answered in flashcards (net correct)
      const fcCorrectWords=new Set();
      const fcWrongWords=new Set();
      fcAll.forEach(s=>(s.words||[]).forEach(w=>{
        if(w.correct) fcCorrectWords.add(w.word.toLowerCase());
        else fcWrongWords.add(w.word.toLowerCase());
      }));
      // A word is "mastered" in FC if ever answered correctly
      const masteredFc=state.words.filter(w=>fcCorrectWords.has(w.word.toLowerCase())).length;

      // Words used in sentences
      const usedInSents=state.words.filter(w=>state.sentences[w.id]?.trim()).length;

      // Words used in any saved essay
      const allEssayText=loadEssayBank().map(e=>e.text||"").join(" ").toLowerCase();
      const usedInEssays=state.words.filter(w=>w.word.length>=3&&allEssayText.includes(w.word.toLowerCase())).length;

      // Union: at least one of the above
      const learnedSet=new Set();
      state.words.forEach(w=>{
        const wl=w.word.toLowerCase();
        if(fcCorrectWords.has(wl)||state.sentences[w.id]?.trim()||(w.word.length>=3&&allEssayText.includes(wl)))
          learnedSet.add(w.id);
      });
      const total=state.words.length;
      const learned=learnedSet.size;
      const notYet=total-learned;

      // SVG donut
      const segments=[
        {label:"Riktig i flashcards", val:masteredFc, color:"#2d9e6b"},
        {label:"Brukt i setninger",   val:usedInSents, color:"#4f6ef7"},
        {label:"Brukt i essays",      val:usedInEssays,color:"#e8901a"},
        {label:"Ikke øvd ennå",       val:notYet,      color:"#eee"},
      ];
      const R=54, cx=70, cy=70, stroke=22;
      const circ=2*Math.PI*R;
      let offset=0;
      const svgNS="http://www.w3.org/2000/svg";
      const svg=document.createElementNS(svgNS,"svg");
      svg.setAttribute("viewBox","0 0 140 140");
      svg.setAttribute("width","140");svg.setAttribute("height","140");
      // background circle
      const bg=document.createElementNS(svgNS,"circle");
      bg.setAttribute("cx",cx);bg.setAttribute("cy",cy);bg.setAttribute("r",R);
      bg.setAttribute("fill","none");bg.setAttribute("stroke","#eee");bg.setAttribute("stroke-width",stroke);
      svg.appendChild(bg);
      segments.filter(s=>s.val>0).forEach(s=>{
        const frac=s.val/total;
        const c=document.createElementNS(svgNS,"circle");
        c.setAttribute("cx",cx);c.setAttribute("cy",cy);c.setAttribute("r",R);
        c.setAttribute("fill","none");c.setAttribute("stroke",s.color);c.setAttribute("stroke-width",stroke);
        c.setAttribute("stroke-dasharray",`${frac*circ} ${circ}`);
        c.setAttribute("stroke-dashoffset",`${-offset*circ}`);
        c.setAttribute("transform",`rotate(-90 ${cx} ${cy})`);
        svg.appendChild(c);
        offset+=frac;
      });
      // center text
      const ct=document.createElementNS(svgNS,"text");
      ct.setAttribute("x",cx);ct.setAttribute("y",cy-4);
      ct.setAttribute("text-anchor","middle");ct.setAttribute("font-size","18");ct.setAttribute("font-weight","800");ct.setAttribute("fill","#1a6b4a");
      ct.textContent=`${total?Math.round(learned/total*100):0}%`;
      svg.appendChild(ct);
      const ct2=document.createElementNS(svgNS,"text");
      ct2.setAttribute("x",cx);ct2.setAttribute("y",cy+14);
      ct2.setAttribute("text-anchor","middle");ct2.setAttribute("font-size","9");ct2.setAttribute("fill","#999");
      ct2.textContent="øvd på";
      svg.appendChild(ct2);

      const donutWrap=el("div",{class:"donut-wrap"});
      donutWrap.appendChild(svg);
      const legend=el("div",{class:"donut-legend"});
      segments.forEach(s=>{
        const row=el("div",{class:"donut-legend-row"});
        row.appendChild(el("div",{class:"donut-dot",style:{background:s.color}}));
        row.appendChild(el("div",{class:"donut-legend-label"},s.label));
        row.appendChild(el("div",{class:"donut-legend-val"},`${s.val} / ${total}`));
        legend.appendChild(row);
      });
      donutWrap.appendChild(legend);
      hdr.appendChild(donutWrap);
    }

    // ── Flashcard word breakdown — net missed words (wrong > correct, ALL words)
    const missedWords = getNetMissedWords();
    if(missedWords.length){
      hdr.appendChild(el("div",{class:"stat-section"},`Ord med flest feil (${missedWords.length} ord)`));

      const missedList = missedWords.map(w=>({word:w.word, meaning:w.meaning}));
      const btnRow = el("div",{style:{display:"flex",gap:"8px",marginBottom:"12px",flexWrap:"wrap"}});
      btnRow.appendChild(el("button",{class:"btn-add",style:{padding:"8px 16px",fontSize:"13px"},
        click(){
          const errorWords = shuffle(missedWords).slice(0,10);
          if(errorWords.length<2){toast("Trenger minst 2 feilord for å spille.");return;}
          fc.topicFilter=""; fc.timeFilter=0; fc.maxWords=0; fc.learningFilter="";
          fc.queue=errorWords.map(w=>{
            const type=Math.random()<0.5?"write":"choice";
            return {...w,_type:type,_options:type==="choice"?fcGetOptions(w):null};
          });
          fc.idx=0;fc.correct=0;fc.wrong=0;fc.log=[];fc.tracked=false;
          fc.answered=false;fc.chosenIdx=null;
          fc.writeInput="";fc.writeChecked=false;fc.writeResult=false;
          fc.started=true;
          setTab("flashcards");
        }
      },"🎮 Øv på feilordene (maks 10)"));
      btnRow.appendChild(el("button",{class:"btn-io",click(){printMissedWords("cloud",missedList)}},"☁️ Ordsky"));
      btnRow.appendChild(el("button",{class:"btn-io",click(){printMissedWords("list", missedList)}},"📄 Ordliste"));
      hdr.appendChild(btnRow);

      const scrollList=el("div",{class:"stat-missed-list"});
      missedWords.forEach(w=>{
        const row=el("div",{class:"stat-word-row wrong"});
        const left=el("span",{style:{flex:"1",minWidth:"0"}});
        left.appendChild(el("span",{style:{fontWeight:"700"}},w.word));
        if(w.meaning) left.appendChild(el("span",{style:{color:"#aaa",marginLeft:"8px",fontWeight:"400",fontSize:"12px"}},w.meaning));
        row.appendChild(left);
        row.appendChild(el("span",{style:{fontWeight:"700",flexShrink:"0",fontSize:"12px",color:"#e05c5c"}},`${w.wrong}✗ / ${w.rightCount}✓`));
        scrollList.appendChild(row);
      });
      hdr.appendChild(scrollList);
    }

    // ── Wordsort sentence breakdown — most missed
    const sentMisses=[];
    wsAll.forEach(session=>{
      (session.sentences||[]).filter(s=>!s.correct).forEach(s=>{
        sentMisses.push(s.original);
      });
    });
    if(sentMisses.length){
      hdr.appendChild(el("div",{class:"stat-section"},"Setninger du slet med (setningsbygging)"));
      // deduplicate, show up to 8
      [...new Set(sentMisses)].slice(0,8).forEach(sent=>{
        const row=el("div",{class:"stat-word-row wrong",style:{flexDirection:"column",alignItems:"flex-start",gap:"2px"}});
        row.appendChild(el("span",{style:{fontSize:"12px",color:"#e05c5c",fontWeight:"700"}},"❌"));
        row.appendChild(el("span",{},sent));
        hdr.appendChild(row);
      });
    }

    // ── Empty state
    if(!events.length){
      hdr.innerHTML="";
      hdr.appendChild(el("h2",{},"📊 Statistikk"));
      hdr.appendChild(el("div",{class:"empty-state"},[
        el("div",{class:"big"},"📭"),
        el("p",{},"Ingen aktivitet registrert ennå. Start med å lese en tekst, spille flashcards eller skrive et essay!"),
      ]));
    }
  });

  return frag;
}

// ── AUTH ──────────────────────────────────────────────────────────────
async function onLoginSuccess(token, user){
  state.sessionToken = token;
  state.userId = user.id;
  state.userName = user.name;
  state.userEmail = user.email;
  state.userRole = user.role || "student";
  try{
    localStorage.setItem("b2_session_token", token);
    localStorage.setItem("b2_user_id", user.id);
    localStorage.setItem("b2_user_name", user.name);
    localStorage.setItem("b2_user_email", user.email);
    localStorage.setItem("b2_user_role", state.userRole);
  }catch{}

  // Reset game/session state
  statsCache = null;
  fc.started = false; fc.queue = []; fc.log = [];
  ws.started = false; ws.sentences = [];
  state.words = []; state.sentences = {}; state.essay = "";
  state.currentTopic = null; state.currentPrompt = null;
  state.loadedEssayReview = null;
  planState.weeks = []; planState.setup = null; planState.viewWeek = 0;
  state.subscription = null;

  // Load subscription status + free access tracking
  loadFreeAccess(user.id);
  loadSubscription(user.id).then(()=>{ if(isActiveSubscriber()) state.freeAccess={openedTexts:[],topicsUsed:[]}; });

  // Load all user data in parallel
  const [wordsR, sentsR, summariesR] = await Promise.all([
    api("/api/words").catch(()=>null),
    api("/api/sentences").catch(()=>null),
    api("/api/reading-summaries").catch(()=>null),
  ]);
  if(wordsR?.ok){
    const ws2=await wordsR.json();
    if(Array.isArray(ws2)) state.words=ws2.map(w=>({...w,createdAt:new Date(w.created_at).getTime()}));
  } else {
    try{ state.words=JSON.parse(localStorage.getItem(skWords(user.id))||"[]"); }catch{}
  }
  if(sentsR?.ok){
    const s=await sentsR.json();
    if(s && typeof s==="object") state.sentences=s;
  } else {
    try{ state.sentences=JSON.parse(localStorage.getItem(skSents(user.id))||"{}"); }catch{}
  }
  if(summariesR?.ok){
    const sm=await summariesR.json();
    if(sm && typeof sm==="object") lesingState.savedSummaries=sm;
  }
  saveStorage();

  // Essays and plan (async, re-renders when done)
  syncEssaysFromServer();
  loadPlanFromServer().then(found=>{ if(found) renderContent(); });

  // Handle return from payment provider (e.g. ?subscriptionStatus=success)
  const urlParams=new URLSearchParams(window.location.search);
  if(urlParams.get("subscriptionStatus")==="success"){
    history.replaceState(null,"",window.location.pathname);
    // Reload subscription status and clear free-access tracking
    await loadSubscription(user.id);
    if(isActiveSubscriber()){
      state.freeAccess={openedTexts:[],topicsUsed:[]};
      saveFreeAccess(user.id);
    }
    setTab("innstillinger");
  }

  // Show app — teachers land on the Lærer dashboard
  if(state.userRole==="teacher") state.tab="laerer";
  $("login-screen").style.display="none";
  $("app").style.display="";
  renderHeader(); renderTabs(); renderContent();
}

async function loginAs(email, password){
  const loginErr=$("login-error");
  try{
    const r=await fetch(`${API_BASE}/auth/login`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email:email.trim().toLowerCase(), password}),
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      const msg=typeof err.detail==="string"?err.detail:Array.isArray(err.detail)?err.detail.map(e=>e.msg).join(", "):"Feil e-post eller passord.";
      if(loginErr){loginErr.style.display="";loginErr.textContent=msg;}
      return;
    }
    const data=await r.json();
    if(loginErr) loginErr.style.display="none";
    await onLoginSuccess(data.token, data.user);
  }catch(e){
    if(loginErr){loginErr.style.display="";loginErr.textContent="Kunne ikke koble til serveren. Er backend-en startet?";}
  }
}

async function registerUser(name, email, password, role="student"){
  const loginErr=$("login-error");
  try{
    const r=await fetch(`${API_BASE}/auth/register`,{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({name:name.trim(), email:email.trim().toLowerCase(), password, marketing_consent:false, role}),
    });
    if(!r.ok){
      const err=await r.json().catch(()=>({}));
      const msg=typeof err.detail==="string"?err.detail:Array.isArray(err.detail)?err.detail.map(e=>e.msg).join(", "):"Registrering feilet. Prøv igjen.";
      if(loginErr){loginErr.style.display="";loginErr.textContent=msg;}
      return;
    }
    const data=await r.json();
    if(loginErr) loginErr.style.display="none";
    await onLoginSuccess(data.token, data.user);
  }catch(e){
    if(loginErr){loginErr.style.display="";loginErr.textContent="Kunne ikke koble til serveren. Er backend-en startet?";}
  }
}

function switchUser(){
  $("app").style.display="none";
  $("login-screen").style.display="flex";
  const inp=$("login-input"); if(inp){inp.value="";inp.focus();}
  const pw=$("login-password"); if(pw) pw.value="";
  const rn=$("reg-name"); if(rn) rn.style.display="none";
  const loginErr=$("login-error"); if(loginErr) loginErr.style.display="none";
  try{
    localStorage.removeItem("b2_user_id");
    localStorage.removeItem("b2_session_token");
    localStorage.removeItem("b2_user_name");
    localStorage.removeItem("b2_user_email");
    localStorage.removeItem("b2_user_role");
  }catch{}
  state.userId=""; state.sessionToken=""; state.userName=""; state.userEmail=""; state.userRole="student";
}

// ── INIT ──────────────────────────────────────────────────────────────
(function init(){
  const savedToken = localStorage.getItem("b2_session_token");
  const savedId    = localStorage.getItem("b2_user_id");
  const loginScreen  = $("login-screen");
  const loginInput   = $("login-input");
  const loginPw      = $("login-password");
  const loginBtn     = $("login-btn");
  const regName      = $("reg-name");
  const toggleLink   = $("login-toggle");
  const toggleText   = $("login-toggle-text");
  const subtitle     = $("login-subtitle");

  let isRegisterMode = false;

  function checkLoginReady(){
    const emailOk = loginInput.value.trim().length > 0;
    const pwOk    = loginPw.value.length >= 8;
    const nameOk  = !isRegisterMode || regName.value.trim().length > 0;
    loginBtn.disabled = !(emailOk && pwOk && nameOk);
  }
  loginInput.addEventListener("input", checkLoginReady);
  loginPw.addEventListener("input", checkLoginReady);
  regName.addEventListener("input", checkLoginReady);
  loginPw.addEventListener("keydown", e=>{ if(e.key==="Enter" && !loginBtn.disabled) loginBtn.click(); });
  loginInput.addEventListener("keydown", e=>{ if(e.key==="Enter") loginPw.focus(); });

  loginBtn.addEventListener("click", ()=>{
    if(isRegisterMode){
      const roleChoice = document.querySelector("input[name='reg-role-choice']:checked");
      registerUser(regName.value, loginInput.value, loginPw.value, roleChoice ? roleChoice.value : "student");
    } else {
      loginAs(loginInput.value, loginPw.value);
    }
  });

  const regRole = $("reg-role");
  toggleLink.addEventListener("click", e=>{
    e.preventDefault();
    isRegisterMode = !isRegisterMode;
    if(isRegisterMode){
      regName.style.display=""; regRole.style.display=""; subtitle.textContent="Opprett en ny konto.";
      loginBtn.textContent="Registrer →"; toggleText.textContent="Har du konto? ";
      toggleLink.textContent="Logg inn";
    } else {
      regName.style.display="none"; regRole.style.display="none"; subtitle.textContent="Logg inn med e-postadressen din.";
      loginBtn.textContent="Logg inn →"; toggleText.textContent="Ny bruker? ";
      toggleLink.textContent="Registrer deg";
    }
    const err=$("login-error"); if(err) err.style.display="none";
    checkLoginReady();
  });

  if(savedToken && savedId){
    // Try auto-login with stored token — verify it still works
    state.sessionToken = savedToken;
    api("/api/me").then(r=>{
      if(r.ok) return r.json().then(user=>{
        onLoginSuccess(savedToken, {id:savedId, name:localStorage.getItem("b2_user_name")||"", email:localStorage.getItem("b2_user_email")||user.email, role:user.role});
      });
      else loginScreen.style.display="flex";
    }).catch(()=>{ loginScreen.style.display="flex"; });
  } else {
    loginScreen.style.display="flex";
  }
})();

function buildSubscriptionSection(container){
  const sub = state.subscription;
  const active = isActiveSubscriber();

  if(active && sub){
    // ── Active subscriber ──
    const statusLabel = sub.status==="grace" ? "Aktiv (betalingsforsøk pågår)"
      : sub.status==="cancelled" ? "Avsluttet"
      : "Aktivt abonnement";
    const badgeClass = sub.status==="grace" ? "grace"
      : sub.status==="cancelled" ? "cancelled"
      : "active";

    container.appendChild(el("div",{class:`sub-status-badge ${badgeClass}`,style:{marginBottom:"12px"}},
      `✓ ${statusLabel}`));

    const info=el("div",{style:{fontSize:"13px",color:"#555",lineHeight:"1.8",marginBottom:"16px"}});
    const provider = sub.provider==="vipps" ? "Vipps" : "PayPal";
    info.appendChild(el("div",{},el("strong",{},"Betalingsmetode: "),provider));
    if(sub.renewalDate){
      const d=new Date(sub.renewalDate).toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric"});
      if(sub.status==="cancelled"){
        info.appendChild(el("div",{},el("strong",{},"Tilgang til: "),d));
      } else {
        info.appendChild(el("div",{},el("strong",{},"Neste fornyelse: "),d));
      }
    }
    if(sub.status==="grace"&&sub.gracePeriodEnd){
      const d=new Date(sub.gracePeriodEnd).toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric"});
      info.appendChild(el("div",{style:{color:"#e6a817"}},`⚠️ Betaling mislyktes. Siste forsøk: ${d}`));
    }
    container.appendChild(info);

    if((sub.status==="active"||sub.status==="grace") && state.userRole !== "teacher"){
      container.appendChild(el("button",{class:"btn-sec",style:{fontSize:"13px"},
        async click(){
          if(!confirm("Er du sikker på at du vil avslutte abonnementet?\nDu beholder tilgang til fornyelsesdatoen.")) return;
          const r=await api(`/api/subscription/${encodeURIComponent(state.userId)}/cancel`,{method:"POST"});
          if(r&&r.ok){
            const data=await r.json();
            state.subscription={...sub,status:"cancelled",cancelledAt:new Date().toISOString()};
            renderContent();
          } else {
            alert("Kunne ikke avslutte abonnementet. Prøv igjen.");
          }
        }
      },"Avslutt abonnement"));
    }
  } else {
    // ── Free user ──
    container.appendChild(el("div",{class:"sub-status-badge inactive",style:{marginBottom:"12px"}},"Gratis bruker"));

    const used=state.freeAccess.openedTexts.length;
    const remaining=Math.max(0,3-used);
    container.appendChild(el("p",{style:{fontSize:"13px",color:"#555",lineHeight:"1.6",marginBottom:"16px"}},
      `Du har åpnet ${used} av 3 gratis tekster (${remaining} gjenstår). `+
      `Oppgrader for ubegrenset tilgang til alle tekster.`));

    container.appendChild(el("p",{style:{fontSize:"14px",fontWeight:"700",color:"#1a1a1a",marginBottom:"10px"}},"99 kr/måned — Velg betalingsmetode:"));

    // Provider selector
    let selectedProvider="vipps";
    const providerRow=el("div",{style:{display:"flex",gap:"10px",marginBottom:"14px"}});

    const vippsBtn=el("button",{style:{flex:"1",padding:"10px",border:"2px solid #1a6b4a",borderRadius:"10px",background:"#edfaf3",fontWeight:"700",fontSize:"13px",cursor:"pointer"},
      click(){selectedProvider="vipps";vippsBtn.style.borderColor="#1a6b4a";vippsBtn.style.background="#edfaf3";paypalBtn.style.borderColor="#ddd";paypalBtn.style.background="#fff";}
    },"🟠 Vipps");
    const paypalBtn=el("button",{style:{flex:"1",padding:"10px",border:"2px solid #ddd",borderRadius:"10px",background:"#fff",fontWeight:"700",fontSize:"13px",cursor:"pointer"},
      click(){selectedProvider="paypal";paypalBtn.style.borderColor="#1a6b4a";paypalBtn.style.background="#edfaf3";vippsBtn.style.borderColor="#ddd";vippsBtn.style.background="#fff";}
    },"🔵 PayPal");
    providerRow.appendChild(vippsBtn);
    providerRow.appendChild(paypalBtn);
    container.appendChild(providerRow);

    const errDiv=el("div",{style:{color:"#c0392b",fontSize:"13px",marginBottom:"8px",display:"none"}});
    container.appendChild(errDiv);

    container.appendChild(el("button",{class:"btn-add",style:{width:"100%"},
      async click(){
        errDiv.style.display="none";
        const r=await api("/api/subscribe",{method:"POST",body:JSON.stringify({userId:state.userId,provider:selectedProvider})});
        if(r&&r.ok){
          const data=await r.json();
          if(data.redirectUrl) window.location.href=data.redirectUrl;
        } else {
          const err=r?await r.json().catch(()=>({})):{};
          errDiv.textContent=err.error||"Noe gikk galt. Prøv igjen.";
          errDiv.style.display="";
        }
      }
    },"Oppgrader til abonnement →"));
  }
}

  const makeRoleBtn = (label, value) => {
    const isActive = state.userRole === value;
    const btn = el("button",{
      class: isActive ? "btn-primary" : "btn-sec",
      style:{marginRight:"8px", opacity: isActive ? "1" : "0.7"},
      click: async ()=>{

        btn.disabled=true; btn.textContent="Lagrer…";
        try{
          const r = await api("/api/me",{method:"PUT",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({role:value})});
          if(r.ok){
            roleMsg.textContent="Rolle oppdatert! Logg ut og inn igjen for å aktivere den nye rollen.";
            roleMsg.style.display="";
          } else {
            roleMsg.textContent="Kunne ikke endre rolle.";
            roleMsg.style.color="#c0392b"; roleMsg.style.display="";
          }
        } catch{ roleMsg.textContent="Feil ved tilkobling."; roleMsg.style.color="#c0392b"; roleMsg.style.display=""; }
        btn.disabled=false; btn.textContent=label;
      }
    }, label);
    return btn;
  };
  roleWrap.appendChild(makeRoleBtn("Elev 📚","student"));
  roleWrap.appendChild(makeRoleBtn("Lærer 👩‍🏫","teacher"));
  roleWrap.appendChild(roleMsg);
  userCard.appendChild(roleWrap);

  userCard.appendChild(el("button",{class:"btn-sec",style:{width:"100%"},click:switchUser},"Logg ut"));

  // ── Din lærer (students only) ──
  if(state.userRole !== "teacher"){
    const teacherCard = el("div",{class:"card"});
    teacherCard.appendChild(el("h2",{},"👩‍🏫 Din lærer"));
    const teacherMsg = el("div",{style:{fontSize:"13px",color:"#555",marginBottom:"10px"}},"Laster lærere…");
    const teacherSel = el("select",{style:{width:"100%",padding:"8px",borderRadius:"6px",border:"1px solid #ccc",
      fontSize:"14px",marginBottom:"10px",display:"none"}});
    const teacherSaveBtn = el("button",{class:"btn-primary",style:{width:"100%",display:"none"},
      click: async ()=>{
        const val = teacherSel.value;
        if(!val){ return; }
        teacherSaveBtn.disabled=true; teacherSaveBtn.textContent="Lagrer…";
        const r = await api("/api/me/teacher",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({teacher_id:val})});
        if(r.ok){
          teacherMsg.textContent="✅ Du er nå tilknyttet læreren. Læreren kan nå se fremgangen din.";
          teacherMsg.style.color="#1a6b4a";
        } else {
          const d = await r.json().catch(()=>({detail:"Feil"}));
          teacherMsg.textContent = d.detail||"Kunne ikke lagre.";
          teacherMsg.style.color="#c0392b";
        }
        teacherSaveBtn.disabled=false; teacherSaveBtn.textContent="Lagre valg";
      }
    },"Lagre valg");
    teacherCard.appendChild(teacherMsg);
    teacherCard.appendChild(teacherSel);
    teacherCard.appendChild(teacherSaveBtn);
    // Load teachers async
    api("/api/me/teachers").then(r=>r.ok?r.json():null).then(teachers=>{
      if(!teachers||teachers.length===0){
        teacherMsg.textContent="Ingen lærere er registrert ennå.";
        return;
      }
      teacherSel.innerHTML="";
      teacherSel.appendChild(el("option",{value:""},"— Velg din lærer —"));
      teachers.forEach(t=>{
        teacherSel.appendChild(el("option",{value:t.id},`${t.name} (${t.email})`));
      });
      teacherMsg.textContent="Velg læreren din fra listen:";
      teacherSel.style.display=""; teacherSaveBtn.style.display="";
    }).catch(()=>{ teacherMsg.textContent="Kunne ikke laste lærere."; });
    frag.appendChild(teacherCard);
  }

  // ── Abonnement ──
  const subCard=el("div",{class:"card"});
  subCard.appendChild(el("h2",{},"💳 Abonnement"));
  buildSubscriptionSection(subCard);
  frag.appendChild(subCard);

  return frag;
}

    click: async ()=>{

      addErr.style.display="none";
      addBtn.disabled=true; addBtn.textContent="Legger til…";

          headers:{"Content-Type":"application/json"},

          emailInput.value="";

          const d=await r.json().catch(()=>({detail:"Ukjent feil"}));
          addErr.textContent=d.detail||"Kunne ikke legge til eleven";

  addBox.appendChild(addBtn);

  // Student list
  const listWrap = el("div",{});
  frag.appendChild(listWrap);

  frag.appendChild(giOppgaverWrap);

  async function loadStudents(){
    if(teacherState.students===null){
      const r = await api("/api/teacher/students").catch(()=>null);
      if(r?.ok) teacherState.students=await r.json();
      else teacherState.students=[];
    }
    listWrap.innerHTML="";

    if(!teacherState.students.length){

    }
    teacherState.students.forEach(s=>{
      const row = el("div",{class:"card",style:{display:"flex",alignItems:"center",gap:"12px",

        teacherState.studentSentences=null;

        teacherState.studentAssignments=null;
        laererSetView("progress");

          const r = await api(`/api/teacher/students/${encodeURIComponent(s.id)}`,{method:"DELETE"}).catch(()=>null);

      row.appendChild(removeBtn);
      listWrap.appendChild(row);

  const frag = document.createDocumentFragment();
  const s = teacherState.selectedStudent;

  frag.appendChild(el("button",{class:"btn-secondary",style:{marginBottom:"16px"},
    click:()=>laererSetView("progress")},"← Tilbake"));
  frag.appendChild(el("h2",{style:{marginBottom:"4px"}},`Studieplan: ${$esc(s?.name||"")}`));

  const wrap = el("div",{});
  frag.appendChild(wrap);

  async function load(){
    if(!teacherState.studentPlan){
      const r = await api(`/api/teacher/students/${encodeURIComponent(s.id)}/plan`).catch(()=>null);
      teacherState.studentPlan = r?.ok ? await r.json() : null;
    }
    wrap.innerHTML="";
    const plan = teacherState.studentPlan;
    if(!plan || !plan.data?.setup){
      wrap.appendChild(el("p",{style:{color:"#888",marginTop:"16px"}},"Eleven har ikke opprettet en studieplan ennå.")); return;
    }

    // Load texts JSON so we can resolve text references
    await loadLesingTexts();

    const {weeks, setup} = plan.data;
    const readIds = new Set(plan.texts_read_ids||[]);
    const essaysDone = new Set(plan.essays_written||[]);

    // ── Summary header
    const totalTexts = weeks.reduce((n,w)=>n+w.texts.length,0);
    const doneTexts  = weeks.reduce((n,w)=>n+w.texts.filter(t=>{
      const tx=getPlanText(t.topicKey,t.textSlot); return tx&&readIds.has(tx.id);
    }).length,0);
    const progPct = totalTexts ? Math.round(doneTexts/totalTexts*100) : 0;

    const hdr = el("div",{class:"card",style:{marginBottom:"14px"}});
    const meta = el("div",{style:{fontSize:"13px",color:"#777",marginBottom:"8px"}});
    meta.textContent=`${setup.months} mnd · ${setup.daysPerWeek} dag${setup.daysPerWeek>1?"er":""}/uke · ${weeks.length} uker · start: ${new Date(setup.startDate).toLocaleDateString("nb-NO")}`;
    hdr.appendChild(meta);

    const sumRow = el("div",{style:{display:"flex",gap:"16px",flexWrap:"wrap",marginBottom:"10px",fontSize:"14px"}});
    sumRow.appendChild(el("span",{},`📖 Tekster: ${doneTexts}/${totalTexts}`));
    hdr.appendChild(sumRow);

    hdr.appendChild(el("div",{style:{fontSize:"12px",color:"#888",marginBottom:"4px"}},`Lesefremdrift: ${progPct}%`));
    const pw=el("div",{class:"plan-prog-wrap"});
    pw.appendChild(el("div",{class:"plan-prog-fill",style:{width:progPct+"%"}}));
    hdr.appendChild(pw);

    if(plan.updated_at){
      hdr.appendChild(el("div",{style:{fontSize:"11px",color:"#bbb",marginTop:"8px"}},
        `Sist oppdatert: ${new Date(plan.updated_at).toLocaleDateString("nb-NO")}`));
    }
    wrap.appendChild(hdr);

    // ── Week list
    const todayISO = new Date().toISOString().slice(0,10);
    weeks.forEach((week,i)=>{
      const isCurrent = week.weekStartISO <= todayISO &&
        (i===weeks.length-1 || weeks[i+1].weekStartISO > todayISO);
      const weekTexts = week.texts.map(t=>getPlanText(t.topicKey,t.textSlot)).filter(Boolean);
      const weekDone  = weekTexts.filter(t=>readIds.has(t.id)).length;
      const essayPrompts = week.essayPrompts || (week.essayPrompt?[week.essayPrompt]:[]);
      const essaysDoneCount = essayPrompts.filter(p=>essaysDone.has(p.title)||essaysDone.has(p.id)).length;

      const sec = el("div",{style:{marginBottom:"8px"}});
      const hdrRow = el("div",{
        style:{display:"flex",alignItems:"center",gap:"8px",padding:"10px 14px",
          background:isCurrent?"#f0fdf4":"#f8f9fa",
          borderRadius:"8px",border:`1px solid ${isCurrent?"#86efac":"#e0e0e0"}`,cursor:"pointer"},
        click(){
          const body=sec.querySelector(".plan-week-teacher-body");
          body.style.display=body.style.display==="none"?"block":"none";
        }
      });
      if(isCurrent) hdrRow.appendChild(el("span",{style:{fontSize:"11px",background:"#1a6b4a",color:"#fff",padding:"2px 7px",borderRadius:"10px",fontWeight:"700"}},"Nå"));
      hdrRow.appendChild(el("span",{style:{fontWeight:"700",minWidth:"60px"}},`Uke ${week.weekNum}`));
      hdrRow.appendChild(el("span",{style:{flex:"1",color:"#555",fontSize:"13px"}},$esc(week.topicEmoji+" "+week.topicName)));
      hdrRow.appendChild(el("span",{style:{fontSize:"12px",color:"#888",whiteSpace:"nowrap"}},$esc(week.dateRange||"")));
      hdrRow.appendChild(el("span",{style:{fontSize:"13px",marginLeft:"8px"}},
        `${weekDone}/${weekTexts.length} 📖`+(essayPrompts.length?` · ${essaysDoneCount}/${essayPrompts.length} ✍️`:"")));
      sec.appendChild(hdrRow);

      const body = el("div",{class:"plan-week-teacher-body",style:{display:isCurrent?"block":"none",padding:"8px 0 4px"}});

      // Texts
      weekTexts.forEach(text=>{
        const done = readIds.has(text.id);
        const row = el("div",{
          style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",
            borderRadius:"6px",marginBottom:"4px",cursor:"pointer",
            background:done?"#f0fdf4":"#fff",border:"1px solid "+(done?"#86efac":"#e8ecf0")},
          click:async()=>{
            setLesingText(text); state.tab="lesing"; renderContent();
          }
        });
        row.appendChild(el("span",{style:{fontSize:"16px"}},done?"✅":"⬜"));
        row.appendChild(el("span",{style:{flex:"1",fontSize:"13px",fontWeight:done?"600":"400"}},$esc(text.title)));
        row.appendChild(el("span",{style:{fontSize:"11px",color:"#2c8ec4"}},"Åpne →"));
        body.appendChild(row);
      });

      // Essays
      essayPrompts.forEach(prompt=>{
        const done = essaysDone.has(prompt.title)||essaysDone.has(prompt.id);
        const row = el("div",{
          style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",
            borderRadius:"6px",marginBottom:"4px",
            background:done?"#f0fdf4":"#fff",border:"1px solid "+(done?"#86efac":"#e8ecf0")}
        });
        row.appendChild(el("span",{style:{fontSize:"16px"}},done?"✅":"⬜"));
        row.appendChild(el("span",{style:{fontSize:"13px",color:"#555"}},$esc("✍️ "+prompt.title)));
        body.appendChild(row);
      });

      // Word target
      if(week.wordTarget){
        const wrow = el("div",{style:{padding:"4px 10px",fontSize:"12px",color:"#888"}});
        wrow.textContent=`🔤 Ordmål: ${week.wordTarget} ord`;
        body.appendChild(wrow);
      }

      sec.appendChild(body);
      wrap.appendChild(sec);
    });
  }
  load();
  return frag;
}

    aiCard.appendChild(el("h4",{style:{margin:"0 0 8px",color:"#2c5f9e"}},"🤖 AI-tilbakemelding"));
    try{
      const feedbackData=typeof essay.claude_feedback==="string"
        ?JSON.parse(essay.claude_feedback):essay.claude_feedback;
      const aiContainer=el("div",{});
      renderEssayClaudeResult(feedbackData,aiContainer);
      aiCard.appendChild(aiContainer);
    }catch{
      const aiText=el("div",{style:{whiteSpace:"pre-wrap",lineHeight:"1.7",fontSize:"14px"}});
      aiText.textContent=essay.claude_feedback;
      aiCard.appendChild(aiText);
    }
    frag.appendChild(aiCard);
  }

  // Teacher review form
  const reviewCard=el("div",{class:"card",style:{padding:"16px"}});
  reviewCard.appendChild(el("h4",{style:{margin:"0 0 12px"}},"Din tilbakemelding"));

  // Like toggle
  let liked=review?.liked||false;
  const likeBtn=el("button",{
    class:liked?"btn-primary":"btn-secondary",
    style:{marginBottom:"12px"},
    click:()=>{
      liked=!liked;
      likeBtn.textContent=liked?"✓ Godkjent":"👍 Godkjenn stilen";
      likeBtn.className=liked?"btn-primary":"btn-secondary";
    }
  }, liked?"✓ Godkjent":"👍 Godkjenn stilen");
  reviewCard.appendChild(likeBtn);

  // Comment textarea
  reviewCard.appendChild(el("div",{style:{marginBottom:"6px",fontWeight:"600",fontSize:"14px"}},"Kommentar (valgfritt):"));
  const commentArea=el("textarea",{rows:"4",
    style:{width:"100%",padding:"8px",boxSizing:"border-box",border:"1px solid #ccc",
      borderRadius:"6px",fontSize:"14px",resize:"vertical"}});
  commentArea.value=review?.comment||"";
  reviewCard.appendChild(commentArea);

  const saveErr=el("div",{style:{color:"#c0392b",fontSize:"13px",marginTop:"6px",display:"none"}});
  const saveBtn=el("button",{class:"btn-primary",style:{marginTop:"10px",width:"100%"},
    click: async ()=>{
      saveErr.style.display="none";
      saveBtn.disabled=true; saveBtn.textContent="Lagrer…";
      try{
        const r=await api(`/api/teacher/essays/${encodeURIComponent(essay.id)}/review`,{
          method:"PUT",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({liked, comment:commentArea.value.trim()||null})
        });
        if(r.ok){
          const updated=await r.json();
          // Update cached essay review
          if(teacherState.studentEssays){
            const idx=teacherState.studentEssays.findIndex(e=>e.id===essay.id);
            if(idx>=0) teacherState.studentEssays[idx].teacher_review=updated;
          }
          teacherState.selectedEssay={...essay, teacher_review:updated};
          toast("✓ Tilbakemelding lagret");
          saveBtn.textContent="Lagret ✓";
          saveBtn.disabled=false;
        } else {
          const d=await r.json().catch(()=>({detail:"Ukjent feil"}));
          saveErr.textContent=d.detail||"Kunne ikke lagre";
          saveErr.style.display="";
          saveBtn.textContent="Lagre tilbakemelding";
          saveBtn.disabled=false;
        }
      }catch(e){
        saveErr.textContent="Nettverksfeil";
        saveErr.style.display="";
        saveBtn.textContent="Lagre tilbakemelding";
        saveBtn.disabled=false;
      }
    }
  },"Lagre tilbakemelding");
  reviewCard.appendChild(saveErr);
  reviewCard.appendChild(saveBtn);
  frag.appendChild(reviewCard);

  return frag;
}
