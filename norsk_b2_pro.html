    const texts = await loadLesingTexts().catch(()=>[]);
    const textMap = Object.fromEntries((texts||[]).map(t=>[t.id,t]));

    const note = el("p",{style:{color:"#888",fontSize:"13px",margin:"4px 0 16px"}});
    note.textContent=`${teacherState.studentSummaries.length} gjenfortelling${teacherState.studentSummaries.length!==1?"er":""}`;
    wrap.appendChild(note);

    teacherState.studentSummaries.forEach(sm=>{
      const tx = textMap[sm.text_id];
      const card = el("div",{class:"card",style:{padding:"16px",marginBottom:"12px"}});

      // Header: text title + topic badge + date
      const hdr = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap",marginBottom:"12px"}});
      hdr.appendChild(el("span",{style:{fontWeight:"700",flex:"1",fontSize:"15px"}},$esc(tx?.title||sm.text_id)));
      if(tx?.topic) hdr.appendChild(el("span",{style:{fontSize:"12px",background:"#e8f4fd",color:"#2c8ec4",padding:"2px 8px",borderRadius:"10px"}},$esc(tx.topic)));
      hdr.appendChild(el("span",{style:{fontSize:"12px",color:"#aaa"}},new Date(sm.updated_at).toLocaleDateString("nb-NO")));
      card.appendChild(hdr);

      // Summary text
      const textBox = el("div",{style:{background:"#f8f9fa",borderRadius:"8px",padding:"12px 14px",fontSize:"14px",lineHeight:"1.7",color:"#333",whiteSpace:"pre-wrap",fontFamily:"Georgia,serif",marginBottom:sm.claude_feedback?"12px":"0"}});
      textBox.textContent=sm.summary_text;
      card.appendChild(textBox);

      // AI feedback (if present)
      if(sm.claude_feedback){
        try{
          const parsed=JSON.parse(sm.claude_feedback);
          const fbContainer=el("div",{});
          renderGjenfortellResult(parsed,fbContainer);
          card.appendChild(fbContainer);
        }catch{
          const raw=el("div",{style:{fontSize:"12px",color:"#aaa",marginTop:"8px",whiteSpace:"pre-wrap"}});
          raw.textContent=sm.claude_feedback;
          card.appendChild(raw);
        }
      }

      wrap.appendChild(card);
    });
  }
  load();
  return frag;
}

// Escape helper (used in teacher dashboard if not already defined globally)
function $esc(str){ return String(str||""); }

// ── MINE OPPGAVER TAB (student plan replacement) ───────────────────────────

function buildMineOppgaver(){
  const frag = document.createDocumentFragment();
  const hdr = el("div",{class:"card",style:{marginBottom:"16px",padding:"16px 20px"}});
  hdr.appendChild(el("h2",{style:{margin:0}},"📋 Mine oppgaver"));
  frag.appendChild(hdr);

  const wrap = el("div",{});
  frag.appendChild(wrap);

  async function load(){
    wrap.innerHTML = "";
    const r = await api("/api/assignments/mine").catch(()=>null);
    if(!r?.ok){
      wrap.appendChild(el("p",{style:{color:"#888"}},"Kunne ikke laste oppgaver."));
      return;
    }
    const assignments = await r.json();
    if(!assignments.length){
      const empty = el("div",{class:"card",style:{textAlign:"center",padding:"40px 20px",color:"#aaa"}});
      empty.appendChild(el("div",{style:{fontSize:"48px",marginBottom:"12px"}},"📭"));
      empty.appendChild(el("p",{style:{margin:0,fontSize:"15px"}},"Ingen oppgaver ennå."));
      wrap.appendChild(empty);
      return;
    }
    assignments.forEach(asgn => {
      const card = el("div",{class:"card",style:{marginBottom:"16px"}});
      // Assignment header
      const asgnHdr = el("div",{style:{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"12px",flexWrap:"wrap"}});
      asgnHdr.appendChild(el("span",{style:{fontWeight:"700",fontSize:"16px"}},
        $esc(asgn.label || "Oppgave")));
      asgnHdr.appendChild(el("span",{style:{fontSize:"12px",color:"#888"}},
        "Fra: "+$esc(asgn.teacher_name)+" · "+new Date(asgn.assigned_at).toLocaleDateString("nb-NO")));
      card.appendChild(asgnHdr);

      asgn.items.forEach(item => {
        const itemWrap = el("div",{style:{
          borderTop:"1px solid #eee",paddingTop:"12px",marginTop:"4px",
          opacity: item.done ? "0.5" : "1",
        }});

        // Type badge
        const typeLabel = item.item_type==="word_list" ? "📚 Ordliste"
          : item.item_type==="reading_text" ? "📖 Lesetekst"
          : "✍️ Skriveoppgave";
        const doneBadge = item.done
          ? el("span",{style:{background:"#d4edda",color:"#155724",borderRadius:"20px",padding:"2px 10px",fontSize:"12px",fontWeight:"700"}},"✓ Gjort")
          : null;
        const badgeRow = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px"}});
        badgeRow.appendChild(el("span",{style:{fontWeight:"700",fontSize:"13px",color:"#1a6b4a"}},typeLabel));
        if(doneBadge) badgeRow.appendChild(doneBadge);
        itemWrap.appendChild(badgeRow);

        // Content display + action buttons
        const btnRow = el("div",{style:{display:"flex",gap:"8px",flexWrap:"wrap",marginTop:"8px"}});

        if(item.item_type==="word_list"){
          const words = item.content.words || [];
          const tbl = el("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"13px",marginBottom:"8px"}});
          const head = el("tr",{style:{background:"#f5f5f5"}});
          head.appendChild(el("th",{style:{padding:"4px 8px",textAlign:"left",fontWeight:"600"}},"Ord"));
          if(item.content.include_translation)
            head.appendChild(el("th",{style:{padding:"4px 8px",textAlign:"left",fontWeight:"600"}},"Oversettelse"));
          head.appendChild(el("th",{style:{padding:"4px 8px",textAlign:"left",fontWeight:"600"}},"Tema"));
          tbl.appendChild(head);
          words.forEach(w => {
            const row = el("tr",{});
            row.appendChild(el("td",{style:{padding:"4px 8px",borderBottom:"1px solid #f0f0f0"}},$esc(w.word)));
            if(item.content.include_translation)
              row.appendChild(el("td",{style:{padding:"4px 8px",borderBottom:"1px solid #f0f0f0",color:"#666"}},$esc(w.meaning)));
            row.appendChild(el("td",{style:{padding:"4px 8px",borderBottom:"1px solid #f0f0f0",color:"#888",fontSize:"12px"}},$esc(w.topic)));
            tbl.appendChild(row);
          });
          itemWrap.appendChild(tbl);
          if(!item.done){
            const importBtn = el("button",{class:"btn-primary",style:{fontSize:"13px",padding:"7px 16px"},
              click: async ()=>{
                importBtn.disabled=true; importBtn.textContent="Legger til…";
                let added=0;
                for(const w of words){
                  const rw=await api("/api/words",{method:"POST",headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({word:w.word,meaning:w.meaning,category:w.category||"substantiv",topic:w.topic||""})
                  }).catch(()=>null);
                  if(rw?.ok||rw?.status===409) added++;
                }
                await api(`/api/assignments/items/${encodeURIComponent(item.item_id)}/done`,{
                  method:"PATCH",headers:{"Content-Type":"application/json"},body:JSON.stringify({done:true})
                }).catch(()=>null);
                toast(`${added} ord lagt til i ordbanken!`);
                load();
              }
            },"📚 Legg til i ordbank →");
            btnRow.appendChild(importBtn);
          }

        } else if(item.item_type==="reading_text"){
          itemWrap.appendChild(el("div",{style:{fontWeight:"600",marginBottom:"4px"}},$esc(item.content.title||"")));
          const bodyDiv = el("div",{style:{
            maxHeight:"80px",overflow:"hidden",fontSize:"13px",color:"#666",
            lineHeight:"1.6",position:"relative",marginBottom:"8px",
          }});
          bodyDiv.textContent = (item.content.body||"").substring(0,200)+(item.content.body?.length>200?"…":"");
          itemWrap.appendChild(bodyDiv);
          const openBtn = el("button",{class:"btn-primary",style:{fontSize:"13px",padding:"7px 16px"},
            click: async ()=>{
              openBtn.disabled=true; openBtn.textContent="Laster…";
              if(item.content.source==="bank"){
                const texts=await loadLesingTexts().catch(()=>[]);
                const found=texts.find(t=>t.id===item.content.text_id);
                if(found){ setLesingText(found); setTab("lesing"); }
                else{ openBtn.disabled=false; openBtn.textContent="📖 Les teksten →"; toast("Teksten ble ikke funnet"); }
              } else {
                setLesingText({id:`asgn-${item.item_id}`,title:item.content.title||"Tekst",topic:item.content.topic||"",text:item.content.body||""});
                setTab("lesing");
              }
            }
          },"📖 Les teksten →");
          btnRow.appendChild(openBtn);

        } else {
          const promptDiv = el("div",{style:{
            background:"#f9f9f9",border:"1.5px solid #eee",borderRadius:"8px",
            padding:"10px 14px",fontSize:"13px",color:"#333",lineHeight:"1.6",marginBottom:"8px",
          }});
          promptDiv.textContent = item.content.prompt_text || "";
          itemWrap.appendChild(promptDiv);
          const writeBtn = el("button",{class:"btn-primary",style:{fontSize:"13px",padding:"7px 16px"},
            click: ()=>{
              state.currentPrompt={title:item.content.prompt_title||"Skriveoppgave",text:item.content.prompt_text||""};
              state.currentTopic=null;
              state.essay="";
              setTab("skriv");
            }
          },"✍️ Skriv stilen →");
          btnRow.appendChild(writeBtn);
        }

        // Mark done button (for reading + essay items)
        if(!item.done && item.item_type!=="word_list"){
          const doneBtn = el("button",{
            class:"btn-secondary",
            style:{fontSize:"13px",padding:"7px 14px"},
            click: async ()=>{
              doneBtn.disabled=true; doneBtn.textContent="Lagrer…";
              const r2 = await api(`/api/assignments/items/${encodeURIComponent(item.item_id)}/done`,{
                method:"PATCH",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({done:true})
              }).catch(()=>null);
              if(r2?.ok){ load(); }
              else { doneBtn.disabled=false; doneBtn.textContent="✓ Marker som gjort"; toast("Kunne ikke lagre"); }
            }
          },"✓ Marker som gjort");
          btnRow.appendChild(doneBtn);
        }

        itemWrap.appendChild(btnRow);

        card.appendChild(itemWrap);
      });
      wrap.appendChild(card);
    });
  }
  load();
  return frag;
}

// ── GI OPPGAVER panel (teacher roster) ────────────────────────────────────

function buildGiOppgaver(students){
  const wrap = el("div",{class:"card",style:{marginTop:"24px"}});
  wrap.appendChild(el("h3",{style:{margin:"0 0 16px"}},"📤 Gi oppgaver"));

  // Mode selector
  let mode = "ordliste";
  const modeWrap = el("div",{style:{display:"flex",gap:"0",marginBottom:"20px",borderRadius:"10px",overflow:"hidden",border:"1.5px solid #dde"}});
  const modeContent = el("div",{});

  function modeBtn(key, label){
    return el("button",{
      "data-mode":key,
      style:{
        flex:"1",border:"none",padding:"8px 4px",fontSize:"13px",cursor:"pointer",
        background: key===mode ? "#1a6b4a" : "#f8f8f8",
        color: key===mode ? "#fff" : "#444",
        fontWeight: key===mode ? "700" : "400",
        transition:"background 0.15s",
      },
      click:()=>{ mode=key; updateModeBtns(); renderMode(); }
    }, label);
  }

  function updateModeBtns(){
    modeWrap.querySelectorAll("[data-mode]").forEach(b=>{
      const active = b.dataset.mode===mode;
      b.style.background = active?"#1a6b4a":"#f8f8f8";
      b.style.color = active?"#fff":"#444";
      b.style.fontWeight = active?"700":"400";
    });
  }

  modeWrap.appendChild(modeBtn("ordliste","📚 Ordliste"));
  modeWrap.appendChild(modeBtn("lese-skriv","📖 Lese- og skriveoppgave"));
  modeWrap.appendChild(modeBtn("full","📋 Full plan"));
  wrap.appendChild(modeWrap);

  // Student multi-select
  const studentSec = el("div",{style:{marginBottom:"16px"}});
  studentSec.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"8px"}},"Velg elever:"));
  let selectedIds = new Set();
  const studentCbs = [];

  const allRow = el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}});
  const allCb = el("input",{type:"checkbox",id:"gi-all"});
  allCb.addEventListener("change",()=>{
    if(allCb.checked) students.forEach(s=>selectedIds.add(s.id));
    else selectedIds.clear();
    studentCbs.forEach(({cb})=>{ cb.checked=allCb.checked; });
    updateAssignBtns();
  });
  allRow.appendChild(allCb);
  allRow.appendChild(el("label",{for:"gi-all",style:{fontWeight:"600",fontSize:"13px",cursor:"pointer"}},"Alle elever"));
  studentSec.appendChild(allRow);

  students.forEach(s=>{
    const id = "gi-s-"+s.id.replace(/[^a-z0-9]/gi,"-");
    const cb = el("input",{type:"checkbox",id});
    studentCbs.push({cb, sid:s.id});
    cb.addEventListener("change",()=>{
      if(cb.checked) selectedIds.add(s.id); else selectedIds.delete(s.id);
      allCb.checked = students.every(st=>selectedIds.has(st.id));
      updateAssignBtns();
    });
    const row = el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"4px"}});
    row.appendChild(cb);
    row.appendChild(el("label",{for:id,style:{fontSize:"13px",cursor:"pointer"}},$esc(s.name)));
    studentSec.appendChild(row);
  });
  wrap.appendChild(studentSec);

  const assignBtns = []; // collected across mode renders so we can update disabled state
  function updateAssignBtns(){ assignBtns.forEach(b=>{ b.disabled = selectedIds.size===0; }); }

  wrap.appendChild(modeContent);

  // ── ORDLISTE MODE ─────────────────────────────────────────────────────
  function renderOrdliste(){
    modeContent.innerHTML="";
    assignBtns.length=0;

    const topicSel = el("select",{style:{marginBottom:"10px",padding:"6px 10px",borderRadius:"8px",border:"1.5px solid #dde",fontSize:"14px",width:"100%"}});
    topicSel.appendChild(el("option",{value:""},"Velg tema…"));
    VALID_TOPIC_LIST.forEach(t=>topicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
    modeContent.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"6px"}},"Tema:"));
    modeContent.appendChild(topicSel);

    const transRow = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}});
    const transCb = el("input",{type:"checkbox",id:"gi-trans"}); transCb.checked=true;
    transRow.appendChild(transCb);
    transRow.appendChild(el("label",{for:"gi-trans",style:{fontSize:"13px",cursor:"pointer"}},"Inkluder oversettelse"));
    modeContent.appendChild(transRow);

    // ── Load from teacher's own ordbank ────────────────────────────────
    const bankSec = el("div",{style:{marginBottom:"12px",border:"1px solid #dde",borderRadius:"8px",overflow:"hidden"}});
    const bankHdr = el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"8px 12px",background:"#f0f7f4",cursor:"pointer",userSelect:"none"},
      click:()=>{ bankBody.style.display=bankBody.style.display?"":"none"; bankChevron.textContent=bankBody.style.display?"▶":"▼"; }
    });
    const bankChevron=el("span",{style:{fontSize:"11px",color:"#666"}},"▶");
    bankHdr.appendChild(bankChevron);
    bankHdr.appendChild(el("span",{style:{fontSize:"13px",fontWeight:"600",color:"#1a6b4a"}},"Fra min ordbank"));
    bankSec.appendChild(bankHdr);

    const bankBody=el("div",{style:{display:"none",padding:"10px 12px"}});
    const bankTopicSel=el("select",{style:{width:"100%",marginBottom:"8px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
    bankTopicSel.appendChild(el("option",{value:""},"Alle temaer"));
    const myTopics=[...new Set((state.words||[]).map(w=>w.topic||"").filter(Boolean))].sort();
    myTopics.forEach(t=>bankTopicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
    bankBody.appendChild(bankTopicSel);

    const bankListWrap=el("div",{style:{maxHeight:"180px",overflowY:"auto",border:"1px solid #eee",borderRadius:"6px",marginBottom:"8px"}});
    bankBody.appendChild(bankListWrap);

    function renderBankWordList(){
      bankListWrap.innerHTML="";
      const topic=bankTopicSel.value;
      const filtered=(state.words||[]).filter(w=>!topic||(w.topic||"")===topic);
      if(!filtered.length){
        bankListWrap.appendChild(el("div",{style:{padding:"10px",color:"#888",fontSize:"13px"}},"Ingen ord funnet."));
        return;
      }
      filtered.forEach(w=>{
        const row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 10px",borderBottom:"1px solid #f0f0f0",fontSize:"13px"}});
        const cb=el("input",{type:"checkbox"});
        row.appendChild(cb);
        row.appendChild(el("span",{style:{flex:"1",fontWeight:"600"}},$esc(w.word)));
        row.appendChild(el("span",{style:{color:"#888",fontSize:"12px"}},$esc(w.meaning||"")));
        cb._word=w;
        bankListWrap.appendChild(row);
      });
    }
    bankTopicSel.addEventListener("change",()=>{
      // Sync topic selector above if user picks a topic from bank
      if(bankTopicSel.value && !topicSel.value) topicSel.value=bankTopicSel.value;
      renderBankWordList();
    });
    renderBankWordList();

    const addFromBankBtn=el("button",{style:{fontSize:"12px",padding:"5px 12px",background:"#1a6b4a",color:"#fff",border:"none",borderRadius:"6px",cursor:"pointer"},
      click:()=>{
        const checked=[...bankListWrap.querySelectorAll("input[type=checkbox]:checked")].map(cb=>cb._word);
        if(!checked.length){ toast("Velg minst ett ord"); return; }
        // Set topic from bank selection if not already set
        if(!topicSel.value && bankTopicSel.value) topicSel.value=bankTopicSel.value;
        checked.forEach(w=>{
          // Add a row pre-filled with the word
          const row = el("div",{style:{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"center"}});
          const wordIn = el("input",{type:"text",placeholder:"Ord",style:{flex:"1",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
          wordIn.value = w.word;
          const meanIn = el("input",{type:"text",placeholder:"Oversettelse",style:{flex:"1",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
          meanIn.value = w.meaning||"";
          const pair={wordIn,meanIn};
          const rm = el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:"16px",padding:"0 4px"},
            click:()=>{ const i=wordRows.indexOf(pair); if(i>-1){wordRows.splice(i,1);row.remove();} }
          },"×");
          row.appendChild(wordIn); row.appendChild(meanIn); row.appendChild(rm);
          wordsWrap.appendChild(row);
          wordRows.push(pair);
        });
        // Uncheck all
        bankListWrap.querySelectorAll("input[type=checkbox]").forEach(cb=>cb.checked=false);
        toast(`${checked.length} ord lagt til`);
      }
    },"Legg til valgte ord →");
    bankBody.appendChild(addFromBankBtn);
    bankSec.appendChild(bankBody);
    modeContent.appendChild(bankSec);

    modeContent.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"6px"}},"Ord:"));
    const wordsWrap = el("div",{style:{marginBottom:"10px"}});
    modeContent.appendChild(wordsWrap);
    const wordRows = [];

    function addWordRow(){
      const row = el("div",{style:{display:"flex",gap:"6px",marginBottom:"6px",alignItems:"center"}});
      const wordIn = el("input",{type:"text",placeholder:"Ord",style:{flex:"1",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
      const meanIn = el("input",{type:"text",placeholder:"Oversettelse",style:{flex:"1",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
      const rm = el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:"16px",padding:"0 4px"},
        click:()=>{ const i=wordRows.indexOf(pair); if(i>-1){wordRows.splice(i,1);row.remove();} }
      },"×");
      row.appendChild(wordIn); row.appendChild(meanIn); row.appendChild(rm);
      wordsWrap.appendChild(row);
      const pair={wordIn,meanIn}; wordRows.push(pair);
    }
    addWordRow();
    modeContent.appendChild(el("button",{style:{fontSize:"12px",padding:"4px 12px",marginBottom:"12px",background:"none",border:"1px solid #ccc",borderRadius:"6px",cursor:"pointer"},
      click:addWordRow},"+ Legg til ord manuelt"));

    const errDiv = el("div",{style:{color:"#c0392b",fontSize:"13px",marginBottom:"8px",display:"none"}});
    modeContent.appendChild(errDiv);

    const btn = el("button",{class:"btn-primary",style:{width:"100%"},disabled:selectedIds.size===0,
      click: async ()=>{
        const topic=topicSel.value;
        if(!topic){errDiv.textContent="Velg et tema";errDiv.style.display="";return;}
        const words=wordRows.map(r=>({word:r.wordIn.value.trim(),meaning:transCb.checked?r.meanIn.value.trim():"",category:"substantiv",topic})).filter(w=>w.word);
        if(!words.length){errDiv.textContent="Legg til minst ett ord";errDiv.style.display="";return;}
        errDiv.style.display="none";
        btn.disabled=true; btn.textContent="Sender…";
        const r=await api("/api/teacher/students/words/bulk",{
          method:"POST",headers:{"Content-Type":"application/json"},
          body:JSON.stringify({student_ids:[...selectedIds],all_students:false,include_translation:transCb.checked,words})
        }).catch(()=>null);
        if(r?.ok){
          const d=await r.json();
          toast(`Ord sendt til ${d.student_count} elev${d.student_count===1?"":"er"} (${d.inserted} nye)`);
          renderOrdliste();
        } else {
          const d=await r?.json().catch(()=>({detail:"Ukjent feil"}));
          errDiv.textContent=d?.detail||"Noe gikk galt"; errDiv.style.display="";
          btn.disabled=selectedIds.size===0; btn.textContent="Send til ordbank";
        }
      }
    },"Send til ordbank");
    assignBtns.push(btn);
    modeContent.appendChild(btn);
  }

  // ── LESE- OG SKRIVEOPPGAVE MODE ───────────────────────────────────────
  function renderLeseSkrivMode(){ renderAssignForm(false); }

  // ── FULL PLAN MODE ────────────────────────────────────────────────────
  function renderFullPlanMode(){ renderAssignForm(true); }

  // ── SHARED ASSIGNMENT FORM (text + essay [+ optional word list]) ───────
  function renderAssignForm(includeWords){
    modeContent.innerHTML="";
    assignBtns.length=0;
    const items = {}; // {word_list, reading_text, essay_prompt} — populated by form

    // Word list section (full plan only)
    let wordListData = null;
    if(includeWords){
      const wSec = el("div",{style:{marginBottom:"14px",padding:"12px",background:"#f9fafb",borderRadius:"8px",border:"1px solid #eee"}});
      wSec.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"8px"}},"📚 Ordliste (valgfritt):"));

      const wTopicSel = el("select",{style:{marginBottom:"8px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px",width:"100%"}});
      wTopicSel.appendChild(el("option",{value:""},"Ingen ordliste"));
      VALID_TOPIC_LIST.forEach(t=>wTopicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      wSec.appendChild(wTopicSel);

      const wTransRow = el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"8px"}});
      const wTransCb = el("input",{type:"checkbox",id:"gi-fp-trans"}); wTransCb.checked=true;
      wTransRow.appendChild(wTransCb);
      wTransRow.appendChild(el("label",{for:"gi-fp-trans",style:{fontSize:"12px",cursor:"pointer"}},"Inkluder oversettelse"));
      wSec.appendChild(wTransRow);

      const wWordsWrap = el("div",{style:{marginBottom:"6px"}});
      wSec.appendChild(wWordsWrap);
      const wWordRows = [];
      function addWRow(){
        const row=el("div",{style:{display:"flex",gap:"6px",marginBottom:"4px",alignItems:"center"}});
        const wi=el("input",{type:"text",placeholder:"Ord",style:{flex:"1",padding:"4px 7px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"12px"}});
        const mi=el("input",{type:"text",placeholder:"Oversettelse",style:{flex:"1",padding:"4px 7px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"12px"}});
        const rm=el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:"14px",padding:"0 3px"},
          click:()=>{const i=wWordRows.indexOf(p);if(i>-1){wWordRows.splice(i,1);row.remove();}}
        },"×");
        row.appendChild(wi);row.appendChild(mi);row.appendChild(rm);wWordsWrap.appendChild(row);
        const p={wi,mi};wWordRows.push(p);
      }
      addWRow();
      wSec.appendChild(el("button",{style:{fontSize:"11px",padding:"3px 10px",background:"none",border:"1px solid #ccc",borderRadius:"5px",cursor:"pointer"},
        click:addWRow},"+ Legg til ord"));

      // Collect word list data before submit
      items._getWordList = () => {
        const topic = wTopicSel.value;
        if(!topic) return null;
        const words = wWordRows.map(r=>({word:r.wi.value.trim(),meaning:wTransCb.checked?r.mi.value.trim():"",category:"substantiv",topic})).filter(w=>w.word);
        if(!words.length) return null;
        return {item_type:"word_list",content:{topic,include_translation:wTransCb.checked,words}};
      };
      modeContent.appendChild(wSec);
    }

    // ── Text section (topic-filtered, multi-select, includes teacher bank) ──
    const txtSec = el("div",{style:{marginBottom:"14px",padding:"12px",background:"#f9fafb",borderRadius:"8px",border:"1px solid #eee"}});
    txtSec.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"8px"}},"📖 Lesetekster (valgfritt, kan velge flere):"));

    // Source tabs: bank | mine | custom
    let txtSource = "bank"; // "bank" | "mine" | "custom"
    const txtSrcWrap = el("div",{style:{display:"flex",gap:"6px",marginBottom:"8px",flexWrap:"wrap"}});
    function makeSrcBtn(key, label){
      return el("button",{"data-txtsrc":key,style:{fontSize:"11px",padding:"3px 10px",border:"1px solid #ccc",borderRadius:"6px",cursor:"pointer",
        background:key===txtSource?"#1a6b4a":"#f0f0f0",color:key===txtSource?"#fff":"#333"},
        click:()=>{ txtSource=key; renderTxtSourceBtns(); renderTxtPicker(); }
      },label);
    }
    txtSrcWrap.appendChild(makeSrcBtn("bank","Fra tekstbank"));
    txtSrcWrap.appendChild(makeSrcBtn("mine","Egne tekster"));
    txtSrcWrap.appendChild(makeSrcBtn("custom","Skriv ny tekst"));
    txtSec.appendChild(txtSrcWrap);

    function renderTxtSourceBtns(){
      txtSrcWrap.querySelectorAll("[data-txtsrc]").forEach(b=>{
        const active=b.dataset.txtsrc===txtSource;
        b.style.background=active?"#1a6b4a":"#f0f0f0";
        b.style.color=active?"#fff":"#333";
      });
    }

    const txtPickerWrap = el("div",{});
    txtSec.appendChild(txtPickerWrap);

    // Selected texts: array of {item_type, content}
    const selectedTexts = [];
    const selectedTextsDisplay = el("div",{style:{marginTop:"8px"}});
    txtSec.appendChild(selectedTextsDisplay);

    function updateSelectedTextsDisplay(){
      selectedTextsDisplay.innerHTML="";
      if(!selectedTexts.length) return;
      selectedTexts.forEach((t,i)=>{
        const row=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",background:"#e8f5ee",borderRadius:"6px",padding:"4px 8px",marginBottom:"4px",fontSize:"12px"}});
        row.appendChild(el("span",{style:{flex:"1"}},$esc(t.content.title||"Tekst "+(i+1))));
        row.appendChild(el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:"14px",padding:"0 2px"},
          click:()=>{ selectedTexts.splice(i,1); updateSelectedTextsDisplay(); }
        },"×"));
        selectedTextsDisplay.appendChild(row);
      });
    }

    let allLesingTexts = null;
    let teacherBankTextsCache = null;

    async function renderTxtPicker(){
      txtPickerWrap.innerHTML="";

      if(txtSource==="bank"){
        // Topic filter + text list from app text bank
        if(!allLesingTexts) allLesingTexts = await loadLesingTexts().catch(()=>null);
        const texts = allLesingTexts || [];
        const topicFilter = el("select",{style:{width:"100%",marginBottom:"8px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
        const topicsInBank = [...new Set(texts.map(t=>t.topic||"").filter(Boolean))].sort();
        topicsInBank.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
        txtPickerWrap.appendChild(topicFilter);

        const listWrap = el("div",{style:{maxHeight:"200px",overflowY:"auto",border:"1px solid #eee",borderRadius:"6px"}});
        txtPickerWrap.appendChild(listWrap);

        function renderTextList(){
          listWrap.innerHTML="";
          const topic = topicFilter.value;
          const filtered = topic ? texts.filter(t=>(t.topic||"")=== topic) : texts;
          if(!filtered.length){
            listWrap.appendChild(el("div",{style:{padding:"10px",color:"#888",fontSize:"13px"}},"Ingen tekster for dette temaet."));
            return;
          }
          filtered.forEach(t=>{
            const alreadyAdded = selectedTexts.some(st=>st.content.text_id===t.id);
            const row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",borderBottom:"1px solid #f0f0f0",cursor:"pointer",background:alreadyAdded?"#e8f5ee":"#fff"},
              click:()=>{
                if(alreadyAdded){ selectedTexts.splice(selectedTexts.findIndex(st=>st.content.text_id===t.id),1); }
                else { selectedTexts.push({item_type:"reading_text",content:{source:"bank",text_id:t.id,title:t.title||"",topic:t.topic||"",body:t.body||t.content||t.text||""}}); }
                updateSelectedTextsDisplay(); renderTextList();
              }
            });
            row.appendChild(el("span",{style:{fontSize:"18px"}},$esc(alreadyAdded?"✓":"")));
            const info=el("div",{style:{flex:"1"}});
            info.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"600"}},$esc(t.title||t.id)));
            if(t.topic) info.appendChild(el("div",{style:{fontSize:"11px",color:"#888"}},$esc(t.topic)));
            row.appendChild(info);
            listWrap.appendChild(row);
          });
        }
        topicFilter.addEventListener("change",renderTextList);
        renderTextList();

      } else if(txtSource==="mine"){
        // Teacher's own bank texts
        if(!teacherBankTextsCache){
          const r=await api("/api/teacher/bank/texts").catch(()=>null);
          teacherBankTextsCache = r?.ok ? await r.json() : [];
        }
        const myTexts = teacherBankTextsCache;
        if(!myTexts.length){
          const msg=el("div",{style:{fontSize:"13px",color:"#888",padding:"8px 0"}});
          msg.innerHTML='Ingen egne tekster ennå. <a href="#" style="color:#1a6b4a">Gå til tekstbank</a> for å lagre tekster.';
          msg.querySelector("a").addEventListener("click",(e)=>{e.preventDefault();teacherState.view="bank-texts";renderContent();});
          txtPickerWrap.appendChild(msg);
          return;
        }
        const topicFilter=el("select",{style:{width:"100%",marginBottom:"8px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
        const topics=[...new Set(myTexts.map(t=>t.topic||"").filter(Boolean))].sort();
        topics.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
        txtPickerWrap.appendChild(topicFilter);

        const listWrap=el("div",{style:{maxHeight:"180px",overflowY:"auto",border:"1px solid #eee",borderRadius:"6px"}});
        txtPickerWrap.appendChild(listWrap);

        function renderMineList(){
          listWrap.innerHTML="";
          const topic=topicFilter.value;
          const filtered=topic?myTexts.filter(t=>(t.topic||"")===topic):myTexts;
          filtered.forEach(t=>{
            const alreadyAdded=selectedTexts.some(st=>st.content.bank_text_id===t.id);
            const row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",borderBottom:"1px solid #f0f0f0",cursor:"pointer",background:alreadyAdded?"#e8f5ee":"#fff"},
              click:()=>{
                if(alreadyAdded){ selectedTexts.splice(selectedTexts.findIndex(st=>st.content.bank_text_id===t.id),1); }
                else { selectedTexts.push({item_type:"reading_text",content:{source:"teacher_bank",bank_text_id:t.id,title:t.title,topic:t.topic||"",body:t.body}}); }
                updateSelectedTextsDisplay(); renderMineList();
              }
            });
            row.appendChild(el("span",{style:{fontSize:"18px"}},$esc(alreadyAdded?"✓":"")));
            const info=el("div",{style:{flex:"1"}});
            info.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"600"}},$esc(t.title)));
            if(t.topic) info.appendChild(el("div",{style:{fontSize:"11px",color:"#888"}},$esc(t.topic)));
            row.appendChild(info);
            listWrap.appendChild(row);
          });
          if(!filtered.length) listWrap.appendChild(el("div",{style:{padding:"10px",color:"#888",fontSize:"13px"}},"Ingen tekster for dette temaet."));
        }
        topicFilter.addEventListener("change",renderMineList);
        renderMineList();

      } else {
        // Custom text entry with option to save to bank
        const titleIn=el("input",{type:"text",placeholder:"Tittel (påkrevd)",style:{width:"100%",padding:"5px 8px",marginBottom:"6px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px",boxSizing:"border-box"}});
        const topicSel=el("select",{style:{width:"100%",marginBottom:"6px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        topicSel.appendChild(el("option",{value:""},"Velg tema (valgfritt)"));
        VALID_TOPIC_LIST.forEach(t=>topicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
        const bodyIn=el("textarea",{placeholder:"Teksten…",style:{width:"100%",minHeight:"80px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"12px",boxSizing:"border-box",resize:"vertical",marginBottom:"6px"}});
        const saveBankRow=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}});
        const saveBankCb=el("input",{type:"checkbox",id:"txt-save-bank"}); saveBankCb.checked=true;
        saveBankRow.appendChild(saveBankCb);
        saveBankRow.appendChild(el("label",{for:"txt-save-bank",style:{fontSize:"12px",cursor:"pointer"}},"Lagre i min tekstbank for gjenbruk"));
        const addTxtBtn=el("button",{style:{fontSize:"12px",padding:"5px 12px",background:"#1a6b4a",color:"#fff",border:"none",borderRadius:"6px",cursor:"pointer"},
          click: async ()=>{
            const title=(titleIn.value||"").trim();
            const body=(bodyIn.value||"").trim();
            if(!title||!body){ toast("Fyll inn tittel og tekst"); return; }
            const item={item_type:"reading_text",content:{source:"custom",title,topic:topicSel.value,body}};
            // Optionally save to bank
            if(saveBankCb.checked){
              const r=await api("/api/teacher/bank/texts",{method:"POST",headers:{"Content-Type":"application/json"},
                body:JSON.stringify({title,topic:topicSel.value,body})}).catch(()=>null);
              if(r?.ok){ teacherBankTextsCache=null; teacherState.bankTexts=null; }
            }
            selectedTexts.push(item);
            updateSelectedTextsDisplay();
            titleIn.value=""; topicSel.value=""; bodyIn.value="";
            toast("Tekst lagt til i oppgaven");
          }
        },"Legg til tekst →");
        txtPickerWrap.appendChild(titleIn);
        txtPickerWrap.appendChild(topicSel);
        txtPickerWrap.appendChild(bodyIn);
        txtPickerWrap.appendChild(saveBankRow);
        txtPickerWrap.appendChild(addTxtBtn);
      }
    }

    items._getTexts = () => [...selectedTexts];
    renderTxtPicker();
    modeContent.appendChild(txtSec);

    // ── Essay section (bank + teacher bank + custom with save) ────────────
    const essaySec = el("div",{style:{marginBottom:"14px",padding:"12px",background:"#f9fafb",borderRadius:"8px",border:"1px solid #eee"}});
    essaySec.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"8px"}},"✍️ Skriveoppgave (valgfritt):"));

    let essaySource = "bank"; // "bank" | "mine" | "custom"
    const essaySrcWrap = el("div",{style:{display:"flex",gap:"6px",marginBottom:"8px",flexWrap:"wrap"}});
    function makeEssaySrcBtn(key, label){
      return el("button",{"data-essaysrc":key,style:{fontSize:"11px",padding:"3px 10px",border:"1px solid #ccc",borderRadius:"6px",cursor:"pointer",
        background:key===essaySource?"#1a6b4a":"#f0f0f0",color:key===essaySource?"#fff":"#333"},
        click:()=>{ essaySource=key; renderEssaySrcBtns(); renderEssayPicker(); }
      },label);
    }
    essaySrcWrap.appendChild(makeEssaySrcBtn("bank","Fra oppgavebank"));
    essaySrcWrap.appendChild(makeEssaySrcBtn("mine","Egne oppgaver"));
    essaySrcWrap.appendChild(makeEssaySrcBtn("custom","Skriv ny oppgave"));
    essaySec.appendChild(essaySrcWrap);

    function renderEssaySrcBtns(){
      essaySrcWrap.querySelectorAll("[data-essaysrc]").forEach(b=>{
        const active=b.dataset.essaysrc===essaySource;
        b.style.background=active?"#1a6b4a":"#f0f0f0";
        b.style.color=active?"#fff":"#333";
      });
    }

    const essayPickerWrap = el("div",{});
    essaySec.appendChild(essayPickerWrap);

    let selectedEssay = null; // single essay item
    const essaySelectedDisplay = el("div",{style:{marginTop:"8px"}});
    essaySec.appendChild(essaySelectedDisplay);

    function updateEssayDisplay(){
      essaySelectedDisplay.innerHTML="";
      if(!selectedEssay) return;
      const row=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",background:"#e8f5ee",borderRadius:"6px",padding:"4px 8px",fontSize:"12px"}});
      row.appendChild(el("span",{style:{flex:"1"}},$esc(selectedEssay.content.prompt_title||selectedEssay.content.prompt_text.substring(0,60)+"…")));
      row.appendChild(el("button",{style:{background:"none",border:"none",cursor:"pointer",color:"#c0392b",fontSize:"14px"},
        click:()=>{ selectedEssay=null; updateEssayDisplay(); }
      },"×"));
      essaySelectedDisplay.appendChild(row);
    }

    let teacherBankPromptsCache = null;

    function renderEssayPicker(){
      essayPickerWrap.innerHTML="";

      if(essaySource==="bank"){
        const topicSel=el("select",{style:{width:"100%",marginBottom:"6px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        topicSel.appendChild(el("option",{value:""},"Velg tema…"));
        Object.entries(TOPICS).forEach(([key,meta])=>topicSel.appendChild(el("option",{value:key},$esc(meta.name))));
        const promptSel=el("select",{style:{width:"100%",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        promptSel.appendChild(el("option",{value:""},"Velg oppgave…"));
        topicSel.addEventListener("change",()=>{
          promptSel.innerHTML="";
          promptSel.appendChild(el("option",{value:""},"Velg oppgave…"));
          const t=topicSel.value;
          if(t&&PROMPTS[t]) PROMPTS[t].forEach((p,i)=>promptSel.appendChild(el("option",{value:String(i)},p.title||p.text.substring(0,60)+"…")));
        });
        promptSel.addEventListener("change",()=>{
          const topicKey=topicSel.value;
          const idx=parseInt(promptSel.value);
          if(!topicKey||isNaN(idx)||!PROMPTS[topicKey]?.[idx]) return;
          const p=PROMPTS[topicKey][idx];
          selectedEssay={item_type:"essay_prompt",content:{source:"bank",topic:topicKey,prompt_text:p.text,prompt_title:p.title}};
          updateEssayDisplay();
        });
        essayPickerWrap.appendChild(topicSel);
        essayPickerWrap.appendChild(promptSel);

      } else if(essaySource==="mine"){
        // Load teacher bank prompts
        const loadAndRender = async () => {
          if(!teacherBankPromptsCache){
            const r=await api("/api/teacher/bank/prompts").catch(()=>null);
            teacherBankPromptsCache=r?.ok?await r.json():[];
          }
          essayPickerWrap.innerHTML="";
          if(!teacherBankPromptsCache.length){
            const msg=el("div",{style:{fontSize:"13px",color:"#888",padding:"8px 0"}});
            msg.innerHTML='Ingen egne oppgaver ennå. <a href="#" style="color:#1a6b4a">Gå til oppgavebank</a> for å lagre oppgaver.';
            msg.querySelector("a").addEventListener("click",(e)=>{e.preventDefault();teacherState.view="bank-prompts";renderContent();});
            essayPickerWrap.appendChild(msg);
            return;
          }
          const topicFilter=el("select",{style:{width:"100%",marginBottom:"6px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
          topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
          const topics=[...new Set(teacherBankPromptsCache.map(p=>p.topic||"").filter(Boolean))].sort();
          topics.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
          essayPickerWrap.appendChild(topicFilter);

          const listWrap=el("div",{style:{maxHeight:"160px",overflowY:"auto",border:"1px solid #eee",borderRadius:"6px"}});
          essayPickerWrap.appendChild(listWrap);

          function renderMyPrompts(){
            listWrap.innerHTML="";
            const topic=topicFilter.value;
            const filtered=topic?teacherBankPromptsCache.filter(p=>(p.topic||"")===topic):teacherBankPromptsCache;
            filtered.forEach(p=>{
              const active=selectedEssay?.content?.bank_prompt_id===p.id;
              const row=el("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",borderBottom:"1px solid #f0f0f0",cursor:"pointer",background:active?"#e8f5ee":"#fff"},
                click:()=>{
                  selectedEssay={item_type:"essay_prompt",content:{source:"teacher_bank",bank_prompt_id:p.id,topic:p.topic||"",prompt_text:p.prompt_text,prompt_title:p.title}};
                  updateEssayDisplay(); renderMyPrompts();
                }
              });
              row.appendChild(el("span",{style:{fontSize:"16px"}},$esc(active?"✓":"")));
              const info=el("div",{style:{flex:"1"}});
              info.appendChild(el("div",{style:{fontSize:"13px",fontWeight:"600"}},$esc(p.title)));
              row.appendChild(info);
              listWrap.appendChild(row);
            });
            if(!filtered.length) listWrap.appendChild(el("div",{style:{padding:"10px",color:"#888",fontSize:"13px"}},"Ingen oppgaver for dette temaet."));
          }
          topicFilter.addEventListener("change",renderMyPrompts);
          renderMyPrompts();
        };
        loadAndRender();

      } else {
        // Custom prompt
        const titleIn=el("input",{type:"text",placeholder:"Tittel / navn på oppgaven",style:{width:"100%",padding:"5px 8px",marginBottom:"6px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px",boxSizing:"border-box"}});
        const topicSel=el("select",{style:{width:"100%",marginBottom:"6px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"13px"}});
        topicSel.appendChild(el("option",{value:""},"Velg tema (valgfritt)"));
        VALID_TOPIC_LIST.forEach(t=>topicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
        const promptIn=el("textarea",{placeholder:"Skriv inn oppgaveteksten her…",style:{width:"100%",minHeight:"80px",padding:"5px 8px",borderRadius:"6px",border:"1.5px solid #dde",fontSize:"12px",boxSizing:"border-box",resize:"vertical",marginBottom:"6px"}});
        const saveBankRow=el("div",{style:{display:"flex",alignItems:"center",gap:"6px",marginBottom:"6px"}});
        const saveBankCb=el("input",{type:"checkbox",id:"essay-save-bank"}); saveBankCb.checked=true;
        saveBankRow.appendChild(saveBankCb);
        saveBankRow.appendChild(el("label",{for:"essay-save-bank",style:{fontSize:"12px",cursor:"pointer"}},"Lagre i min oppgavebank for gjenbruk"));
        const addEssayBtn=el("button",{style:{fontSize:"12px",padding:"5px 12px",background:"#1a6b4a",color:"#fff",border:"none",borderRadius:"6px",cursor:"pointer"},
          click: async ()=>{
            const title=(titleIn.value||"").trim();
            const prompt_text=(promptIn.value||"").trim();
            if(!title||!prompt_text){ toast("Fyll inn tittel og oppgavetekst"); return; }
            if(saveBankCb.checked){
              const r=await api("/api/teacher/bank/prompts",{method:"POST",headers:{"Content-Type":"application/json"},
                body:JSON.stringify({title,topic:topicSel.value,prompt_text})}).catch(()=>null);
              if(r?.ok){ teacherBankPromptsCache=null; teacherState.bankPrompts=null; }
            }
            selectedEssay={item_type:"essay_prompt",content:{source:"custom",topic:topicSel.value,prompt_text,prompt_title:title}};
            updateEssayDisplay();
            titleIn.value=""; topicSel.value=""; promptIn.value="";
            toast("Oppgave lagt til");
          }
        },"Bruk denne oppgaven →");
        essayPickerWrap.appendChild(titleIn);
        essayPickerWrap.appendChild(topicSel);
        essayPickerWrap.appendChild(promptIn);
        essayPickerWrap.appendChild(saveBankRow);
        essayPickerWrap.appendChild(addEssayBtn);
      }
    }

    items._getEssay = () => selectedEssay;
    renderEssayPicker();
    modeContent.appendChild(essaySec);

    const errDiv2 = el("div",{style:{color:"#c0392b",fontSize:"13px",marginBottom:"8px",display:"none"}});
    modeContent.appendChild(errDiv2);

    const assignBtn2 = el("button",{class:"btn-primary",style:{width:"100%"},disabled:selectedIds.size===0,
      click: async ()=>{
        const itemsArr = [];
        if(includeWords && items._getWordList) { const w=items._getWordList(); if(w) itemsArr.push(w); }
        const texts=items._getTexts(); texts.forEach(t=>itemsArr.push(t));
        const e=items._getEssay(); if(e) itemsArr.push(e);

        if(!itemsArr.length){errDiv2.textContent="Legg til minst én oppgavetype";errDiv2.style.display="";return;}

        errDiv2.style.display="none";
        assignBtn2.disabled=true; assignBtn2.textContent="Sender…";

        const body={student_ids:[...selectedIds],all_students:false,items:itemsArr};
        const r=await api("/api/teacher/assignments",{
          method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)
        }).catch(()=>null);

        if(r?.ok){
          const d=await r.json();
          toast(`Oppgave sendt til ${d.student_count} elev${d.student_count===1?"":"er"}`);
          renderMode();
        } else if(r?.status===409){
          const d=await r.json().catch(()=>({detail:"Duplikat"}));
          errDiv2.textContent=d.detail||"Denne oppgaven er allerede tildelt disse elevene";
          errDiv2.style.display="";
          assignBtn2.disabled=selectedIds.size===0; assignBtn2.textContent="Gi oppgave";
        } else {
          const d=await r?.json().catch(()=>({detail:"Ukjent feil"}));
          errDiv2.textContent=d?.detail||"Noe gikk galt"; errDiv2.style.display="";
          assignBtn2.disabled=selectedIds.size===0; assignBtn2.textContent="Gi oppgave";
        }
      }
    },"Gi oppgave");
    assignBtns.push(assignBtn2);
    modeContent.appendChild(assignBtn2);
  }

  function renderMode(){
    if(mode==="ordliste") renderOrdliste();
    else if(mode==="lese-skriv") renderLeseSkrivMode();
    else renderFullPlanMode();
  }
  renderMode();
  return wrap;
}

// ── TEACHER: Student assignments progress view ─────────────────────────────

function buildLaererAssignments(){
  const frag = document.createDocumentFragment();
  const s = teacherState.selectedStudent;
  frag.appendChild(el("button",{class:"btn-secondary",style:{marginBottom:"16px"},
    click:()=>laererSetView("progress")},"← Tilbake"));
  frag.appendChild(el("h2",{style:{marginBottom:"16px"}},`Oppgaver: ${$esc(s?.name||"")}`));
  const wrap = el("div",{});
  frag.appendChild(wrap);

  async function load(){
    if(!teacherState.studentAssignments){
      const r = await api(`/api/teacher/students/${encodeURIComponent(s.id)}/assignments`).catch(()=>null);
      if(r?.ok) teacherState.studentAssignments=await r.json();
      else teacherState.studentAssignments=[];
    }
    wrap.innerHTML="";
    const asgns = teacherState.studentAssignments;
    if(!asgns.length){
      wrap.appendChild(el("p",{style:{color:"#888"}},"Ingen oppgaver tildelt ennå."));
      return;
    }
    asgns.forEach(asgn=>{
      const card = el("div",{class:"card",style:{marginBottom:"16px"}});
      const hdr = el("div",{style:{display:"flex",alignItems:"baseline",gap:"10px",marginBottom:"10px",flexWrap:"wrap"}});
      hdr.appendChild(el("span",{style:{fontWeight:"700",fontSize:"15px"}},$esc(asgn.label||"Oppgave")));
      hdr.appendChild(el("span",{style:{fontSize:"12px",color:"#888"}},new Date(asgn.assigned_at).toLocaleDateString("nb-NO")));
      const done = asgn.items.filter(i=>i.done).length;
      const total = asgn.items.length;
      const pct = total ? Math.round(done/total*100) : 0;
      const badge = el("span",{style:{
        marginLeft:"auto",background:pct===100?"#d4edda":"#fff3cd",
        color:pct===100?"#155724":"#856404",
        borderRadius:"20px",padding:"2px 10px",fontSize:"12px",fontWeight:"700"
      }},`${done}/${total} gjort`);
      hdr.appendChild(badge);
      card.appendChild(hdr);
      asgn.items.forEach(item=>{
        const row = el("div",{style:{
          display:"flex",alignItems:"center",gap:"10px",borderTop:"1px solid #eee",
          paddingTop:"8px",marginTop:"4px",opacity:item.done?"0.5":"1"
        }});
        const typeLabel = item.item_type==="word_list"?"📚 Ordliste"
          :item.item_type==="reading_text"?"📖 Lesetekst":"✍️ Skriveoppgave";
        row.appendChild(el("span",{style:{fontSize:"13px",color:"#1a6b4a",fontWeight:"600",minWidth:"100px"}},typeLabel));
        const title = item.content.title||item.content.prompt_title
          ||(item.content.words?`${(item.content.words||[]).length} ord`:"");
        row.appendChild(el("span",{style:{fontSize:"13px",flex:"1",color:"#333"}},$esc(title)));
        row.appendChild(el("span",{style:{
          fontSize:"12px",fontWeight:"700",
          color:item.done?"#155724":"#888"
        }},item.done?"✓ Gjort":"Ikke gjort"));
        card.appendChild(row);
      });
      wrap.appendChild(card);
    });
  }
  load();
  return frag;
}

// ── TEACHER: Text bank view ────────────────────────────────────────────────

function buildLaererBankTexts(){

    }
    panel.appendChild(el("div",{style:{fontWeight:"600",fontSize:"13px",marginBottom:"6px"}},"Elever:"));
    const allCb=el("input",{type:"checkbox"});
    const allLbl=el("label",{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",marginBottom:"6px",cursor:"pointer"}});
    allLbl.appendChild(allCb); allLbl.appendChild(document.createTextNode("Alle elever"));
    panel.appendChild(allLbl);
    const studentList=el("div",{style:{maxHeight:"180px",overflowY:"auto",marginBottom:"10px"}});
    const studentCbs=[];
    (teacherState.students||[]).forEach(s=>{
      const cb=el("input",{type:"checkbox"});
      const lbl=el("label",{style:{display:"flex",alignItems:"center",gap:"6px",fontSize:"13px",padding:"2px 0",cursor:"pointer"}});
      lbl.appendChild(cb); lbl.appendChild(document.createTextNode(s.name));
      studentList.appendChild(lbl);
      studentCbs.push({student:s,cb});
    });
    if(!studentCbs.length) studentList.appendChild(el("p",{style:{color:"#888",fontSize:"12px"}},"Ingen elever i klassen."));
    allCb.addEventListener("change",()=>studentCbs.forEach(({cb})=>{cb.checked=allCb.checked;}));
    panel.appendChild(studentList);
    const labelIn=el("input",{type:"text",placeholder:"Merkelapp (valgfritt)",
      style:{width:"100%",padding:"6px 8px",marginBottom:"10px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"13px",boxSizing:"border-box"}});
    panel.appendChild(labelIn);
    const assignBtn=el("button",{class:"btn-primary",style:{width:"100%"},
      click:async ()=>{
        if(!selectedItems.length){toast("Velg minst én tekst");return;}
        const useAll=allCb.checked;
        const studentIds=studentCbs.filter(({cb})=>cb.checked).map(({student})=>student.id);
        if(!useAll&&!studentIds.length){toast("Velg minst én elev");return;}
        assignBtn.disabled=true; assignBtn.textContent="Sender…";
        const r=await api("/api/teacher/assignments",{method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify({label:labelIn.value.trim()||null,student_ids:useAll?[]:studentIds,
            all_students:useAll,items:selectedItems.map(({item_type,content})=>({item_type,content}))})
        }).catch(()=>null);
        assignBtn.disabled=false; assignBtn.textContent="Gi oppgave";
        if(r?.ok){
          toast("Oppgave gitt!");
          selectedItems.length=0;
          renderAssignPanel();
          renderBankTab();
        } else {
          const d=await r?.json().catch(()=>({detail:"Ukjent feil"}));
          toast(d?.detail||"Kunne ikke gi oppgave");
        }
      }
    },"Gi oppgave");
    panel.appendChild(assignBtn);
    rightCol.appendChild(panel);
  }

  // Load students if not cached
  (async ()=>{
    if(teacherState.students===null){
      const r=await api("/api/teacher/students").catch(()=>null);
      teacherState.students=r?.ok?await r.json():[];
    }
    renderAssignPanel();
  })();

  // ── Tab setup ──
  let bankTab="system";
  const tabBar=el("div",{style:{display:"flex",gap:"0",marginBottom:"20px",borderRadius:"10px",overflow:"hidden",border:"1.5px solid #dde"}});
  const tabContent=el("div",{});
  leftCol.appendChild(tabBar);
  leftCol.appendChild(tabContent);

  function tabBtn(key,label){
    return el("button",{"data-btab":key,style:{
      flex:"1",border:"none",padding:"9px 6px",fontSize:"13px",cursor:"pointer",
      background:key===bankTab?"#1a6b4a":"#f8f8f8",
      color:key===bankTab?"#fff":"#444",
      fontWeight:key===bankTab?"700":"400",
    },click:()=>{ bankTab=key; renderTabBtns(); renderBankTab(); }},label);
  }
  function renderTabBtns(){
    tabBar.querySelectorAll("[data-btab]").forEach(b=>{
      const a=b.dataset.btab===bankTab;
      b.style.background=a?"#1a6b4a":"#f8f8f8";
      b.style.color=a?"#fff":"#444";
      b.style.fontWeight=a?"700":"400";
    });
  }
  tabBar.appendChild(tabBtn("system","📚 Systemtekster"));
  tabBar.appendChild(tabBtn("mine","Mine tekster"));
  tabBar.appendChild(tabBtn("ny","+ Ny tekst"));

  function makeTextItem(txt,isCustom){
    return isCustom
      ? {item_type:"reading_text",content:{source:"teacher_bank",bank_text_id:txt.id,title:txt.title,topic:txt.topic||"",body:txt.body},_key:`ct-${txt.id}`,_title:txt.title}
      : {item_type:"reading_text",content:{source:"bank",text_id:txt.id,title:txt.title||txt.id,topic:txt.topic||"",body:txt.text||txt.body||txt.content||""},_key:`st-${txt.id||txt.title}`,_title:txt.title||txt.id};
  }

  function renderTextCard(txt,isCustom){
    const item=makeTextItem(txt,isCustom);
    const card=el("div",{class:"card",style:{marginBottom:"10px",padding:"0",overflow:"hidden"}});
    let expanded=false;
    const bodyDiv=el("div",{style:{display:"none",padding:"0 14px 14px",borderTop:"1px solid #eee",fontSize:"13px",color:"#333",lineHeight:"1.7",whiteSpace:"pre-wrap"}});
    bodyDiv.textContent=txt.body||txt.content||txt.text||"";
    const chevron=el("span",{style:{fontSize:"12px",color:"#888",marginRight:"2px",minWidth:"12px"}},"▶");
    const cb=el("input",{type:"checkbox",style:{flexShrink:"0"}});
    cb.checked=selectedItems.some(i=>i._key===item._key);
    cb.addEventListener("change",e=>{
      e.stopPropagation();
      if(cb.checked){ if(!selectedItems.some(i=>i._key===item._key)) selectedItems.push(item); }
      else { const idx=selectedItems.findIndex(i=>i._key===item._key); if(idx!==-1) selectedItems.splice(idx,1); }
      renderAssignPanel();
    });
    const hdr=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",cursor:"pointer",userSelect:"none"},
      click:e=>{
        if(e.target===cb) return;
        expanded=!expanded;
        chevron.textContent=expanded?"▼":"▶";
        bodyDiv.style.display=expanded?"":"none";
      }
    });
    const info=el("div",{style:{flex:"1"}});
    info.appendChild(el("div",{style:{fontWeight:"700",fontSize:"14px"}},$esc(txt.title||txt.id)));
    const meta=[];
    if(txt.topic) meta.push(txt.topic);
    if(txt.level) meta.push(txt.level);
    if(meta.length) info.appendChild(el("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},$esc(meta.join(" · "))));
    hdr.appendChild(cb); hdr.appendChild(chevron); hdr.appendChild(info);
    if(isCustom){
      const delBtn=el("button",{class:"btn-danger",style:{fontSize:"12px",padding:"4px 10px",flexShrink:"0"},
        click:async e=>{
          e.stopPropagation();
          if(!confirm(`Slette "${txt.title}"?`)) return;
          const r=await api(`/api/teacher/bank/texts/${encodeURIComponent(txt.id)}`,{method:"DELETE"}).catch(()=>null);
          if(r?.ok){teacherState.bankTexts=null;renderBankTab();}
          else toast("Kunne ikke slette teksten");
        }
      },"Slett");
      hdr.appendChild(delBtn);
    }
    card.appendChild(hdr);
    card.appendChild(bodyDiv);
    return card;
  }

  async function renderBankTab(){
    tabContent.innerHTML="";
    renderTabBtns();

    if(bankTab==="system"){
      const texts=await loadLesingTexts().catch(()=>null)||[];
      const topicFilter=el("select",{style:{width:"100%",marginBottom:"12px",padding:"7px 10px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
      const topics=[...new Set(texts.map(t=>t.topic||"").filter(Boolean))].sort();
      topics.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      tabContent.appendChild(topicFilter);
      const listWrap=el("div",{});
      tabContent.appendChild(listWrap);
      function renderSystemList(){
        listWrap.innerHTML="";
        const topic=topicFilter.value;
        const filtered=topic?texts.filter(t=>(t.topic||"")===topic):texts;
        if(!filtered.length){listWrap.appendChild(el("p",{style:{color:"#888"}},"Ingen tekster."));return;}
        filtered.forEach(t=>listWrap.appendChild(renderTextCard(t,false)));
      }
      topicFilter.addEventListener("change",renderSystemList);
      renderSystemList();

    } else if(bankTab==="mine"){
      if(!teacherState.bankTexts){
        const r=await api("/api/teacher/bank/texts").catch(()=>null);
        teacherState.bankTexts=r?.ok?await r.json():[];
      }
      if(!teacherState.bankTexts.length){
        tabContent.appendChild(el("p",{style:{color:"#888"}},"Ingen egne tekster ennå. Bruk «+ Ny tekst» for å legge til."));
        return;
      }
      const topicFilter=el("select",{style:{width:"100%",marginBottom:"12px",padding:"7px 10px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
      const topics=[...new Set(teacherState.bankTexts.map(t=>t.topic||"").filter(Boolean))].sort();
      topics.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      tabContent.appendChild(topicFilter);
      const listWrap=el("div",{});
      tabContent.appendChild(listWrap);
      function renderMineList(){
        listWrap.innerHTML="";
        const topic=topicFilter.value;
        const filtered=topic?teacherState.bankTexts.filter(t=>(t.topic||"")===topic):teacherState.bankTexts;
        if(!filtered.length){listWrap.appendChild(el("p",{style:{color:"#888"}},"Ingen tekster for dette temaet."));return;}
        filtered.forEach(t=>listWrap.appendChild(renderTextCard(t,true)));
      }
      topicFilter.addEventListener("change",renderMineList);
      renderMineList();

    } else {
      const addCard=el("div",{class:"card",style:{padding:"16px"}});
      const titleIn=el("input",{type:"text",placeholder:"Tittel",style:{width:"100%",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      const topicSel=el("select",{style:{width:"100%",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicSel.appendChild(el("option",{value:""},"Velg tema (valgfritt)"));
      VALID_TOPIC_LIST.forEach(t=>topicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      const bodyIn=el("textarea",{placeholder:"Teksten…",style:{width:"100%",minHeight:"150px",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"13px",boxSizing:"border-box",resize:"vertical"}});
      const addErr=el("div",{style:{color:"#c0392b",fontSize:"13px",marginBottom:"6px",display:"none"}});
      const addBtn=el("button",{class:"btn-primary",style:{width:"100%"},
        click:async ()=>{
          const title=(titleIn.value||"").trim();
          const body=(bodyIn.value||"").trim();
          if(!title){addErr.textContent="Tittel er påkrevd";addErr.style.display="";return;}
          if(!body){addErr.textContent="Tekst er påkrevd";addErr.style.display="";return;}
          addErr.style.display="none";
          addBtn.disabled=true; addBtn.textContent="Lagrer…";
          const r=await api("/api/teacher/bank/texts",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({title,topic:topicSel.value,body})}).catch(()=>null);
          if(r?.ok){
            teacherState.bankTexts=null;
            titleIn.value=""; topicSel.value=""; bodyIn.value="";
            addBtn.disabled=false; addBtn.textContent="Lagre tekst";
            bankTab="mine"; renderBankTab();
          } else {
            const d=await r?.json().catch(()=>({detail:"Ukjent feil"}));
            addErr.textContent=d?.detail||"Kunne ikke lagre";addErr.style.display="";
            addBtn.disabled=false; addBtn.textContent="Lagre tekst";
          }
        }
      },"Lagre tekst");
      addCard.appendChild(titleIn); addCard.appendChild(topicSel); addCard.appendChild(bodyIn);
      addCard.appendChild(addErr); addCard.appendChild(addBtn);
      tabContent.appendChild(addCard);
    }
  }

  renderAssignPanel();
  renderBankTab();
  return frag;
}

    const bodyDiv=el("div",{style:{display:"none",padding:"0 14px 14px",borderTop:"1px solid #eee",fontSize:"13px",color:"#333",lineHeight:"1.7",whiteSpace:"pre-wrap"}});
    bodyDiv.textContent=isCustom?(p.prompt_text||""):(p.text||"");
    const chevron=el("span",{style:{fontSize:"12px",color:"#888",marginRight:"2px",minWidth:"12px"}},"▶");
    const cb=el("input",{type:"checkbox",style:{flexShrink:"0"}});
    cb.checked=selectedItems.some(i=>i._key===item._key);
    cb.addEventListener("change",e=>{
      e.stopPropagation();
      if(cb.checked){ if(!selectedItems.some(i=>i._key===item._key)) selectedItems.push(item); }
      else { const idx=selectedItems.findIndex(i=>i._key===item._key); if(idx!==-1) selectedItems.splice(idx,1); }
      renderAssignPanel();
    });
    const hdr=el("div",{style:{display:"flex",alignItems:"center",gap:"10px",padding:"12px 14px",cursor:"pointer",userSelect:"none"},
      click:e=>{
        if(e.target===cb) return;
        expanded=!expanded;
        chevron.textContent=expanded?"▼":"▶";
        bodyDiv.style.display=expanded?"":"none";
      }
    });
    const info=el("div",{style:{flex:"1"}});
    info.appendChild(el("div",{style:{fontWeight:"700",fontSize:"14px"}},$esc(p.title)));
    const topicLabel=isCustom?(p.topic||""):(PROMPT_TOPIC_LABELS[topicKey]||topicKey);
    if(topicLabel) info.appendChild(el("div",{style:{fontSize:"12px",color:"#888",marginTop:"2px"}},$esc(topicLabel)));
    hdr.appendChild(cb); hdr.appendChild(chevron); hdr.appendChild(info);
    if(isCustom){
      const delBtn=el("button",{class:"btn-danger",style:{fontSize:"12px",padding:"4px 10px",flexShrink:"0"},
        click:async e=>{
          e.stopPropagation();
          if(!confirm(`Slette "${p.title}"?`)) return;
          const r=await api(`/api/teacher/bank/prompts/${encodeURIComponent(p.id)}`,{method:"DELETE"}).catch(()=>null);
          if(r?.ok){teacherState.bankPrompts=null;renderBankTab();}
          else toast("Kunne ikke slette oppgaven");
        }
      },"Slett");
      hdr.appendChild(delBtn);
    }
    card.appendChild(hdr);
    card.appendChild(bodyDiv);
    return card;
  }

  async function renderBankTab(){
    tabContent.innerHTML="";
    renderTabBtns();

    if(bankTab==="system"){
      const topicFilter=el("select",{style:{width:"100%",marginBottom:"12px",padding:"7px 10px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
      Object.keys(PROMPTS).forEach(k=>topicFilter.appendChild(el("option",{value:k},$esc(PROMPT_TOPIC_LABELS[k]||k))));
      tabContent.appendChild(topicFilter);
      const listWrap=el("div",{});
      tabContent.appendChild(listWrap);
      function renderSystemList(){
        listWrap.innerHTML="";
        const topicKey=topicFilter.value;
        const keys=topicKey?[topicKey]:Object.keys(PROMPTS);
        keys.forEach(k=>{
          if(!PROMPTS[k]?.length) return;
          if(!topicKey){
            listWrap.appendChild(el("div",{style:{fontWeight:"700",fontSize:"12px",color:"#888",
              marginBottom:"4px",marginTop:"14px",textTransform:"uppercase",letterSpacing:"0.06em"}},
              $esc(PROMPT_TOPIC_LABELS[k]||k)));
          }
          PROMPTS[k].forEach(p=>listWrap.appendChild(renderPromptCard(p,k,false)));
        });
      }
      topicFilter.addEventListener("change",renderSystemList);
      renderSystemList();

    } else if(bankTab==="mine"){
      if(!teacherState.bankPrompts){
        const r=await api("/api/teacher/bank/prompts").catch(()=>null);
        teacherState.bankPrompts=r?.ok?await r.json():[];
      }
      if(!teacherState.bankPrompts.length){
        tabContent.appendChild(el("p",{style:{color:"#888"}},"Ingen egne oppgaver ennå. Bruk «+ Ny oppgave» for å legge til."));
        return;
      }
      const topicFilter=el("select",{style:{width:"100%",marginBottom:"12px",padding:"7px 10px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicFilter.appendChild(el("option",{value:""},"Alle temaer"));
      const topics=[...new Set(teacherState.bankPrompts.map(p=>p.topic||"").filter(Boolean))].sort();
      topics.forEach(t=>topicFilter.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      tabContent.appendChild(topicFilter);
      const listWrap=el("div",{});
      tabContent.appendChild(listWrap);
      function renderMineList(){
        listWrap.innerHTML="";
        const topic=topicFilter.value;
        const filtered=topic?teacherState.bankPrompts.filter(p=>(p.topic||"")===topic):teacherState.bankPrompts;
        if(!filtered.length){listWrap.appendChild(el("p",{style:{color:"#888"}},"Ingen oppgaver for dette temaet."));return;}
        filtered.forEach(p=>listWrap.appendChild(renderPromptCard(p,null,true)));
      }
      topicFilter.addEventListener("change",renderMineList);
      renderMineList();

    } else {
      const addCard=el("div",{class:"card",style:{padding:"16px"}});
      const titleIn=el("input",{type:"text",placeholder:"Tittel / navn på oppgaven",style:{width:"100%",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      const topicSel=el("select",{style:{width:"100%",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"14px",boxSizing:"border-box"}});
      topicSel.appendChild(el("option",{value:""},"Velg tema (valgfritt)"));
      VALID_TOPIC_LIST.forEach(t=>topicSel.appendChild(el("option",{value:t},t.charAt(0).toUpperCase()+t.slice(1))));
      const promptIn=el("textarea",{placeholder:"Oppgaveteksten…",style:{width:"100%",minHeight:"80px",padding:"7px 10px",marginBottom:"8px",borderRadius:"7px",border:"1.5px solid #dde",fontSize:"13px",boxSizing:"border-box",resize:"vertical"}});
      const addErr=el("div",{style:{color:"#c0392b",fontSize:"13px",marginBottom:"6px",display:"none"}});
      const addBtn=el("button",{class:"btn-primary",style:{width:"100%"},
        click:async ()=>{
          const title=(titleIn.value||"").trim();
          const prompt_text=(promptIn.value||"").trim();
          if(!title){addErr.textContent="Tittel er påkrevd";addErr.style.display="";return;}
          if(!prompt_text){addErr.textContent="Oppgavetekst er påkrevd";addErr.style.display="";return;}
          addErr.style.display="none";
          addBtn.disabled=true; addBtn.textContent="Lagrer…";
          const r=await api("/api/teacher/bank/prompts",{method:"POST",headers:{"Content-Type":"application/json"},
            body:JSON.stringify({title,topic:topicSel.value,prompt_text})}).catch(()=>null);
          if(r?.ok){
            teacherState.bankPrompts=null;
            titleIn.value=""; topicSel.value=""; promptIn.value="";
            addBtn.disabled=false; addBtn.textContent="Lagre oppgave";
            bankTab="mine"; renderBankTab();
          } else {
            const d=await r?.json().catch(()=>({detail:"Ukjent feil"}));
            addErr.textContent=d?.detail||"Kunne ikke lagre";addErr.style.display="";
            addBtn.disabled=false; addBtn.textContent="Lagre oppgave";
          }
        }
      },"Lagre oppgave");
      addCard.appendChild(titleIn); addCard.appendChild(topicSel); addCard.appendChild(promptIn);
      addCard.appendChild(addErr); addCard.appendChild(addBtn);
      tabContent.appendChild(addCard);
    }
  }

  renderAssignPanel();
  renderBankTab();
  return frag;
}
</script>
</body>
</html>
